  { id:"as1-2",  paper:"P2 Auth", section:"AS1", year:"2017 November",    question:"To what extent did economic factors contribute to the emergence of two authoritarian states, each from a different region?", markscheme:"Candidates must consider the merits or otherwise of the concept that economic factors contributed to the emergence of authoritarian states. While the focus of the response must be within the timeframe of this topic, the two authoritarian states chosen need not be contemporaneous with each other. However, they must be chosen from different regions. Although candidates must discuss the extent to which economic factors contributed to the emergence of the chosen states, it is probable that there will also be reference to the emergence of the relevant authoritarian leaders. However, focus will be maintained on the emergence of the authoritarian state and how this was achieved. Each authoritarian state may be considered separately or a thematic approach adopted to compare the relative contribution of economic and other factors, such as ideology, for example, on their emergence." },
  { id:"as1-3",  paper:"P2 Auth", section:"AS1", year:"2022 May TZ1",     question:"\"Weak political systems were the most significant factor in the emergence of authoritarian states.\" Discuss with reference to two states.", markscheme:"Candidates may identify weak political systems as those that lacked political stability and resulted in continuous changes. They may discuss governments that failed to reach consensus and gain permanency, thus preventing the implementation of policies. This scenario may have driven politicians to focus on negotiating alliances instead of addressing social or economic problems, causing further discontent. Appropriate examples may include Liberal Italy, the Second Republic in Spain, and Weimar Germany. Weak political systems may also be identified as those manipulated to preserve a corrupt government in place. Candidates may discuss governments that exhibited widespread corruption, such as Batista’s or Farouk’s, and whether this may have resulted in the emergence of contenders for power. Other relevant factors may be addressed, for example economic factors, social division, and the impact of war, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"as1-4",  paper:"P2 Auth", section:"AS1", year:"2022 May TZ2",     question:"\"Weak political systems were the most significant factor in the emergence of authoritarian states.\" Discuss with reference to two states.", markscheme:"Candidates may identify weak political systems as those that lacked political stability and resulted in continuous changes. They may discuss governments that failed to reach consensus and gain permanency, thus preventing the implementation of policies. This scenario may have driven politicians to focus on negotiating alliances instead of addressing social or economic problems, causing further discontent. Appropriate examples may include Liberal Italy, the Second Republic in Spain, and Weimar Germany. Weak political systems may also be identified as those manipulated to preserve a corrupt government in place. Candidates may discuss governments that exhibited widespread corruption, such as Batista’s or Farouk’s, and whether this may have resulted in the emergence of contenders for power. Other relevant factors may be addressed, for example economic factors, social division, and the impact of war, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"as1-5",  paper:"P2 Auth", section:"AS1", year:"2022 November",    question:"To what extent did the weaknesses of political systems lead to the emergence of authoritarian states in two countries, each chosen from a different region?", markscheme:"Candidates may offer equal coverage of both states, or they may prioritize their assessment of one of them. However, both states will be a feature of the response. Candidates may refer to corruption in Obote’s Uganda or Batista’s Cuba; the chronic instability of Weimar Germany or Italy after the First World War; or the disunity within, and unpopularity of, the Ba’ath Party in Iraq before Saddam. Other relevant factors may be addressed, for example economic or social reasons or the impact of war, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"as1-6",  paper:"P2 Auth", section:"AS1", year:"2023 May TZ2",     question:"\"Economic conditions were the most important factor in the emergence of authoritarian states.\" Discuss with reference to two states, each chosen from a different region.", markscheme:"Candidates may offer equal coverage of both states or they may prioritise the discussion of one of them. However, both will be a feature of the response. Candidates may discuss Germany where high unemployment was crucial to the surge of popular support in the elections of 1930 and 1932. Similarly, high inflation and unemployment contributed to the emergence of the People’s Republic of China. In Cuba, high (and seasonal) unemployment may be discussed as a significant factor in garnering support for the Fidelistas whilst in Italy, strikes during the “biennio rosso” contributed to the popularity of the Fascist Movement among the middle-class. Other relevant factors may be discussed, such as the use of propaganda, the weakness of existing governments and/or victory in regional or civil wars, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"as1-7",  paper:"P2 Auth", section:"AS1", year:"2023 November TZ1",question:"To what extent did social division contribute to the emergence of two authoritarian states, each chosen from a different region?", markscheme:"Candidates will offer a considered and balanced review of the extent to which social division contributed to the emergence of two authoritarian states. The two authoritarian states must be drawn from different regions, but they may or may not have been contemporaneous with each other. Candidates may offer equal coverage of the two authoritarian states, or they may emphasize their discussion of one of them; however, both authoritarian states will be a feature of the response. Candidates may consider social division in China prior to the emergence of the PRC and how Mao galvanized the peasantry that had been alienated from the GMD. For Russia, there may be consideration of how Lenin used rhetoric to appeal to the proletariat and to build opposition to the Provisional Government. In Cuba, Castro focused on the need for social justice and building opposition to the government of Batista. In Argentina, Peron made much of the support given to him by the “descamisados”. Other relevant factors to be considered may include economic crises, the use of force, the impact of war. Candidates’ opinions will be presented clearly and supported by appropriate evidence." },
  { id:"as1-8",  paper:"P2 Auth", section:"AS1", year:"2023 November TZ2",question:"Evaluate the impact of war on the emergence of two authoritarian states, each chosen from a different region.", markscheme:"Candidates will make an appraisal of the impact of war upon the emergence of two authoritarian states weighing up its importance, or otherwise. The two states must be from different regions, but they may or may not be contemporaneous with each other. Candidates may evaluate the impact on the emergence of Fascist Italy of the “mutilated peace” and public anger over the high number of war casualties. The emergence of Lenin and the Bolshevik state may be linked to the March Revolution that was rooted in economic crises exacerbated by the First World War. For Nazi Germany, defeat in the First World War gave rise to the myths of the “stab in the back” and the “diktat”, that were central to the emergence of the NSDAP. In China, the impact of the Sino- Japanese War and the civil war that brought victory to the CCP may be evaluated. The 1948 Arab- Israeli conflict damaged the reputation of King Farouk of Egypt, leading to his overthrow and the emergence of the FOM and Nasser. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"as1-9",  paper:"P2 Auth", section:"AS1", year:"2024 November TZ2",question:"Compare and contrast the conditions in which two 20th-century authoritarian states emerged, each chosen from a different region.", markscheme:"The question requires that students give an account of the similarities and differences between the conditions in which two 20th-century authoritarian states emerged, referring to both throughout. There does not need to be an equal number of each. The two states must be from different regions. Students may identify factors which were present in one state but not the other, or may weigh the importance of different factors. They may compare economic factors such as poverty brought about by the Great Depression in the case of Nazi Germany, and by hyperinflation in post- war China. The role of wars may be compared, such as World War One in weakening Russian tsardom, thus paving the way for the Communist Revolution, and in inspiring nationalism which helped to fuel the emergence of Italian fascism. The weakness of political systems, such as deep divisions in 1930s Spain and the instability in Egypt caused by British actions and conflict between the military and the king, may be compared. Students may argue that the withdrawal of colonial powers was crucial to the establishment of authoritarian rule in Kenya and Tanzania. Students’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"as1-10", paper:"P2 Auth", section:"AS1", year:"2025 May TZ1",     question:"To what extent was social division the most significant factor in the emergence of two 20th century authoritarian states, each chosen from a different region?", markscheme:"The question requires that students consider the merits or otherwise of the suggestion that social division was the most significant factor in the emergence of two 20th century authoritarian states. The two authoritarian states must be from different regions. Students may offer equal coverage of both states, or they may prioritize their assessment of one of them. However, both states will be a feature of the response. Students may argue that social division was the most significant factor in the emergence of authoritarian states. They may consider the significance of social polarization in increased tensions and may, for example, refer to the divisive role of the church, regional autonomy, and/or political affiliations in Spain’s Second Republic. Similarly, there may be consideration of social tensions resulting from economic disparities, and students may refer to the plight of factory workers in Argentina, or peasants in China. Students may consider the contribution of ethnic differences to social divisions and may refer to Duvalier’s exploitation of resentment over racial discrimination in Haiti. Conversely, students may argue that authoritarian states emerged from efforts to achieve social unity against external threats, and may refer to Sukarno’s and Nyere’s nationalist struggles against colonial rule. While other relevant factors may be referred to, such as economic factors or weak political systems, the bulk of the response will remain on the issue raised in the question. Students may agree, partly agree or disagree with the suggestion, but their opinions or conclusions will be presented clearly and supported by appropriate evidence and sound argument." },
  { id:"as1-11", paper:"P2 Auth", section:"AS1", year:"2025 May TZ2",     question:"To what extent was social division the most significant factor in the emergence of two 20th century authoritarian states, each chosen from a different region?", markscheme:"The question requires that students consider the merits or otherwise of the suggestion that social division was the most significant factor in the emergence of two 20th century authoritarian states. The two authoritarian states must be from different regions. Students may offer equal coverage of both states, or they may prioritize their assessment of one of them. However, both states will be a feature of the response. Students may argue that social division was the most significant factor in the emergence of authoritarian states. They may consider the significance of social polarization in increased tensions and may, for example, refer to the divisive role of the church, regional autonomy, and/or political affiliations in Spain’s Second Republic. Similarly, there may be consideration of social tensions resulting from economic disparities, and students may refer to the plight of factory workers in Argentina, or peasants in China. Students may consider the contribution of ethnic differences to social divisions and may refer to Duvalier’s exploitation of resentment over racial discrimination in Haiti. Conversely, students may argue that authoritarian states emerged from efforts to achieve social unity against external threats, and may refer to Sukarno’s and Nyere’s nationalist struggles against colonial rule. While other relevant factors may be referred to, such as economic factors or weak political systems, the bulk of the response will remain on the issue raised in the question. Students may agree, partly agree or disagree with the suggestion, but their opinions or conclusions will be presented clearly and supported by appropriate evidence and sound argument." },
  { id:"as1-12", paper:"P2 Auth", section:"AS1", year:"2025 May TZ3",     question:"To what extent was social division the most significant factor in the emergence of two 20th century authoritarian states, each chosen from a different region?", markscheme:"The question requires that students consider the merits or otherwise of the suggestion that social division was the most significant factor in the emergence of two 20th century authoritarian states. The two authoritarian states must be from different regions. Students may offer equal coverage of both states, or they may prioritize their assessment of one of them. However, both states will be a feature of the response. Students may argue that social division was the most significant factor in the emergence of authoritarian states. They may consider the significance of social polarization in increased tensions and may, for example, refer to the divisive role of the church, regional autonomy, and/or political affiliations in Spain’s Second Republic. Similarly, there may be consideration of social tensions resulting from economic disparities, and students may refer to the plight of factory workers in Argentina, or peasants in China. Students may consider the contribution of ethnic differences to social divisions and may refer to Duvalier’s exploitation of resentment over racial discrimination in Haiti. Conversely, students may argue that authoritarian states emerged from efforts to achieve social unity against external threats, and may refer to Sukarno’s and Nyere’s nationalist struggles against colonial rule. While other relevant factors may be referred to, such as economic factors or weak political systems, the bulk of the response will remain on the issue raised in the question. Students may agree, partly agree or disagree with the suggestion, but their opinions or conclusions will be presented clearly and supported by appropriate evidence and sound argument." },
  // AS2
  { id:"as2-1",  paper:"P2 Auth", section:"AS2", year:"2018 May TZ1",     question:"Compare and contrast the importance of propaganda to the emergence of two authoritarian states.", markscheme:"Candidates will give an account of the similarities and differences between the importance of propaganda in the emergence of two authoritarian states referring to both throughout. While the focus of response must be within the timeframe of this topic, the examples chosen need not be contemporaneous with each other, nor need they be from the same region. Candidates will focus on authoritarian states during their emergence, rather than after the leaders obtained power. Rather than describe propaganda in both cases, candidates will explain its importance to the emergence of the authoritarian states. Candidates may gauge the importance of propaganda by comparing its role with other factors, such as economic distress, leaders’ charisma or the collapse of the existing government." },
  { id:"as2-2",  paper:"P2 Auth", section:"AS2", year:"2018 May TZ2",     question:"Compare and contrast the importance of propaganda to the emergence of two authoritarian states.", markscheme:"Candidates will give an account of the similarities and differences between the importance of propaganda in the emergence of two authoritarian states referring to both throughout. While the focus of response must be within the timeframe of this topic, the examples chosen need not be contemporaneous with each other, nor need they be from the same region. Candidates will focus on authoritarian states during their emergence, rather than after the leaders obtained power. Rather than describe propaganda in both cases, candidates will explain its importance to the emergence of the authoritarian states. Candidates may gauge the importance of propaganda by comparing its role with other factors, such as economic distress, leaders’ charisma or the collapse of the existing government." },
  { id:"as2-3",  paper:"P2 Auth", section:"AS2", year:"2019 November",    question:"Compare and contrast the importance of the use of force on the emergence of two authoritarian states, each from a different region.", markscheme:"Candidates will give an account of the similarities and differences between the use of force on the emergence of two authoritarian states referring to both throughout. The two states must be from different regions, but they may or may not have been contemporaneous with each other. Examples of the use of force may predate the timeframe, but they must be clearly linked to the issue raised in the question. Candidates may refer to force used against opposing parties or rivals for power; the use of force against citizens to ensure compliance; the forced removal of dissidents. While other relevant factors, such as the promise of political reform, solutions to economic problems, improved economic conditions, appeals to nationalism, may be referred to, the bulk of the response will remain on the issue raised in the question." },
  { id:"as2-4",  paper:"P2 Auth", section:"AS2", year:"2021 November",    question:"\"Propaganda was the key factor in the emergence of authoritarian states.\" Discuss with reference to two states, each from a different region.", markscheme:"Candidates may discuss how propaganda was a tool to gain support or contrastingly that attacked either the existing regime or rival political groups. Hitler’s use of propaganda to gain support from the German population as well as to attack opposition parties such as the KPD is a viable example. Similarly, the Red Army’s use of propaganda to vilify their White opponents during the Russian Civil War may be used. Candidates may also discuss different types of propaganda including the use of visual, auditory or physical propaganda. The conduct of the PLA as compared to the KMT during the Chinese Civil War, 1945–1949, is one such example. Other relevant factors may be discussed; candidates may argue that conditions such as economic crises or methods such as widespread intimidation were the key factors in the emergence of authoritarian states. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"as2-5",  paper:"P2 Auth", section:"AS2", year:"2023 May TZ1",     question:"To what extent was ideology the most important factor in the emergence of two authoritarian states?", markscheme:"Candidates may offer equal coverage of both states or may prioritise their assessment of one of them. However, both states will be a feature of the response. Candidates may refer to anti- Semitism and the recovery of German prestige as significant aspects of Hitler’s ideological appeal. Mao’s focus on the peasantry as the vanguard of the revolution and the link between ideology and land reform may be seen as essential to success of the PLA in the civil war. It may be argued that Castro was rather evasive in committing firmly to an ideology and how this may have been an important factor in the emergence of revolutionary Cuba. Other relevant factors may be addressed, for example, the use of propaganda, fear of foreign invasion or a military seizure of power, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  // AS3
  { id:"as3-1",  paper:"P2 Auth", section:"AS3", year:"2017 May",         question:"Compare and contrast the methods used to maintain power in two authoritarian states, each from a different region.", markscheme:"Candidates will give an account of the similarities and differences between the methods of maintaining power that were employed in two authoritarian states referring to both states throughout the response. While the focus of the response must be within the timeframe of this topic, the periods covered do not need be contemporaneous. However, each of the examples chosen must be from a different region. Methods to be considered might include, but need not be limited to, political, legal or social methods. These may have been effective or ineffective or a combination of both but the response must not be a descriptive list of policies, for example, without some assessment of how these helped or hindered the maintenance of power within each state." },
  { id:"as3-2",  paper:"P2 Auth", section:"AS3", year:"2019 May TZ1",     question:"\"The use of force was the most important method used to maintain power in authoritarian states.\" Discuss with reference to two authoritarian states.", markscheme:"Candidates may offer equal coverage of the two authoritarian states or they may emphasize their discussion of one of them; however, both authoritarian states will be a feature of the response. Candidates may refer to campaigns against political enemies and the use of torture, executions, prison and censorship, for example Mao and the Cultural Revolution, or Stalin and the Purges. They may also refer to the role of paramilitary forces or special police, for example Hitler and the Sturmabteilung (the SA) and the Gestapo. While other relevant factors, for example propaganda, economic and social policies, or charismatic leadership, may be referred to, the bulk of the response will remain on the issue raised in the question. Candidates may agree, partly agree or disagree with the statement." },
  { id:"as3-3",  paper:"P2 Auth", section:"AS3", year:"2020 November",    question:"Compare and contrast the use of force in the maintenance of power in two authoritarian states.", markscheme:"Candidates will also likely compare and contrast the use of secret police forces in authoritarian states or agencies such as the OVRA in Italy. Candidates may compare and contrast the use of force to maintain power by individual leaders or refer, more broadly, to the use of force within authoritarian states. Candidates’ opinions and conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"as3-4",  paper:"P2 Auth", section:"AS3", year:"2023 May TZ2",     question:"Evaluate the importance of charismatic leadership to the maintenance of power in two authoritarian states.", markscheme:"Candidates will make an appraisal of the importance of charismatic leadership to the maintenance of power in two authoritarian states. The two states may or may not be chosen from the same region. Candidates may offer equal coverage of both states or they may prioritise the evaluation of one of them. However, both will be a feature of the response. Candidates may evaluate the importance of Mussolini’s charismatic leadership enhanced by newsreels, newspapers and speeches given from balconies to vast crowds. The importance of Mao’s god-like status elevated during the Cultural Revolution may be evaluated and in Argentina the importance of the personality cult of Peron and his wife, Evita, as evidenced by the outpouring of grief on her death in 1952. Other relevant factors may be addressed, for example, the state of the economy, foreign policy, suppression of opposition, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"as3-5",  paper:"P2 Auth", section:"AS3", year:"2023 November TZ1",question:"\"The use of force was the most important method used to maintain power in authoritarian states.\" Discuss with reference to two authoritarian states.", markscheme:"Candidates may offer equal coverage of the two authoritarian states or they may emphasize their discussion of one of them; however, both authoritarian states will be a feature of the response. Candidates may refer to campaigns against political enemies and the use of torture, executions, prison and censorship, for example Mao and the Cultural Revolution, or Stalin and the Purges. They may also refer to the role of paramilitary forces or special police, for example Hitler and the Sturmabteilung (the SA) and the Gestapo. While other relevant factors, for example propaganda, economic and social policies, or charismatic leadership, may be referred to, the bulk of the response will remain on the issue raised in the question. Candidates may agree, partly agree or disagree with the statement." },
  { id:"as3-6",  paper:"P2 Auth", section:"AS3", year:"2024 May TZ2",     question:"To what extent was propaganda the most important factor in maintaining power in two 20th century authoritarian states?", markscheme:"Candidates may offer equal coverage of both states, or they may prioritize their assessment of one of them. However, both states will be a feature of the response. Candidates may consider Mugabe’s anti-colonial rhetoric and mass rallies or Peron’s promotion of the cult of Evita, and use of newsreels and rallies. In China repeated mass mobilization campaigns enforced conformity and obedience, while in the USSR Stalin was given a fatherly image while propaganda promoted patriotism through, for example, the cult of the Stakhanovites. Other relevant factors may be addressed for example, in most states the security forces and informants played vital roles. The focus should be on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"as3-7",  paper:"P2 Auth", section:"AS3", year:"2025 May TZ1",     question:"\"The maintenance of power was dependent on the effective use of propaganda.\" Discuss with reference to two 20th century authoritarian states.", markscheme:"The question requires that students offer a considered and balanced review of the view that maintenance of power in two 20th century authoritarian states was dependent on the effective use of propaganda. The two states may or may not be from the same region. Students may offer equal coverage of both states, or they may prioritize their discussion of one of them. However, both states will be a feature of the response. Students may consider the role of propaganda in promoting positive perceptions of governments by highlighting their achievements, for example Soviet propaganda, which celebrated industrialization and collectivization. Students may also discuss the role of propaganda in promoting commitment to the state\'s aims and may refer to mass mobilizations. Similarly, they may discuss the contribution of campaigns, such as the Cultural Revolution, to eradication of the \"old\" state. Additionally, they may discuss the role of personality cults, as seen in Duvalier\'s Haiti. There may be consideration of role played by Nazi antisemitic films in identifying internal enemies and promote rallying behind the state. Students may consider the role of propaganda in supporting foreign policy, as seen in the Italian invasion of Abyssinia. While other relevant factors may be referred to, such as the use of security forces or successful economic policies, the bulk of the response will remain on the issue raised in the question. Students may agree, partly agree or disagree with the statement, but their opinions or conclusions will be presented clearly and supported by appropriate evidence. – 5504M" },
  { id:"as3-8",  paper:"P2 Auth", section:"AS3", year:"2025 May TZ3",     question:"To what extent was the use of force the most important factor in the maintenance of power in two 20th century authoritarian states?", markscheme:"The question requires that students consider the merits or otherwise of the suggestion that the use of force was the most important factor in the maintenance of power in two 20th century authoritarian states. The two authoritarian states may or may not be from the same region. Students may offer equal coverage of both states, or they may prioritize their assessment of one of them. However, both states will be a feature of the response. When considering the importance of the use of force in the maintenance of power, students may refer to the control of opposition. They may, for example, assess the role of violence in mass mobilizations, such as Mao\'s Hundred Flowers campaign and the Great Proletariat Cultural Revolution. There may be a consideration of the role of imprisonment and torture, with reference to the systematic \"disappearances\" in Chile, or to the Soviet Gulags. Students may also consider the role of security forces, such as Pinochet\'s DINA or Hitler\'s Gestapo. They may also consider how in some authoritarian states, relatively few secret police were required as there was a network of local informers. Similarly, students may consider the use of legal methods with reference made, for example, to Stalin\'s Show Trials. While other relevant factors may be referred to, such as leadership or propaganda, the bulk of the response will remain on the issue raised in the question. Students may agree, partly agree or disagree with the suggestion, but their opinions or conclusions will be presented clearly and supported by appropriate evidence and sound argument. – 5506M" },
  // AS4
  { id:"as4-1",  paper:"P2 Auth", section:"AS4", year:"2017 November",    question:"\"The maintenance of power was dependent on the successful control of opposition.\" Discuss with reference to two authoritarian leaders.", markscheme:"Candidates may agree with the statement or they may argue that the authoritarian leaders were able to maintain their power because of success in other areas, for example the provision of employment, an appeal to nationalism and/or a popular foreign policy. Responses must focus on the period that the chosen leaders were in power. Each authoritarian leader may be considered separately or a thematic approach adopted to compare the control of opposition, its relative success and its impact upon the maintenance of power." },
  { id:"as4-2",  paper:"P2 Auth", section:"AS4", year:"2019 May TZ2",     question:"\"Control of opposition was the most important method used to maintain power in authoritarian states.\" Discuss with reference to two authoritarian states.", markscheme:"Candidates may offer equal coverage of the two authoritarian states or they may emphasize their discussion of one of them; however, both authoritarian states will be a feature of the response. Candidates may refer to the persecution of other political parties, journalists, religious leaders or intellectuals. While other relevant methods, for example propaganda or economic policies may be referred to, the bulk of the response will remain on the issue raised in the question. Candidates may agree, partly agree or disagree with the statement." },
  { id:"as4-3",  paper:"P2 Auth", section:"AS4", year:"2021 May TZ1",     question:"\"The treatment of opposition was the most important factor in the maintenance of power.\" Discuss with reference to two authoritarian states, each from a different region.", markscheme:"Candidates may refer to the importance of eliminating opposition to avoid the rise of political rivals or to avoid controversy over domestic and international policies, for example Mao\'s Cultural Revolution or Stalin\'s Purges. Candidates may refer to the use of propaganda to turn the opposition into an enemy of the nation and reinforce the power of the government, for example in Hitler’s propaganda against the KPD (German Communist Party). They may also refer to the importance of weakening sections of the military to avoid a coup, for example, in Sukarno’s Indonesia. There may be discussion of the nature of and threat posed by opposition. Other relevant factors may be discussed, such as economic and social factors or the role of leadership, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"as4-4",  paper:"P2 Auth", section:"AS4", year:"2021 November",    question:"Evaluate the effectiveness of methods used to control opposition in two authoritarian states, each chosen from a different region.", markscheme:"Candidates may evaluate the effectiveness of repressive methods including the use of police, secret police, violence and terror. The role of the SS-Gestapo, NKVD, Cheka and OVRA are viable examples. Peron’s control of the media in Argentina is another example of suppressive methods. Candidates may evaluate the effectiveness of political methods including changes to the legal system such as The Law for the Restoration of the Professional Civil Service in Germany. Other methods that may be evaluated include the mobilization of education, arts, culture, youth policies, family life, or economic methods such as employment regulation and taxation. In addition to the role of state agents, candidates may evaluate the effectiveness of the mobilization of the population as a tool to control opposition, as occurred during the Cultural Revolution in China. Candidates may also evaluate methods used to control opposition within the ruling party. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"as4-5",  paper:"P2 Auth", section:"AS4", year:"2024 May TZ1",     question:"Compare and contrast the nature of opposition in two 20th century authoritarian states.", markscheme:"candidates may refer to different types of opposition such as Nasser from within the military and the Muslim Brotherhood, or opposition to Kenyatta from within his own party and the rival Kenya People’s Union. Opposition to Hitler came also came from the military, and there may be discussion of the July Plot; youth groups, such as the Swing Youth and Edelweiss Pirates, and religious leaders such as Galen and Bonhoeffer may also be used for comparison. The Whites’ opposition to the Russian Revolution and opposition to Mao from within the Party, such as Peng’s protest against the Great Leap Forward were also significant. For comparison and contrast candidates may comment on, for example, differing or similar sources of opposition, how serious they were, or the methods used by the state to combat opposition. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"as4-6",  paper:"P2 Auth", section:"AS4", year:"2024 November TZ1",question:"Evaluate the effectiveness of the treatment of opposition in two 20th-century authoritarian states, each chosen from a different region.", markscheme:"The question requires that students make an appraisal of the effectiveness of the treatment of opposition in two 20th-century authoritarian states. The two states must be from different regions. Effectiveness may extend beyond the timeframe but must be clearly linked to the issue raised in the question. Students may offer equal coverage of both states, or they may prioritize their evaluation of one of them. However, both states will be a feature of the response. Students may evaluate the effectiveness of the treatment of opposition in the USSR, where the Whites’ defeat in the Civil War, party purges, show trials, and internal exiling of the kulaks was highly effective. In Nazi Germany, while the SA, opposition parties and trade unions were neutralised, some youth opposition persisted into wartime, and the widely supported July Plot of 1944 was significant. Peron’s demise at the hands of the middle class, the Catholic church and the military may indicate ineffective treatment of opposition. In Cuba, opposition may be considered minimal, as shown by Castro’s unchallenged survival during the Special Period. Evaluation of the effectiveness of Mao’s treatment of opposition may include the defeat of the landlords and the intelligentsia, while pointing out that opposition within the leadership was a reason for the launch of the Cultural Revolution. Students’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  // AS5
  { id:"as5-1",  paper:"P2 Auth", section:"AS5", year:"2018 November",    question:"Examine the impact of the foreign policy of two authoritarian states on the maintenance of power in those states.", markscheme:"Candidates may refer to foreign policy under one leader, multiple leaders, or throughout the duration of an authoritarian state. It may be suggested that successful foreign policy benefitted a regime by increasing its popularity and/or diverting attention from domestic problems. Foreign policy failures that undermined the regime may also be addressed. While other relevant interrelationships may be considered—to provide context to, or commentary on, the significance of the impact of foreign policy on the maintenance of power—the bulk of the response will remain on that raised in the question." },
  { id:"as5-2",  paper:"P2 Auth", section:"AS5", year:"2021 May TZ2",     question:"Evaluate the impact of foreign policy on the maintenance of power in two authoritarian states, each from a different region.", markscheme:"Candidates may offer equal coverage of both authoritarian states, or they may prioritize their discussion of one of them. However, both states will be a feature of the response. Candidates may refer to the role of the authoritarian ruler defending national interests and its impact on their popularity, for example, the increase of Nasser’s popularity after the Suez Crisis. They may also refer to the use of a foreign policy to unify the population around the regime, for example, Castro\'s confrontations against the US. Candidates may evaluate the impact of the Cold War, for example, Sukarno\'s relationship with the Soviet Union. They may also refer to the importance of wars, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"as5-3",  paper:"P2 Auth", section:"AS5", year:"2022 November",    question:"To what extent was foreign policy the most important factor in the maintenance of power in two authoritarian states?", markscheme:"Candidates may offer equal coverage of both states, or they may prioritize their assessment of one of them. However, both states will be a feature of the response. Candidates may discuss the importance of the Suez Crisis in maintaining Nasser’s power in Egypt, or the importance of victory in Korea and the Russian alliance to Mao’s China. Hitler’s regime was maintained partly as a result of his foreign policy successes in 1935–38. Other relevant factors may be discussed, for example the use of law and the security forces, economic policy and charismatic leadership, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"as5-4",  paper:"P2 Auth", section:"AS5", year:"2023 May TZ1",     question:"\"A successful foreign policy was the most important factor in the maintenance of power.\" Discuss with reference to two authoritarian states.", markscheme:"Candidates may offer equal coverage of both states, or may prioritise the discussion of one of them. However, both states will be a feature of the response. Candidates may refer to the success of Hitler’s foreign policy that increased the regime’s popularity. For Mao, participation in the Korean War demonstrated that China was no longer a “victim” of imperialism. Nasser’s success in the Suez Crisis arguably cemented his presidency that was not threatened even by defeat in the Six Day War. In Argentina, however, defeat in the Malvinas/Falklands War led to the removal of the military junta from power. Other relevant factors may be addressed, for example, the primacy of a successful domestic policy or the suppression of opposition but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"as5-5",  paper:"P2 Auth", section:"AS5", year:"2023 November TZ2",question:"Evaluate the impact of foreign policy on the maintenance of power in two authoritarian states.", markscheme:"Candidates may offer equal coverage of both authoritarian states, or they may prioritize their discussion of one of them. However, both states will be a feature of the response. Candidates may refer to the role of the authoritarian ruler defending national interests and its impact on their popularity, for example, the increase of Nasser’s popularity after the Suez Crisis. They may also refer to the use of a foreign policy to unify the population around the regime, for example, Castro\'s confrontations against the US. Candidates may evaluate the impact of the Cold War, for example, Sukarno\'s relationship with the Soviet Union. They may also refer to the importance of wars, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  // AS6
  { id:"as6-1",  paper:"P2 Auth", section:"AS6", year:"2018 May TZ1",     question:"\"The domestic policies of authoritarian states rarely benefitted women.\" Discuss with reference to two authoritarian states.", markscheme:"Candidates will give a considered and balanced review of the hypothesis that the domestic policies of authoritarian states rarely benefited women. While the focus of the response must be within the timeframe of this topic, the examples chosen need not be contemporaneous with each other. The states may or may not come from different regions. Candidates may refer to the condition of women before authoritarianism was established, and discuss the extent of benefit or otherwise, promoted by the policies of the authoritarian state. Candidates may, for example, discuss legal, social and economic equality, or the extent of female involvement in local and national politics. Familial relations, access to education and child care, and differences between social groups may also be discussed. The states may be considered separately or a thematic approach may be adopted." },
  { id:"as6-2",  paper:"P2 Auth", section:"AS6", year:"2018 November",    question:"\"Social and economic policies in authoritarian states did not always achieve their aims.\" Discuss with reference to one authoritarian state.", markscheme:"Candidates may refer to the social and economic policies of one ruler, multiple rulers, or throughout the duration of the authoritarian state. Social policies may focus on religion, education, youth, families, women, minorities and social welfare. Economic policies may focus on industrialization, agriculture, transport, taxation, trade and labour. Candidates may agree, partly agree or disagree with the statement." },
  { id:"as6-3",  paper:"P2 Auth", section:"AS6", year:"2019 May TZ1",     question:"Compare and contrast the impact of the policies of two authoritarian states on women.", markscheme:"Candidates may refer to, for example, Castro’s educational policies and provision of childcare, Mao’s marriage law, Hitler’s policies towards female employment, or Peron’s reforms of maternity rights. Both similarities and differences must be clearly indicated but there does not need to be an equal number of each." },
  { id:"as6-4",  paper:"P2 Auth", section:"AS6", year:"2019 May TZ2",     question:"Compare and contrast the impact of the policies of two authoritarian states on women.", markscheme:"Candidates may refer to, for example, Castro’s educational policies and provision of childcare, Mao’s marriage law, Hitler’s policies towards female employment, or Peron’s reforms of maternity rights. Both similarities and differences must be clearly indicated but there does not need to be an equal number of each." },
  { id:"as6-5",  paper:"P2 Auth", section:"AS6", year:"2019 November",    question:"Evaluate the impact of domestic economic policies on the maintenance of power in two authoritarian states, each from a different region.", markscheme:"Candidates may discuss specific domestic economic policies such as industrialization, preparation for war, employment policies, agricultural developments, economic policies linked to ideology. Both strengths and limitations must be clearly indicated but there does not need to be an equal number of each." },
  { id:"as6-6",  paper:"P2 Auth", section:"AS6", year:"2022 May TZ1",     question:"Evaluate the impact of social policies in two authoritarian states.", markscheme:"Candidates may wish to discuss what is meant by impact. In this respect, they may choose to focus on overall results, or the extent to which policy aims were achieved. Candidates may evaluate policies that were widely implemented, such as healthcare in Cuba where infant mortality rate decreased from 87/1000 in 1960 to 18.5/1000 by 1981. Conversely, candidates may wish to discuss social reforms with partial impact. For example, China’s 1954 constitution recognized men and women as equal, and reforms proved successful in inserting women into the labour force. However, women had to shoulder domestic chores, and failed to gain equal political representation. Candidates may also comment on the difficulty of assessing the impact of social policies, such as the promotion of state atheism, where sectors of the population may have conformed rather than commit to the ideology. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"as6-7",  paper:"P2 Auth", section:"AS6", year:"2022 May TZ2",     question:"Evaluate the impact of social and cultural policies in one authoritarian state.", markscheme:"Candidates may offer equal coverage of social and cultural policies, or they may prioritize their evaluation of one over the other. However, both aspects will be a feature of the response. Candidates may evaluate the impact of social policies that had significant impact such as the Literacy Campaign in Cuba. Conversely, candidates may wish to evaluate social reforms with uneven impact. For example, China’s 1950 Marriage Law forbade arranged marriages and concubinage, yet these restrictions were often ignored in rural areas. It would be valid for candidates to comment on the difficulty of appraising the real impact of social policies, such as compulsory youth groups, where participants may have outwardly conformed. The role of censorship and control of the arts, such as Nyerere\'s ban on foreign music, may also provide material for discussion. Candidates may also consider the extent to which artists embraced states themes such as Stalin’s Socialist Realism, or Nasser’s Pan-Arabism and Anti- imperialism. Candidates may propose that while policies may not have achieved social and cultural targets, they may have met political objectives, such as China’s Cultural Revolution. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"as6-8",  paper:"P2 Auth", section:"AS6", year:"2024 May TZ1",     question:"To what extent did the social policies of two 20th century authoritarian states lead to significant change?", markscheme:"Candidates may offer equal coverage of both states, or they may prioritize their assessment of one of them. However, both aspects will be a feature of the response. Candidates may consider the social change engineered by Nyerere through his extensive Ujamaa scheme, or to Mao’s attempts to introduce communes during the Cultural Revolution. There may be consideration of attempts to boost the birth rate in Nazi Germany and Stalin’s Russia. The significance of educational reform may be considered, for example, in Cuba, where new countryside schools and the Literacy Campaign had a great impact. There may be consideration of policies towards women, for example the impact of the Marriage Law in China. Other relevant factors may be addressed, for example changes brought about by economic or political policies. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence. – 5303M" },
  { id:"as6-9",  paper:"P2 Auth", section:"AS6", year:"2024 May TZ2",     question:"To what extent did the social policies of two 20th century authoritarian states lead to significant change?", markscheme:"Candidates may offer equal coverage of both states, or they may prioritize their assessment of one of them. However, both aspects will be a feature of the response. Candidates may consider the social change engineered by Nyerere through his extensive Ujamaa scheme, or to Mao’s attempts to introduce communes during the Cultural Revolution. There may be consideration of attempts to boost the birth rate in Nazi Germany and Stalin’s Russia. The significance of educational reform may be considered, for example, in Cuba, where new countryside schools and the Literacy Campaign had a great impact. There may be consideration of policies towards women, for example the impact of the Marriage Law in China. Other relevant factors may be addressed, for example changes brought about by economic or political policies. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence. – 5303M" },
  { id:"as6-10", paper:"P2 Auth", section:"AS6", year:"2024 November TZ1",question:"\"Economic policies of authoritarian rulers rarely achieved their aims.\" With reference to two 20th-century states, to what extent do you agree with this statement?", markscheme:"The question requires that students consider the merits or otherwise of the statement that economic policies of authoritarian rulers in two 20th-century states rarely achieved their aims. The two rulers may or may not be from the same region. Students may offer equal coverage of the two rulers, or they may prioritize their assessment of one of them. However, both rulers will be a feature of the response. Students may consider the successful establishment of an egalitarian society in Cuba, but at the expense of food rationing, a failure to diversify away from sugar, and an over-reliance on Russian subsidy. Nasser’s socialist approach to planning and industrialisation and land redistribution brought little benefit. The Aswan Dam was completed after his death. There may be consideration of Nazi policies, which lowered unemployment and made some progress towards autarky, while efforts to boost the agricultural sector failed. Mao solved hyperinflation, but the Great Leap Forward proved disastrous, as did Nyerere’s collectivisation, which left his country bankrupt. Students’ opinions or conclusions will be presented clearly and supported by appropriate evidence. – 5303M" },
  // AS7
  { id:"as7-1",  paper:"P2 Auth", section:"AS7", year:"2018 May TZ2",     question:"To what extent was authoritarian control achieved in two 20th-century states?", markscheme:"Candidates should go beyond description of measures and focus on the degree of control achieved. They may challenge the notion of full control. Areas for consideration could, among others, include the existence and role of representative institutions, control over, or elimination of, political parties which challenged the centre, control over institutions such as trade unions, the army or churches, control over culture and the media, bureaucratic efficiency and the effectiveness of security services, which may or may not have been dependent on informers and public support. The states may be considered separately or a thematic approach may be adopted." },
  { id:"as7-2",  paper:"P2 Auth", section:"AS7", year:"2021 May TZ1",     question:"\"Full authoritarian control could not be achieved.\" With reference to two states, to what extent do you agree with this statement?", markscheme:"Candidates may offer equal coverage of the two states or they may prioritize their evaluation of one of them. However, both states will be a feature of the response. Candidates may assess the extent of rulers’ constitutional power. In Germany, for example, Hitler could make laws without requiring the approval of a parliament or superior authority. There may be an assessment of the extent of the power of the security forces, such as the NKVD in the USSR, and whether the judiciary’s independence had been removed. Candidates may assess the extent both of opposition and control over the media, culture, education and social activity. The impact of mass mobilisation, such as the Anti movements in China, may be assessed. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"as7-3",  paper:"P2 Auth", section:"AS7", year:"2021 May TZ2",     question:"\"Full authoritarian control could not be achieved.\" With reference to two states, to what extent do you agree with this statement?", markscheme:"Candidates may offer equal coverage of the two states or they may prioritize their evaluation of one of them. However, both states will be a feature of the response. Candidates may assess the extent of rulers’ constitutional power. In Germany, for example, Hitler could make laws without requiring the approval of a parliament or superior authority. There may be an assessment of the extent of the power of the security forces, such as the NKVD in the USSR, and whether the judiciary’s independence had been removed. Candidates may assess the extent both of opposition and control over the media, culture, education and social activity. The impact of mass mobilisation, such as the Anti movements in China, may be assessed. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"as7-4",  paper:"P2 Auth", section:"AS7", year:"2024 November TZ2",question:"\"Authoritarian control was complete.\" With reference to two 20th-century states, to what extent do you agree with this statement?", markscheme:"The question requires that students consider the merits or otherwise of the statement that authoritarian control was complete in two 20th-century states. The two states may or may not be from the same region. Students may offer equal coverage of both states, or they may prioritize their assessment of one of them. However, both aspects will be a feature of the response. Students may consider Nazi control of the Reichstag, the legal and penal system and social and cultural life, while pockets of resistance in the military persisted. There may be consideration of Mao’s control over the People’s Congresses, and the promotion of uniformity through mass mobilisations, while noting that the Cultural Revolution got out of hand. In Tanzania, labour unions and the military were coordinated, arrest without trial was introduced, and a single party state established; however, there were free elections involving students approved by the ruling party. In Peron’s Argentina authoritarianism was even more moderate, and the lack of challenge owed more to divisions among opponents than legal curbs; opposition resurfaced and overthrew the regime. Stalin, through the ruthless exercise of power by the NKVD and the legal system, enjoyed almost complete control. Students’ opinions or conclusions will be presented clearly and supported by appropriate evidence. – 5304M" },
  { id:"as7-5",  paper:"P2 Auth", section:"AS7", year:"2025 May TZ2",     question:"\"Attempts to establish authoritarian control were unsuccessful.\" With reference to two 20th century authoritarian states, to what extent do you agree with this statement?", markscheme:"The question requires that students consider the merits or otherwise of the statement that attempts to establish authoritarian control were unsuccessful in two 20th century states. The two authoritarian states may or may not be from the same region. Students may offer equal coverage of both states, or they may prioritize their assessment of one of them. However, both states will be a feature of the response. Students may consider the extent of state social control. For example, students may refer to: changes to school curriculum, as seen in Fascist Italy; the use of arts as a medium of ideology, as seen in China; or participation in state-endorsed organizations, such as Komsomol in the USSR. Students may also refer to limits to the use of violence by security and intelligence forces, such as Chile\'s DINA. In addition, there may be consideration of the level of media control, as seen in Cuba. Students may also consider the degree of legislative and judicial independence in the two states, and may refer to efforts to eliminate political parties, as seen in Nazi Germany. Additionally, it would be valid for students to consider the extent of opposition as a reflection of control achieved. Students may agree, partly agree or disagree with the statement, but their opinions or conclusions will be presented clearly and supported by appropriate evidence and sound argument. – 5505M" },

  // ── COLD WAR SUPERPOWER ────────────────────────────────────────────────────
  // CW1
  { id:"cw1-1",  paper:"P2 CW",   section:"CW1", year:"2017 May",         question:"To what extent did economic interests rather than ideology lead to the breakdown of the grand alliance between 1943 and 1949?", markscheme:"Candidates will consider the merits or otherwise of the concept that economic interests rather than ideology led to the breakdown of the grand alliance during the period from 1943 and 1949. While the focus of the response must be on the extent to which economic interests rather than ideology played a more significant role in this context, candidates may agree or disagree with the supposition. They may also suggest that other factors may have been of greater or equal importance and that the breakdown of the grand alliance was, instead, the result of a combination of factors and events. Economic interests and ideology may be dealt with separately, or candidates may use a chronological approach that outlines the breakdown of the grand alliance and places both economic interest and ideology in the wider context." },
  { id:"cw1-2",  paper:"P2 CW",   section:"CW1", year:"2018 May TZ1",     question:"\"Ideology was the main factor that led to the emergence of superpower rivalry between 1943 and 1949.\" Discuss.", markscheme:"Candidates may explain the ideological differences between the US and the USSR, but will link them to the emergence of superpower rivalry. They may also discuss the interaction of ideological and strategic factors, especially in respect of eastern Europe. Other factors for consideration may include the atomic bomb, the Marshall Plan and the role of personalities." },
  { id:"cw1-3",  paper:"P2 CW",   section:"CW1", year:"2018 November",    question:"\"Superpower rivalry in Europe and Asia between 1943 and 1949 led to the breakdown of the grand alliance.\" To what extent do you agree with this statement?", markscheme:"Candidates may consider events that extend beyond 1949, but they must be clearly linked to the rivalries from within the timeframe. A comparative approach may or may not be used. While other relevant factors, for example different ideologies and/or styles of leadership, may be referred to, the bulk of the response will remain on the issue raised in the question. Candidates may agree, partly agree or disagree with the statement." },
  { id:"cw1-4",  paper:"P2 CW",   section:"CW1", year:"2022 May TZ1",     question:"\"Fear, rather than aggression, was the main cause of superpower rivalry between 1943 and 1949.\" To what extent do you agree with this statement?", markscheme:"The question requires that candidates consider the merits or otherwise of the statement that fear, rather than aggression, was the main cause of superpower rivalry between 1943 and 1949. Causes may predate the timeframe, but they must be clearly linked to the issue raised in the question. There may be discussion of Stalin’s fear of a reunited, revived Germany, as being partly responsible for the Berlin Blockade. Russian fears of US expansion into Europe were also heightened by the Truman Doctrine and the Marshall Plan. US fears may have been stoked by Kennan’s Long Telegram, which greatly influenced American diplomacy. Russian actions in Eastern Europe, which were arguably in contravention of promises made at Yalta, were regarded by the US as aggressive; however, the USSR was shattered by war, and arguably more motivated by fear. There may be discussion of the impact of the US lead in nuclear weaponry and the failure of the Baruch Plan. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw1-5",  paper:"P2 CW",   section:"CW1", year:"2022 May TZ2",     question:"\"Fear, rather than aggression, was the main cause of superpower rivalry between 1943 and 1949.\" To what extent do you agree with this statement?", markscheme:"The question requires that candidates consider the merits or otherwise of the statement that fear, rather than aggression, was the main cause of superpower rivalry between 1943 and 1949. Causes may predate the timeframe, but they must be clearly linked to the issue raised in the question. There may be discussion of Stalin’s fear of a reunited, revived Germany, as being partly responsible for the Berlin Blockade. Russian fears of US expansion into Europe were also heightened by the Truman Doctrine and the Marshall Plan. US fears may have been stoked by Kennan’s Long Telegram, which greatly influenced American diplomacy. Russian actions in Eastern Europe, which were arguably in contravention of promises made at Yalta, were regarded by the US as aggressive; however, the USSR was shattered by war, and arguably more motivated by fear. There may be discussion of the impact of the US lead in nuclear weaponry and the failure of the Baruch Plan. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw1-6",  paper:"P2 CW",   section:"CW1", year:"2023 November TZ1",question:"\"Fear, rather than aggression, was the main cause of superpower rivalry between 1943 and 1949.\" To what extent do you agree with this statement?", markscheme:"The question requires that candidates consider the merits or otherwise of the statement that fear, rather than aggression, was the main cause of superpower rivalry between 1943 and 1949. Causes may predate the timeframe, but they must be clearly linked to the issue raised in the question. There may be discussion of Stalin’s fear of a reunited, revived Germany, as being partly responsible for the Berlin Blockade. Russian fears of US expansion into Europe were also heightened by the Truman Doctrine and the Marshall Plan. US fears may have been stoked by Kennan’s Long Telegram, which greatly influenced American diplomacy. Russian actions in Eastern Europe, which were arguably in contravention of promises made at Yalta, were regarded by the US as aggressive; however, the USSR was shattered by war, and arguably more motivated by fear. There may be discussion of the impact of the US lead in nuclear weaponry and the failure of the Baruch Plan. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw1-7",  paper:"P2 CW",   section:"CW1", year:"2024 May TZ1",     question:"To what extent did ideology lead to the breakdown of the Grand Alliance in the period 1943–1949?", markscheme:"Candidates may consider the peace-making process during WW2 and the conferences where, despite ideological differences, remnants of the Alliance were still present. It may be argued that after 1945 ideological differences came to the fore as Truman resisted the perceived expansion of Communist ideology both in Europe and Asia. Candidates may consider that ideology may have led to Stalin’s concerns about security and Truman’s concerns about access to markets and trade leading to worsening relations over the Marshall Plan. In Asia, although ideology did not prevent agreement over the partition of Korea, the failure to hold elections in 1948 increased tension by 1949. Similarly, the US was open to the division of China between the CPC and the GMD in 1945 but the USSR and the US took opposing stances in the Chinese civil war. Other relevant factors may be addressed, for example the escalation of fear in the atomic era or, indeed, Great Power rivalry that underpinned the breakdown. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw1-8",  paper:"P2 CW",   section:"CW1", year:"2025 May TZ3",     question:"\"The USSR was more responsible than the US for the emergence of superpower rivalry in Europe between 1943 and 1949.\" To what extent do you agree with this statement?", markscheme:"The question requires that students consider the merits or otherwise of the statement that the USSR was more responsible than the US for the emergence of superpower rivalry in Europe between 1943 and 1949. Reasons may predate the timeframe but they must be clearly linked to the issue raised in the question. Students may assess the impact of the USSR’s ‘salami tactics’ in Eastern Europe that broke promises made by Stalin at Yalta, and played a role in the Czech coup of 1948. Despite this, in accordance with the Percentages Agreement, promises not to intervene in Greece were honoured. The USA’s Truman Doctrine and Marshall Plan increased superpower rivalry, as did the Allies’ decision to unify Trizonia and introduce a new currency in West Germany. The USSR wanted Germany punished and weakened, not rebuilt, as shown by her treatment of East Germany. The USSR’s blockade of Berlin made rivalry worse, as did the formation of a US-led NATO. Students may weigh the impact of US secrecy over its development of nuclear weapons and the failure of the Baruch Plan. Students may agree, partly agree or disagree with the statement, but their opinions or conclusions will be presented clearly and supported by appropriate evidence and sound argument." },
  // CW2
  { id:"cw2-1",  paper:"P2 CW",   section:"CW2", year:"2019 May TZ1",     question:"To what extent did the policy of peaceful co-existence improve superpower relations up to and including 1964?", markscheme:"Candidates may offer equal coverage of improvements and deterioration in superpower relations, or they may emphasize their assessment of one of them; however, both aspects will be a feature of the response. Candidates may refer to Khrushchev’s reference to peaceful co-existence in 1956. Conversely, candidates may refer to Cold War crises during this period, such as Poland and Hungary (1956) or the U2 crisis in 1960 and the war in Congo (1961), and so argue that superpower relations deteriorated. The Cuban Missile Crisis (1962) may be discussed as both a crisis and a relaxation of tension. Do expect candidates to go up to 1964 and the forced retirement of Khrushchev. While other relevant factors, for example the roles of Eisenhower and Kennedy, may be referred to, the bulk of the response will remain on the issue raised in the question." },
  { id:"cw2-2",  paper:"P2 CW",   section:"CW2", year:"2019 May TZ2",     question:"\"China's relations with the USSR and the US were largely shaped by increasing mistrust and suspicion.\" Discuss with reference to the period between 1947 and 1979.", markscheme:"Candidates may offer equal coverage of China’s relations with the USSR and the US, or they may emphasize their discussion of one of them; however, both aspects will be a feature of the response. A comparative approach may or may not be used. Candidates may refer, for example, to Mao’s condemnation of Khrushchev’s policies as “revisionism”, Soviet criticism of the Great Leap Forward, the lack of mutual support during the Sino–Indian dispute and Cuban Missile Crisis or the escalation of suspicion following the Ussuri River border conflict (1969). Alternatively, there may be reference to the expansion of the policy of containment into Asia and the growing concern over American involvement in Korea and also Vietnam, although this was resolved through détente. Reference may also be made to improved relations between the US and China after Nixon’s visit in 1972 and the subsequent inclusion of the People’s Republic of China in the UN, as well as the normalisation of diplomatic relations between the US and China. Candidates may also mention the Chinese concerns over the outbreak of the Soviet-Afghan War in December 1979. Candidates may agree, partly agree or disagree with the statement." },
  { id:"cw2-3",  paper:"P2 CW",   section:"CW2", year:"2019 November",    question:"Evaluate the impact of detente upon US–USSR relations up to the end of 1979.", markscheme:"Candidates may refer to events such as the arms race, rivalry over influence in newly independent countries, agreements over trade and over security. Both strengths and limitations must be clearly indicated but there does not need to be an equal number of each." },
  { id:"cw2-4",  paper:"P2 CW",   section:"CW2", year:"2021 May TZ1",     question:"Evaluate the factors which led to detente between the US and USSR between 1971 and 1979.", markscheme:"Candidates may refer to the financial benefits of reducing arms expenditure for a US drained by the Vietnam War and for a USSR that faced a stalled economy and weak satellite states. With regard to military factors, both countries were deeply aware of their nuclear capabilities (MAD: mutually assured destruction), and having achieved parity, were more prepared to discuss arms limitation. Candidates may also refer to political factors such as the US potential gain from the Sino–Soviet split by fostering separate relationships with both countries whilst driving them further apart; the Soviet wish to secure American recognition of the post-war borders of its satellite states; the impact of Ostpolitik which had relaxed tension in Europe and encouraged trade. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw2-5",  paper:"P2 CW",   section:"CW2", year:"2021 May TZ2",     question:"Evaluate the factors which led to detente between the US and USSR between 1971 and 1979.", markscheme:"Candidates may refer to the financial benefits of reducing arms expenditure for a US drained by the Vietnam War and for a USSR that faced a stalled economy and weak satellite states. With regard to military factors, both countries were deeply aware of their nuclear capabilities (MAD: mutually assured destruction), and having achieved parity, were more prepared to discuss arms limitation. Candidates may also refer to political factors such as the US potential gain from the Sino–Soviet split by fostering separate relationships with both countries whilst driving them further apart; the Soviet wish to secure American recognition of the post-war borders of its satellite states; the impact of Ostpolitik which had relaxed tension in Europe and encouraged trade. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw2-6",  paper:"P2 CW",   section:"CW2", year:"2024 November TZ1",question:"To what extent did the policy of peaceful co-existence improve superpower relations up to 1964?", markscheme:"Candidates may offer equal coverage of improvements and deterioration in superpower relations, or they may emphasize their assessment of one of them; however, both aspects will be a feature of the response. Candidates may refer to Khrushchev’s reference to peaceful co-existence in 1956. Conversely, candidates may refer to Cold War crises during this period, such as Poland and Hungary (1956) or the U2 crisis in 1960 and the war in Congo (1961), and so argue that superpower relations deteriorated. The Cuban Missile Crisis (1962) may be discussed as both a crisis and a relaxation of tension. Do expect candidates to go up to 1964 and the forced retirement of Khrushchev. While other relevant factors, for example the roles of Eisenhower and Kennedy, may be referred to, the bulk of the response will remain on the issue raised in the question." },
  { id:"cw2-7",  paper:"P2 CW",   section:"CW2", year:"2024 November TZ2",question:"\"The US policy of containment up to 1962 had limited success.\" Discuss with reference to events in two regions.", markscheme:"The question requires that students offer a considered and balanced review of the statement that the US policy of containment up to 1962, had limited success. There needs to be discussion of events in two different regions. Students may link the policy of containment to the Truman Doctrine in 1947, with discussion of the Greek civil war and US support for Turkey. The Marshall Plan, as the economic arm of containment, may be judged to have been successful in stemming the tide of communism Europe. The US response to the invasion of South Korea may be seen as the expansion of containment to the Far East, as was US economic support for France in the Indo- Chinese War that may also be seen as “containment” although, it may be argued that this was not immediately successful. The Suez Crisis, despite US criticism of Britain and France, led to the Eisenhower Doctrine intended to limit the growth of Soviet influence in the Middle East, and the US troops being sent to Lebanon in 1958 may also be seen as containment in action in the Middle East. The 1953 coup in Iran was a success for the USA (CIA) that prevented the application of policies that did not further US interests. The establishment of the OAS may also be seen as the successful application of containment to Latin America, as was the Guatemalan coup in 1954. The attempts to “contain” the Cuban Revolution and the subsequent Missile Crisis may be discussed as both a failure, in that Castro remained in office, and a success, in that Soviet missiles were removed. Students’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw2-8",  paper:"P2 CW",   section:"CW2", year:"2025 May TZ1",     question:"\"Ideological factors were the most important in determining Sino-Soviet relations between 1947 and 1979.\" To what extent do you agree with this statement?", markscheme:"The question requires that students consider the merits or otherwise of the statement that ideological factors were the most important in determining Sino-Soviet relations between 1947 and 1979. Students may argue that ideological factors were most important in determining Sino-Soviet relations. They may consider the role of ideology in prompting the USSR to back the fledgling People’s Republic, and for their continuing economic and technical support in the early 1950s. Ideology was also important to the Sino-Soviet Split, brought about by Mao’s disapproval of Khrushchev’s Secret Speech and Khruschev’s espousal of peaceful coexistence. Other relevant factors may be addressed, for example the importance of strategic considerations, as shown by the USSR’s refusal to support the People’s Republic over the Islands Crisis in the Taiwan Strait, their dispute with India, and Mao’s rapprochement with the US in 1972. Even in 1950, Stalin was wary of the People’s Republic as a potential rival for leadership of the Communist world, and relations were strained. Personal factors, such as Mao’s contempt for Khruschev, which contrasted with his respect for of Stalin, may also be considered. There must, however, be a focus on the issue in the question. Students may agree, partly agree or disagree with the statement, but their opinions or conclusions will be presented clearly and supported by appropriate evidence and sound argument." },
  // CW3
  { id:"cw3-1",  paper:"P2 CW",   section:"CW3", year:"2017 November",    question:"\"Confrontation rather than reconciliation ended the Cold War.\" Discuss with reference to the period from 1980 to 1991.", markscheme:"candidates may choose to consider the confrontation between Gorbachev and anti-reformists within the Soviet Union. For reconciliation, the relative harmony that characterized the Reagan–Gorbachev summits as well as the support for economic reforms that came from the populations and some leaders of the Eastern Bloc may be discussed." },
  { id:"cw3-2",  paper:"P2 CW",   section:"CW3", year:"2018 May TZ2",     question:"\"Economic problems between 1980 and 1991 were the most significant reason for the end of the Cold War.\" To what extent do you agree with this statement?", markscheme:"Candidates must consider the merits or otherwise of the proposition that economic problems between 1980 and 1991 were the most significant reason for the end of the Cold War. While they should focus on economic factors, others may be considered for comparison. Candidates should be mindful that the question is about the end of the Cold War and not the collapse of the USSR and Eastern European communist regimes. Therefore, answers should focus on the reasons for the easing of tension between communism and the west. There may be consideration, for example, of the impact of economic problems which afflicted the USSR and Soviet satellite countries in Eastern Europe, which contrasted with relative prosperity in the US and her western allies. Other factors may be considered for comparison, such as the role of leaders and demands for political reform in Eastern Europe." },
