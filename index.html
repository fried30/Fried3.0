  { id:"la1-2",  paper:"P3 LatAm",section:"LA1", year:"2024 November",    question:"\"Social inequality was the main factor leading to the Cuban Revolution.\" To what extent do you agree with this statement?", markscheme:"Candidates will consider the merits or otherwise of the statement that social inequality was the main factor leading to the Cuban revolution. Candidates may support the statement referring to the division between those who worked in the countryside (often farming sugar) and lived in dire poverty, and those who lived in prosperous cities like Havana, and enjoyed high literacy rates, access to new technologies and healthcare. They may also highlight that Cuba’s sugar-based economy proved crippling in many respects. The corruption that reached new heights under Fulgencio Batista also fuelled inequality. Racism and social problems derived from the booming of brothels and casinos like gambling, illicit drugs and sex trade could also be part of the response. Candidates may challenge the statement stating that the ongoing political instability played a major role. They may also focus on the role played by those who thought they had a chance at gaining power and instigated a series of revolts and coups. They can also emphasize other factors like the intervention of the United States, the influence of Marxist ideas, and the role played by the leaders of the Cuban Revolution. Candidates may agree, partly agree or disagree with the statement, but their opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  // LA2
  { id:"la2-1",  paper:"P3 LatAm",section:"LA2", year:"2018 May",         question:"To what extent did the Cuban Revolution and the rule of Fidel Castro bring about political and economic change in Cuba?", markscheme:"Candidates will consider the merits or otherwise of the idea that the Cuban Revolution brought about transformation to Cuban politics and the economy. In doing so, they must consider the political and economic situation of Cuba before and after the Revolution. Some candidates may argue that Castro’s initial efforts were to end dictatorship and remove Cuba’s dependency on the US, while others may assert that a Marxist–Leninist state that eliminated elections, prohibited political opposition and established a state-controlled economy was his intent from the beginning. Candidates may argue that although radical economic changes were implemented, such as the Agrarian Reform and the nationalization of foreign estates and companies, Cuba remained dependent on foreign economies. Some candidates may discuss whether the shift from US to Soviet dependency constituted economic continuity or change for Cuba. While the country changed from a capitalist to a socialist economy, it remained economically dependent on foreign powers." },
  { id:"la2-2",  paper:"P3 LatAm",section:"LA2", year:"2019 May",         question:"Evaluate the contribution of social and cultural policies to Fidel Castro's rule to 1980.", markscheme:"Candidates may offer equal coverage of social and cultural policies, or they may prioritize their discussion of one of them. However, both will be a feature of the response. Candidates may refer to the Literacy Campaign (1961) and other policies to improve access to education. They may discuss health programmes that reduced infant mortality and/or policies towards women. Cultural policies applied propaganda to exaggerate the success of programmes and promote nationalism, reflecting the spirit of the revolution. Other relevant factors, for example the role of the secret police to control dissent, may be referred to, but with a focus on the issue in the question." },
  { id:"la2-3",  paper:"P3 LatAm",section:"LA2", year:"2021 November",    question:"Evaluate the impact of Fidel Castro on Latin America.", markscheme:"Candidates may evaluate the impact of Fidel Castro’s rule, considering the expansion of Communism in Latin America and the role of local Communist parties. Candidates may also evaluate the expansion of guerrilla and urban terrorism and the extent of support they received from Castro. Candidates may also refer to the response of Latin American governments, since many strengthened their armed forces and joined US policies to counter guerrilla operations as a result of Castro’s rule. Many nations also witnessed the ascension of dictatorships as a response to the impact of Fidel Castro. Candidates may highlight that, on the other hand, some governments considered pursuing land reforms and other progressive policies to eliminate the causes of insurgency. Other relevant factors may be addressed, for example the impact Fidel Castro’s rule had on social aspects (like the treatment of opposition), on culture and art. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"la2-4",  paper:"P3 LatAm",section:"LA2", year:"2022 May",         question:"\"Castro's suppression of opposition was the most important factor in his maintenance of power.\" To what extent do you agree with this statement?", markscheme:"Candidates may consider the merits of various strategies implemented by Castro to suppress opposition in his maintenance of power, including, but not restricted to early violence implemented against Batistianos, for example at La Cabaña; early elimination of internal opposition, for example Huber Matos’ imprisonment; and the creation of the G2, CDRs and UMAP camps for the surveillance and confinement of opposition. Candidates may also challenge the assumption proposed by the question in that opposition was not always suppressed but offered opportunities of exile, mainly in the period 1969–1990, also contributing to Castro’s maintenance of power. Other relevant factors that contributed to Castro’s maintenance of power may be addressed, for example the significance of indoctrination strategies and support rallied through significant social reforms and rhetoric attacking US imperialism , but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"la2-5",  paper:"P3 LatAm",section:"LA2", year:"2024 May TZ1",     question:"To what extent were Fidel Castro's economic policies more successful than his cultural policies?", markscheme:"Candidates may offer equal coverage of economic and cultural policies, and of their successes and failures, or they may prioritize their evaluation of either. However, both aspects will be a feature of the response. In terms of economic policy, candidates may discuss the extent to which a sovereign and diversified economy was established. Candidates may also consider the effects of the Agrarian Reform Act (1959), the Second Agrarian Law (1963), the achievements of the industrialization program under Guevara’s lead, the results of the “Year of the Ten Million” (1970), or the economic effects of Cuba’s incorporation into the COMECON (1971). As to cultural policy, candidates may evaluate the proscriptive impact that a policy based on nationalist and revolutionary values bore on the arts. Candidates may also cite cultural achievements of the revolution, consider the artistic and literary proliferation that followed the revolution, or point to the effects of censorship, discussing the Padilla affair (1971) and the “grey years.” Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"la2-6",  paper:"P3 LatAm",section:"LA2", year:"2024 May TZ2",     question:"To what extent were Fidel Castro's political policies more successful than his social policies?", markscheme:"Candidates may offer equal coverage of political and social policies, and of their successes and failures, or they may prioritize their evaluation of either. However, both aspects will be a feature of the response. In terms of political policies, candidates may consider the effects of the February 1959 political reforms, the set-up of the Committees for the Defence of the Revolution, the establishment of the “G2” and the passing of the 1976 constitution and consider their contribution to power consolidation and maintenance. Nevertheless, candidates may also point to their negative impact over civil liberties. As to social policies, candidates may consider the introduction of moral-incentives and self-sacrifice as production incentives or the impact that the revolution bore upon healthcare, housing, gender equality and literacy, among other social indicators. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  // LA3
  { id:"la3-1",  paper:"P3 LatAm",section:"LA3", year:"2017 May",         question:"Compare and contrast the treatment of opposition by two Latin American populist leaders between 1945 and 1980.", markscheme:"Candidates will give an account of the similarities and differences regarding the treatment of opposition between two Latin American populist leaders during the given timeframe, referring to both leaders throughout. Candidates may also give consideration as to the leader’s level of success in limiting opposition. Popular choices will be Fidel Castro and Juan Peron but allow any other relevant example. Issues that may be included are the levels of restriction that were imposed on freedom of speech, censorship of the media, the treatment of other political parties, controls placed over trade unions, the use of violence and repression, treatment of various social classes (either for support or to repress opposition), response to external opposition, and the use of charisma or other opportunistic measures to gain and maintain support." },
  { id:"la3-2",  paper:"P3 LatAm",section:"LA3", year:"2017 November",    question:"Compare and contrast the responses of Latin American populist leaders in two countries to the challenges they faced.", markscheme:"Candidates will give an account of the similarities and differences in the responses of two Latin American populist leaders to the challenges they faced within the given period referring to both leaders throughout. Candidates may, for example, choose to address the comparisons and contrasts in discrete groups, or they may choose to focus on individual arguments. Candidates may address the responses of two leaders to the economic problems in their countries by comparing and contrasting protectionist policies, nationalization of resources and foreign companies, land redistribution, the extent to which infrastructure was developed and industrialization policies. Candidates may refer to social challenges such as illiteracy, malnutrition and social inequality in order to compare and contrast responses including educational reforms and improvements in healthcare. Policies addressing the role of women and minorities, urbanization and housing may also be addressed. Other areas for comparison could be labour legislation and trade union policies, relations with the Church, and foreign policy." },
  { id:"la3-3",  paper:"P3 LatAm",section:"LA3", year:"2019 November",    question:"Compare and contrast the rise to power of two populist leaders in the Americas.", markscheme:"Candidates may compare and contrast the leaders’ relationships with the urban working classes, existing political parties or the Catholic Church. They may refer to the leaders’ appeals to popular discontent with, for example, existing military rule or fraudulent governments. They may compare and contrast ideological factors, the role played by charisma, the use of the media and mass rallies. Both similarities and differences must be clearly indicated, but there does not need to be an equal number of each." },
  { id:"la3-4",  paper:"P3 LatAm",section:"LA3", year:"2022 November",    question:"\"The economic policies of populist leaders had limited success.\" Discuss with reference to two Latin American countries.", markscheme:"Candidates may support the statement by discussing that populist leaders had limited interest in the economy, focusing on political and social policies. Candidates may discuss that the economic plans of many populist leaders were narrow and/or inadequate, and only ensured a limited economic success during a few years. Candidates may also discuss that populist leaders were not successful in changing the traditional economic patterns of their countries, usually predominantly rural and with limited industrialization. They may also discuss populist leaders’ foreign relations as an obstacle. Since some leaders did not have close relations with financial organizations they were not accredited with loans and/or beneficial treaties. Candidates may challenge the statement considering that some countries experienced a modernization and a certain industrialization under the rule of populist leaders. They may also discuss that under populist leaders many citizens entered the middle class, improving their standard of living. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"la3-5",  paper:"P3 LatAm",section:"LA3", year:"2023 May",         question:"Compare and contrast the economic policies of two populist leaders in Latin America.", markscheme:"Candidates may restrict their analysis to one economic period of a populist leader, for example, the economic policies of Peron’s first presidency, or extend their analysis beyond one period. Candidates may compare and contrast economic policy in terms of pursued aims, including self-sufficiency, industrial promotion or social justice; in terms of enacted methods, including ISI or land redistribution; or in terms of results achieved, considering agricultural and/or industrial output, indexes of social or economic integration, or GNP or GDP to compare overall economic growth. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"la3-6",  paper:"P3 LatAm",section:"LA3", year:"2025 May TZ1",     question:"\"Populist leaders in Latin America mainly used violence to deal with opposition.\" With reference to two populist leaders, to what extent do you agree with this statement?", markscheme:"The question requires that students consider the merits of the statement that populist leaders in Latin America mainly used violence to deal with opposition. Students may offer equal coverage of violent and non-violent methods to deal with opposition, or they may prioritize their assessment of one. However, both aspects will be a feature of the response. Examples of populist leaders in Latin America during 1945-80 include Juan Domingo Peron in Argentina (1945-55), Getulio Vargas in Brazil (1951-54) and Joaquin Balaguer in the Dominican Republic (1960-62 and 1966-78), among others. Students may argue that the persecution of political opponents was a violent method that populist leaders used to deal with opposition, citing relevant examples; students may also consider the use of other strategies that did not involve the direct use of violence but that curtailed freedoms, including censorship. Nevertheless, students may argue that violence was not necessarily the main method used to deal with opposition, indicating that paramilitary organizations were not prominent in many cases, although support groups, such as trade unions, were usually used in rallies to produce agitation. Following such lines, students may argue that the main strategy used to deal with opposition involved the concentration of political power. Students’ opinions or conclusions will be presented clearly and supported by appropriate evidence. 27 TZ3. To what extent were the economic policies of two populist leaders in Latin America successful? The question requires that students consider the extent to which the economic policies of two populist leaders in Latin America were successful. Consideration of success may extend beyond the timeframe but it must be clearly linked to the issue raised in the question. Students may offer equal co" },
  { id:"la3-7",  paper:"P3 LatAm",section:"LA3", year:"2025 May TZ2",     question:"\"Populist leaders in Latin America mainly used violence to deal with opposition.\" With reference to two populist leaders, to what extent do you agree with this statement?", markscheme:"The question requires that students consider the merits of the statement that populist leaders in Latin America mainly used violence to deal with opposition. Students may offer equal coverage of violent and non-violent methods to deal with opposition, or they may prioritize their assessment of one. However, both aspects will be a feature of the response. Examples of populist leaders in Latin America during 1945-80 include Juan Domingo Peron in Argentina (1945-55), Getulio Vargas in Brazil (1951-54) and Joaquin Balaguer in the Dominican Republic (1960-62 and 1966-78), among others. Students may argue that the persecution of political opponents was a violent method that populist leaders used to deal with opposition, citing relevant examples; students may also consider the use of other strategies that did not involve the direct use of violence but that curtailed freedoms, including censorship. Nevertheless, students may argue that violence was not necessarily the main method used to deal with opposition, indicating that paramilitary organizations were not prominent in many cases, although support groups, such as trade unions, were usually used in rallies to produce agitation. Following such lines, students may argue that the main strategy used to deal with opposition involved the concentration of political power. Students’ opinions or conclusions will be presented clearly and supported by appropriate evidence. 27 TZ3. To what extent were the economic policies of two populist leaders in Latin America successful? The question requires that students consider the extent to which the economic policies of two populist leaders in Latin America were successful. Consideration of success may extend beyond the timeframe but it must be clearly linked to the issue raised in the question. Students may offer equal co" },
  { id:"la3-8",  paper:"P3 LatAm",section:"LA3", year:"2025 May TZ3",     question:"To what extent were the economic policies of two populist leaders in Latin America successful?", markscheme:"Candidates may offer equal coverage of both states, or they may prioritize their assessment of one of them. However, both aspects will be a feature of the response. Candidates may consider the social change engineered by Nyerere through his extensive Ujamaa scheme, or to Mao’s attempts to introduce communes during the Cultural Revolution. There may be consideration of attempts to boost the birth rate in Nazi Germany and Stalin’s Russia. The significance of educational reform may be considered, for example, in Cuba, where new countryside schools and the Literacy Campaign had a great impact. There may be consideration of policies towards women, for example the impact of the Marriage Law in China. Other relevant factors may be addressed, for example changes brought about by economic or political policies. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence. – 5303M" },
  // LA4
  { id:"la4-1",  paper:"P3 LatAm",section:"LA4", year:"2019 May",         question:"\"Economic rather than social policies were responsible for the crisis of democracy in Latin America.\" Discuss.", markscheme:"Candidates may offer equal coverage of economic and social policies, or they may prioritize their discussion of economic policies. However, both aspects will be a feature of the response. For economic policies, candidates may refer to the limited success in controlling unemployment or inflation; the rise of public deficit; nationalization. Candidates may discuss the extent to which policies to achieve greater social equality, such as agrarian reforms, led to protests against the democratic governments. Other relevant factors, for example, the role of foreign intervention, may be referred to, but with a focus on the issue in the question." },
  { id:"la4-2",  paper:"P3 LatAm",section:"LA4", year:"2022 May",         question:"\"Political factors were the main reason for the failure of elected leaders.\" Discuss.", markscheme:"candidates may refer to the lack of democratic tradition in many countries of the region, in contrast to the strength and organized structure of the military. They may also refer to corruption and inefficiency of elected leaders as political factors leading to their failure. Indeed, candidates may suggest that the military usually justified intervention claiming to be preserving political stability, at a time of crisis. Other relevant factors that contributed to such crisis may be addressed, for example economic (failure to deal with economic modernization), social (inequality and lack of opportunity) and ideological factors (influence of the Cuban Revolution), but with a focus on the issue in the question. Candidates may also examine USA’s role in contributing to the failure of elected leaders. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"la4-3",  paper:"P3 LatAm",section:"LA4", year:"2024 May TZ1",     question:"To what extent were political factors the main cause of the failure of elected leaders in Latin America?", markscheme:"Candidates may opt to answer this question through the examination of a case-study or take on a general approach. Causes may predate the timeframe but they must be clearly linked to the issue raised in the question. Candidates may offer equal coverage of arguments and counterarguments, or they may prioritize their assessment of one. To argue in favour of the suggestion, candidates may consider the weak democratic culture in Latin America, which meant democratic governments could be easily removed. Candidates may also consider the systemic weakness of some political institutions, including justice. Other relevant factors which helped cause the failure of elected leaders may be addressed, for example economic factors, including the lack of economic modernization or failed ISI programs. Candidates may also consider the role of foreign intervention or point to social inequality as a structural factor which helped cause the failure of elected leaders that brought discontent and radicalization. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence. – 5307M" },
  { id:"la4-4",  paper:"P3 LatAm",section:"LA4", year:"2024 May TZ2",     question:"To what extent were economic factors the main cause of the failure of elected leaders in Latin America?", markscheme:"Candidates may opt to answer this question through the examination of a case-study or take on a general approach. Causes may predate the timeframe but they must be clearly linked to the issue raised in the question. Candidates may offer equal coverage of arguments and counterarguments, or they may prioritize their assessment of one. However, both aspects will be a feature of the response. To argue in favour of the suggestion, candidates may consider the lack of economic modernization, which demanded emergency economic policies that resulted in political instability. For example, extreme reliance on the IMF led to the implementation of austerity measures which affected the lower sectors and fostered radicalization. Other relevant factors which helped cause the failure of elected leaders may be addressed, for example weak democratic culture and systemic weakness of some political institutions, the role of foreign intervention, or social inequality as a structural factor that brought discontent and radicalization. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence. – 5311M" },
  // LA5
  { id:"la5-1",  paper:"P3 LatAm",section:"LA5", year:"2017 May",         question:"Evaluate the economic and social policies of one military dictatorship between 1945 and 1980.", markscheme:"Candidates will make an appraisal of one military dictatorship by weighing up the strengths and limitations of its economic and social policies during the given period. Popular examples will be Chile and Argentina but allow any other relevant case study. Economic issues that may be addressed include the extent of state economic intervention, policies imposed to control inflation (for example, through wage and price controls), programmes to promote the development of national industries (for example, through import substitution) and policies aimed to limit or promote exports and imports. Social issues to be evaluated may include control of trade unions, policies towards indigenous peoples, along with censorship and control of the media and educational institutions. Other social effects may include the social impact of economic policies such as increases in poverty along with forced emigrations and repression of human rights." },
  { id:"la5-2",  paper:"P3 LatAm",section:"LA5", year:"2018 May",         question:"Discuss the reasons for the rise to power of a military dictatorship in one country.", markscheme:"Candidates will offer a considered and balanced review of the reasons for the rise to power of a military dictatorship in any one country. This question allows candidates to write about their own national history where appropriate. Prominent choices are likely to be Argentina in 1966 and 1976, Brazil in 1964, Uruguay in 1973 or Venezuela in 1948. While factors contributing to the rise of dictatorships will vary, candidates may discuss the role of external factors such as the Cuban Revolution, the willingness of the US to accept right-wing dictatorships as preferable to socialist regimes and domestic factors such as labour unrest and high inflation. Candidates could also argue that in some cases there had been a longer-term failure to establish the legitimacy of political institutions. Civilian politicians were perceived as weak and/or corrupt. In these circumstances, the military could portray itself as the nation’s saviour." },
  { id:"la5-3",  paper:"P3 LatAm",section:"LA5", year:"2020 November",    question:"Evaluate the effectiveness of the treatment of opposition by one military dictator in Latin America.", markscheme:"Candidates may refer to the wide range of policies used to deal with opposition such as the control of the mass media and the education system; censorship; the suspension of elections; the proscription of political parties, unions, movements and associations. Military dictators in Latin America also compiled black lists of opponents in order to persecute them, force them into exile or to segregate them from social life. Military dictators also applied torture methods to defeat their opponents and discourage any act of rebellion and, in many cases, opponents were illegally imprisoned or killed. Candidates may refer to the effectiveness of these policies considering the survival or not of political parties and civil associations. They may consider the possibility some people had to denounce internationally the treatment of opposition. Also, the return of democratic systems could be considered as a failure of dictators. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"la5-4",  paper:"P3 LatAm",section:"LA5", year:"2023 November",    question:"Discuss the reasons for the establishment of a dictatorship by the military in one Latin American country.", markscheme:"Candidates will offer a considered and balanced review of the reasons for the establishment of a dictatorship by the military in one country. Candidates may refer to the role played by radical groups and guerrilla movements that posed a challenge to democratic governments. They may also discuss the influence of the Cuban revolution that provoked the reaction of many national armies. Candidates may also refer to the influence played by the Western Hemisphere Institute for Security Cooperation (School of the Americas), that trained Latin American armies in counter- insurgence, like in Brazil, Chile and Argentina. They may also consider as a reason the economic crisis that led to destabilization of the democratic systems. The possibility of suffering a foreign invasion and/or the relation with the Soviet Union kept by non- aligned governments could also be a motive for the rise to power of military dictatorships. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"la5-5",  paper:"P3 LatAm",section:"LA5", year:"2023 May",         question:"Evaluate the economic and social impact of a military dictatorship in one country.", markscheme:"Candidates may offer equal coverage of social and economic impact, or they may prioritize their evaluation of one. However, both aspects will be a feature of the response. Popular case studies may include military governments in Brazil after 1964, Uruguay and Chile after 1973, and Argentina after 1976. Candidates may argue military dictatorships often relied on external borrowing, which demanded a liberal approach including structural adjustments and privatizations and assess the economic and social impact of such approach. Candidates may also assess the social impact of political restrictions and violence, including limitations to female participation and human rights’ violations. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"la5-6",  paper:"P3 LatAm",section:"LA5", year:"2024 November",    question:"Discuss the impact of the economic policies of a military dictatorship in one Latin American country.", markscheme:"Candidates will offer a considered and balanced review of the impact of the economic policies of a military dictatorship in one country. Candidates may discuss the economic plans launched by a military dictatorship. While in some cases they started a process of neo-liberalization and structural adjustments, in other cases, they pursued a nationalization of the economy. Neoliberal reforms were initiated during the 1970s and 1980s as a developmental strategy to supersede the import substitution industrialization model. Candidates may discuss the policies that promoted a technocratic approach to society that excluded the popular sector, the measures taken to liberalize capital and labour markets, to privatise state- controlled industries, and to reduce the state regulatory role in the economy. In those countries where a nationalistic approach prevailed it led to the expropriation of lands and foreign companies. Candidates may also discuss the financial market growth, and the marketization of key areas of social provision such as education, health, pensions and housing. They may also discuss the impact of the prohibition, persecution and/or demobilization of the political opposition and unions as an essential policy to launch their economic projects. Their collaboration with several companies could also be part of the response. While other, relevant, factors may be considered, the bulk of the response will remain on the issue raised in the question and candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence. – 9442M" },
  { id:"la5-7",  paper:"P3 LatAm",section:"LA5", year:"2025 May TZ1",     question:"Discuss the reasons for the rise to power of one military dictatorship in Latin America between 1945 and 1980.", markscheme:"Candidates will offer a considered and balanced review of the reasons for the rise to power of a military dictatorship in any one country. This question allows candidates to write about their own national history where appropriate. Prominent choices are likely to be Argentina in 1966 and 1976, Brazil in 1964, Uruguay in 1973 or Venezuela in 1948. While factors contributing to the rise of dictatorships will vary, candidates may discuss the role of external factors such as the Cuban Revolution, the willingness of the US to accept right-wing dictatorships as preferable to socialist regimes and domestic factors such as labour unrest and high inflation. Candidates could also argue that in some cases there had been a longer-term failure to establish the legitimacy of political institutions. Civilian politicians were perceived as weak and/or corrupt. In these circumstances, the military could portray itself as the nation’s saviour." },
  { id:"la5-8",  paper:"P3 LatAm",section:"LA5", year:"2025 May TZ2",     question:"Discuss the reasons for the rise to power of one military dictatorship in Latin America between 1945 and 1980.", markscheme:"Candidates will offer a considered and balanced review of the reasons for the rise to power of a military dictatorship in any one country. This question allows candidates to write about their own national history where appropriate. Prominent choices are likely to be Argentina in 1966 and 1976, Brazil in 1964, Uruguay in 1973 or Venezuela in 1948. While factors contributing to the rise of dictatorships will vary, candidates may discuss the role of external factors such as the Cuban Revolution, the willingness of the US to accept right-wing dictatorships as preferable to socialist regimes and domestic factors such as labour unrest and high inflation. Candidates could also argue that in some cases there had been a longer-term failure to establish the legitimacy of political institutions. Civilian politicians were perceived as weak and/or corrupt. In these circumstances, the military could portray itself as the nation’s saviour." },
  { id:"la5-9",  paper:"P3 LatAm",section:"LA5", year:"2025 May TZ3",     question:"Evaluate the social policies of a military dictatorship in one country in Latin America.", markscheme:"Candidates will make an appraisal of one military dictatorship by weighing up the strengths and limitations of its economic and social policies during the given period. Popular examples will be Chile and Argentina but allow any other relevant case study. Economic issues that may be addressed include the extent of state economic intervention, policies imposed to control inflation (for example, through wage and price controls), programmes to promote the development of national industries (for example, through import substitution) and policies aimed to limit or promote exports and imports. Social issues to be evaluated may include control of trade unions, policies towards indigenous peoples, along with censorship and control of the media and educational institutions. Other social effects may include the social impact of economic policies such as increases in poverty along with forced emigrations and repression of human rights." },
  // LA6
  { id:"la6-1",  paper:"P3 LatAm",section:"LA6", year:"2017 November",    question:"\"The rise of guerrilla movements in Latin America can mainly be attributed to economic factors.\" With reference to one Latin American country, to what extent do you agree with this statement?", markscheme:"Candidates will consider the merits or otherwise of the statement that economic factors were the main factor in the rise of guerrilla movements in one country during the given period. The focus should be on the role of economic factors; however, candidates should also discuss the contributions of other factors, such as political issues or the role of external forces, and may then conclude these played a more significant part in the rise of guerrilla movements. Candidates may argue that economic conditions such as unemployment, poverty and inflation contributed to the rise of guerrilla movements. They may refer to US influence and intervention, domestic political corruption and repression, and Marxist influence as other factors. Candidates may agree, partly agree or disagree with the statement, but their opinions and conclusions will be presented clearly and supported with appropriate evidence." },
  { id:"la6-2",  paper:"P3 LatAm",section:"LA6", year:"2021 May",         question:"Evaluate the consequences of guerrilla movements on the domestic development of one country.", markscheme:"Candidates may refer to political consequences, such as the increase of political instability, the challenges to political or military authority. They may also evaluate the impact of guerrilla violence in spreading panic among the population. Candidates may claim that the confrontations led to an increase in poverty, territorial displacements and the death of innocent citizens. Other relevant factors may be addressed, for example the use of “dirty war” or military repression, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"la6-3",  paper:"P3 LatAm",section:"LA6", year:"2022 November",    question:"Evaluate the impact of guerrilla movements in one Latin American country.", markscheme:"Candidates may evaluate the impact of successful guerrilla movements like in the case of Cuba where the movement was able to establish a new state under different principles. They may also consider the response of Latin American establishments. Many governments (both democratic and dictatorships) strengthened their armed forces and joined US policies to counter guerrilla operations, like in the case of Brazil, Argentina, and Chile. Candidates may also consider the possible disagreements among parties and politicians regarding the treatment of guerrilla. Candidates may also evaluate the psychological impact of the acts performed by guerrillas. While part of the population could have actively or passively supported the guerrilla, in other cases their criminal acts alienated many citizens. Candidates may also evaluate that some guerrilla movements shifted from rural to urban guerrilla warfare with an emphasis on the use of collective terrorism, like in the case of Shining Path in Peru. Other relevant factors may be addressed, for example the economic distress caused by the guerrillas’ attacks. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"la6-4",  paper:"P3 LatAm",section:"LA6", year:"2023 November",    question:"\"Foreign intervention played a significant role in the origins of guerrilla movements.\" Discuss with reference to one country.", markscheme:"Candidates will offer a considered and balanced review of the statement that foreign intervention played a significant role in the origins of guerrilla movements. Candidates may refer to the influence and intervention of the Communist bloc in Latin America that could have influenced the objectives, plans and strategies of the guerrilla movements. Candidates may also consider the help given to guerrilla movements by other foreign countries that provided training and ammunition. Candidates may also discuss that the intervention of Western powers was seen as an intrusion in many countries, reinforcing the support given by the population to the guerrilla movements. Candidates may challenge the statements stating that many guerrillas arose as a consequence of local inequalities, while others had their roots in religious beliefs and/or had a strong ethnic identity. Many guerrilla movements were also the answer to the lack of freedom and democratic practices. Candidates may agree, partly agree or disagree with the statement, but their opinions or conclusions will be presented clearly and supported by appropriate evidence. – 5307M" },
  // LA7
  { id:"la7-1",  paper:"P3 LatAm",section:"LA7", year:"2018 November",    question:"Discuss the origins and growth of the liberation theology movement in Latin America up to 1980.", markscheme:"candidates may argue that the liberation theology movement responded to unaddressed economic and social problems such as poverty and hunger. They may also argue that the Second Vatican Council contributed to its foundation. For growth, candidates may discuss the contribution of working priests and Christian-based neighbour organizations that worked to promote land redistribution and better working conditions. They may argue that the growth of the movement was limited by the Church itself and, in some countries, by military governments as they both objected to what they claimed was a Marxist element in the ideology of the movement." },
  { id:"la7-2",  paper:"P3 LatAm",section:"LA7", year:"2021 May",         question:"\"The liberation theology movement had a significant impact on Latin America.\" To what extent do you agree with this statement?", markscheme:"Candidates may refer to the extent to which liberation theology promoted and achieved change in Latin America. They may assess the impact of their base communities in the fight against poverty and, also, evaluate their work with indigenous communities. Candidates may evaluate the role played by the liberation theology movement in the defence of human rights in countries under military rule or dictatorships and assess the impact of the leaders in this struggle. Other relevant factors may be addressed, for example the challenge posed by liberation theology to the Catholic Church by proposing a “popular church”, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"la7-3",  paper:"P3 LatAm",section:"LA7", year:"2021 November",    question:"Discuss the impact of liberation theology in Latin America up to 1980.", markscheme:"Candidates may discuss that the movement gained strength in Latin America during the 1970s when many countries were under the control of dictatorships. Since the movement stated that ministry should include involvement in political struggle, liberation theologians were often criticized as Marxists and persecuted. Candidates may also discuss one of the most radical aspects of liberation theology: the reorganization of church practices through the model of Christian base communities. Other relevant factors may be addressed, for example the fact that the movement faced the opposition of the US and the Vatican and this had an impact on the extent it gained. Candidates may refer to specific examples of priests involved in the liberation theology, such as: Gustavo Gutiérrez (Peru), Leonardo Boff (Brazil) and Juan Luis Segundo (Uruguay). Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },

  // ── THE COLD WAR AND THE AMERICAS ─────────────────────────────────────────
  // CWA1
  { id:"cwa1-1", paper:"P3 CWA",  section:"CWA1",year:"2018 November",    question:"Discuss the rise of McCarthyism and its effects in the US.", markscheme:"candidates may discuss the Red Scare and Truman\'s anti-communism. Candidates may also address the support for McCarthyism from anti- communist groups. For effects, candidates may argue that McCarthy led a witch hunt and promoted the unfounded persecution of citizens. They may refer to blacklists in Hollywood, the persecution of members of left-wing associations, state officials and politicians, the loss of jobs, and imprisonments. They may discuss the role of the House of Un-American Activities Committee in the investigation of citizens. Candidates may consider the effects of McCarthyism by referring to, for example, official propaganda that warned of the dangers of and prepared the population for atomic war." },
  { id:"cwa1-2", paper:"P3 CWA",  section:"CWA1",year:"2019 May",         question:"Examine the social and cultural impact of the Cold War on the US during Truman's presidency.", markscheme:"Candidates may offer equal coverage of the impact the Cold War upon both society and culture or they may prioritize their examination of one over the other. However, both aspects will be a feature of the response. In the US, candidates may examine McCarthyism and the impact of the House Un-American Activities Committee. An examination may be made of CIA funding for “Encounter” magazine as well as the promotion of modern art to demonstrate freedom of expression. In the USSR, the increased production of consumer goods under Khrushchev to improve living standards may be examined as well as the illicit circulation of samizdat copies of books and articles. In South Africa, promoting anti- communism ensured support from Western powers, prolonging apartheid and strict government control over education and the media. In China, during the Cultural Revolution, the condemnation of the USSR as well as the West, led to a ban on music, art and literature that did not promote Maoist values. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cwa1-3", paper:"P3 CWA",  section:"CWA1",year:"2021 November",    question:"Discuss the social and cultural impact of the Cold War on the Americas up to 1953.", markscheme:"Candidates will offer a considered and balanced review of the social and cultural impact of the Cold War on two countries. The two countries may or may not be from the same region and may or may not be contemporaneous with each other. A comparative approach may or may not be used. Candidates may refer to the ideological impact of Cold War rivalry on society and culture in the USSR where much was made of public access to “high cultural” such as theatre, ballet and orchestral concerts, as well as sporting prowess in events such as the Olympics. The social impact was evident such as travel restrictions, limited access to foreign news and an emphasis on the external threat posed by ideological enemies. In the US, the McCarthy era led to the boycott of Hollywood writers and actors, whilst there was CIA funding for abstract art and Encounter magazine. Meanwhile, fear of nuclear war led to the building of bomb shelters and the inculcation of drills in schools and society at large. In Cuba, the impact of the Cold War led to greater dependency on the USSR and an obligation to follow its cultural and social guideline The cultural and social impact of the Cold War on scientific education, as well as the teaching of History, in specific countries may be discussed. Candidates may also discuss the environmental impact of nuclear testing on society. Candidate\'s’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cwa1-4", paper:"P3 CWA",  section:"CWA1",year:"2022 May",         question:"\"President Truman's containment policy damaged relations between the United States and other countries in the region.\" Discuss.", markscheme:"Candidates may refer to Truman’s focus on the threat of communism in Europe and Asia (Truman Doctrine, Marshall Plan and Korean War), rather than the economic needs of Latin America and the creation of the School of the Americas (SOA) in the Panama Canal Zone to provide anti-communism counter-insurgency training (though often through repression and human rights violations which damaged relations with many Latin Americans). The creation of the Rio Pact and the Organization of American States as hemispheric defense organizations may be cited as examples of limited achievement. Other relevant factors may be addressed, for example the containment policies of post-Truman administrations, so long as the Truman era is initially and adequately developed. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cwa1-5", paper:"P3 CWA",  section:"CWA1",year:"2023 May",         question:"Evaluate the impact of Truman's containment policies within the Americas between 1947 and 1953.", markscheme:"Candidates may argue that Truman’s containment policies strengthened hemispheric solidarity, referring to the Act of Chapultepec, the Rio Pact and the consolidation of the Organization of American States (OAS). They may also evaluate the impact of Truman’s military approach towards the region, strengthening Latin American armed forces through bilateral agreements but failing to address development through economic plans. Candidates may refer to adherence within the region to U.S. broader containment policies, including Canada’s inclusion in the North Atlantic Treaty Organization (NATO) and Colombian participation in the Korean War. Other relevant factors may be addressed, for example the abolition of the Western Hemisphere Defence Program, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cwa1-6", paper:"P3 CWA",  section:"CWA1",year:"2023 November",    question:"Evaluate the impact of McCarthyism on the domestic and foreign policies of the United States.", markscheme:"Candidates may refer to the House Un-American Activities Committee’s investigations, in which many Americans were accused of being communists. They may also consider the hysteria McCarthyism created across the country and the increased fear of the Soviet Union’s reach. Candidates may refer to the impact on the entertainment industry with suspected communists losing their jobs, and the production of patriotic and anti-communist movies. Regarding foreign policy, candidates might suggest that US entry into the Korean War was a result of McCarthyism, though this is debatable. Most of Truman’s foreign policy decisions, and later Eisenhower\'s, were the result of the containment policy more than McCarthyism. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cwa1-7", paper:"P3 CWA",  section:"CWA1",year:"2024 May TZ1",     question:"Evaluate the successes and failures of Truman's foreign policy in the Americas.", markscheme:"Candidates may offer equal coverage of successes and failures, or they may prioritize their evaluation of one. However, both aspects will be a feature of the response. Candidates may consider the Rio Conference (1947) or the creation of the Organization of American States (OAS) to argue that Truman’s foreign policy led to hemispheric cooperation. Candidates may also argue that Truman’s foreign policy prevented the spread of communism within the region, with effective pressure on governments to ban communist parties and coordination of the armed forces into the U.S. defence system. Nonetheless, candidates may argue that the greatest threat to hemispheric stability was poverty rather than communism, and that Truman’s foreign policy failed at addressing the needs for economic development and expansion of democracy in the region. Candidates may also consider the contribution of Truman’s policies towards social discontent in the Americas. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cwa1-8", paper:"P3 CWA",  section:"CWA1",year:"2025 May TZ1",     question:"Evaluate the impact of McCarthyism on the domestic policy of the United States.", markscheme:"Candidates may refer to the House Un-American Activities Committee’s investigations, in which many Americans were accused of being communists. They may also consider the hysteria McCarthyism created across the country and the increased fear of the Soviet Union’s reach. Candidates may refer to the impact on the entertainment industry with suspected communists losing their jobs, and the production of patriotic and anti-communist movies. Regarding foreign policy, candidates might suggest that US entry into the Korean War was a result of McCarthyism, though this is debatable. Most of Truman’s foreign policy decisions, and later Eisenhower\'s, were the result of the containment policy more than McCarthyism. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  // CWA2
  { id:"cwa2-1", paper:"P3 CWA",  section:"CWA2",year:"2017 May",         question:"Discuss the impact of the Korean War on two countries of the Americas.", markscheme:"Candidates will offer a considered and balanced review of the impact of the Korean War on any two countries of the Americas. This may be achieved through a comparison of the chosen countries, by selecting a thematic approach or discussion of the countries separately. Factors that may be addressed include the massive increase in armaments spending, the emphasis of US policy that was placed on stopping communist expansion in Asia and Europe (rather than the Americas), increased fears of thermonuclear war, an increased emphasis on collective security through both the United Nations and the North Atlantic Treaty Organization (NATO), an increased US emphasis on the policy of containment, US receipt of troop assistance from Canada and Colombia, and an increased demand for Latin American commodities benefitting several Latin American economies." },
  { id:"cwa2-2", paper:"P3 CWA",  section:"CWA2",year:"2019 November",    question:"Evaluate the reasons for US participation in the Korean War.", markscheme:"Candidates may refer to US participation as a result of Truman’s containment policy, his desire to protect South Korea from North Korean aggression and a fear that it was orchestrated by Stalin and communist expansionism. They might also include Truman’s reluctance to allow another country to fall to communism after Mao’s victory in the Chinese Civil War. A desire to show that, unlike the League, the United Nations would act against aggression could also be stated." },
  { id:"cwa2-3", paper:"P3 CWA",  section:"CWA2",year:"2021 May",         question:"\"The diplomatic and political impact of the Korean War was limited.\" Discuss with reference to two countries.", markscheme:"Candidates may offer equal coverage of diplomatic and political impact, or they may prioritize their discussion of either. For diplomatic impact, candidates may discuss the war as vindication of the United Nations’s potential to use military force against an aggressor and the establishment of a defence treaty between the US and South Korea. For political impact, candidates may address the war as helping secure support in the US for increased military spending (NSC-68) and Eisenhower’s political benefit in the 1952 election by pledging to end the war. Other relevant factors may be addressed, for example the extensive military involvement of Canada resulted in internal controversy that may have contributed to their decision to maintain official neutrality in the Vietnam War. Conversely, for Colombia, (the only Latin American country to enter the war), there was temporary improvement of relations with the US, but this had little long-term impact, other than the controversy over the treatment of Colombia’s Korean War veterans. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cwa2-4", paper:"P3 CWA",  section:"CWA2",year:"2022 November",    question:"To what extent can US participation in the Korean War be considered successful?", markscheme:"Candidates may refer to the US desire to contain communism, to protect South Korea, and to show the strength of the United Nations against aggression. The US got UN Security Council approval for military action and had the help of 16 other nations. When the war ended, South Korea still existed, and communism had been contained to North Korea. Some might see this as successful. Others might see it as a failure as the US had appeared headed to a sweeping victory with unification of Korea a real possibility. Candidates might refer to China’s entry and the possibility of nuclear war. Candidates might refer to battlefield successes such as the landing at Inchon, driving North Korean forces out of the South and advancing far into North Korea. They might also refer to defeats in the field and the rapid retreat from the North. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cwa2-5", paper:"P3 CWA",  section:"CWA2",year:"2024 May TZ1",     question:"Discuss the reasons which led to the US's entrance into the Korean War (1950).", markscheme:"Candidates may consider Cold War tensions as a significant reason why the U.S. entered the Korean War, arguing that the North Korean invasion of South Korea pushed the Truman Administration to contain the spread of communism in Asia. Candidates may consider international incidents that contributed to the perception that containment in Asia was urgent, including the USSR explosion of an atomic bomb or the signing of the Sino- Soviet pact. Candidates may also argue that an analysis of US foreign policy actions towards Korea during 1947-50 would indicate that intervention was not part of a foreign policy plan, thus pointing at the significance of domestic factors, such as the rise of McCarthyism, in determining intervention. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence. – 5307M" },
  { id:"cwa2-6", paper:"P3 CWA",  section:"CWA2",year:"2025 May TZ2",     question:"\"The US fully achieved its military objectives in the Korean War between 1950 and 1953.\" Discuss.", markscheme:"The question requires that students offer a considered and balanced review of the statement that the US fully achieved its military objectives in the Korean War between 1950 and 1953. Students may offer equal coverage of factors supporting the full achievement of military objectives and factors indicating limited achievement. However, both aspects will be a feature of the response. In order to discuss the extent of achievement, students may refer to the success of the Inchon amphibious assault, the partnership with the UN in establishing a unified command to preserve the independence of S. Korea and the re- establishment of the 38th parallel in defence of South Korean sovereignty. Other relevant factors may be addressed, for example the initial military failures that narrowly averted disaster at the Pusan Perimeter, General MacArthur’s efforts to invade North Korea that resulted in the Peoples Republic of China (PRC) entering the conflict and the subsequent retreat of US and UN forces, and the inability to unify Korea as a democratic republic. Students’ opinions or conclusions will be presented clearly and supported by appropriate evidence. 31 TZ3. Evaluate the importance of the reasons for Eisenhower’s application of the New Look policy. The question requires that students consider the importance of the reasons for Eisenhower’s application of the New Look policy. Reasons may predate the timeframe but they must be clearly linked to the issue raised in the question. Students may consider the importance of reasons, such as the Eisenhower administration’s analysis of the Truman era foreign policy and its costly involvement in the Korean War, concerns that an ever-expanding military budget would strain the economy and lead to recession and loss of Republican control and a belief that the threat of strategic bombing and nuclear weapons could control Soviet aggression. Other releva" },
  // CWA3
  { id:"cwa3-1", paper:"P3 CWA",  section:"CWA3",year:"2019 May",         question:"Discuss the reasons for, and characteristics of, Eisenhower's New Look policy.", markscheme:"Candidates may offer equal coverage of the reasons for and characteristics of the policy, or they may prioritize their discussion of either. However, both aspects will be a feature of the response. As to reasons, candidates may refer to the rising costs of conventional warfare, concerns over inflation and deficits, and the corrupting nature of the military–industrial complex (as expressed in Eisenhower’s farewell address). As to characteristics, candidates may develop the reduction of conventional forces, the expansion of the air force and the Strategic Air Command (SAC), the emerging ballistic missile programme, as well as the increased use of covert operations (for example in Guatemala)." },
  { id:"cwa3-2", paper:"P3 CWA",  section:"CWA3",year:"2021 November",    question:"Discuss the reasons for, and characteristics of, Eisenhower's New Look foreign policy.", markscheme:"Candidates may offer equal coverage of the reasons for and characteristics of the policy, or they may prioritize their discussion of either. However, both aspects will be a feature of the response. As to reasons, candidates may refer to the rising costs of conventional warfare, concerns over inflation and deficits, and the corrupting nature of the military–industrial complex (as expressed in Eisenhower’s farewell address). As to characteristics, candidates may develop the reduction of conventional forces, the expansion of the air force and the Strategic Air Command (SAC), the emerging ballistic missile programme, as well as the increased use of covert operations (for example in Guatemala)." },
  { id:"cwa3-3", paper:"P3 CWA",  section:"CWA3",year:"2024 May TZ2",     question:"To what extent was Eisenhower's foreign policy in the Americas successful?", markscheme:"Candidates may offer equal coverage of policies that exemplified success and those that were failures, or they may prioritize their evaluation of either. However, both aspects will be a feature of the response. Candidates may consider Eisenhower’s New Look policy in Latin America with the implementation of CIA covert operations, which aimed at rolling back perceived communist threats. Candidates may illustrate with the case of Guatemala (1954). Candidates may point to fostered cooperation with the armed forces of the region and assess the long-term consequences of promoting containment through military rather than economic means. Candidates may point to the Cuban Revolution of 1959 to evidence failure of Eisenhower’s containment policies. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cwa3-4", paper:"P3 CWA",  section:"CWA3",year:"2025 May TZ3",     question:"Evaluate the importance of the reasons for Eisenhower's application of the New Look policy.", markscheme:"Candidates will make an appraisal of the reasons for the decision of the US to deploy atomic weaponry against Japan. The reasons may cover a range of issues, be they political, military, strategic, emotional or scientific. Candidates might include the Japanese refusal to surrender and the American fear that an invasion of Japan would be very costly (financially and in the number of lives lost). They may also refer to the cost of building the bomb, the desire for revenge for Pearl Harbor, and the desire to show American power to the Soviets. The response should not discuss the results of the bombing on the war or subsequent events, nor should it describe the immediate effects of the bomb." },
  // CWA4
  { id:"cwa4-1", paper:"P3 CWA",  section:"CWA4",year:"2017 November",    question:"Discuss the reasons for the changing nature of US involvement in Vietnam from 1954 to 1975.", markscheme:"Candidates will offer a considered and balanced review of the reasons for the changing nature of US involvement in Vietnam during the given period. Opinions or conclusions should be presented clearly and supported by appropriate evidence. The changing nature could be interpreted as the amount of involvement as well as the type of involvement. The fear of communism and the containment policy were responsible for limited financial and military support for South Vietnam from 1954 through to 1960. Kennedy (1961–1963) greatly increased the number of military advisors and implemented the strategic hamlet programme. Using the Gulf of Tonkin Resolution, Johnson (1963–1968) changed American involvement to combat troops. This Americanization of the war significantly increased the number of US troops. The anti-war movement, the Tet Offensive and the presidential campaign of 1968 led Nixon (1969–1974) to adopt the policy of Vietnamization, decreasing US involvement. Candidates may also discuss the changing nature of strategy from heavy reliance on land forces to increased use of air power because of the anti-war movement and desire to limit US casualties." },
  { id:"cwa4-2", paper:"P3 CWA",  section:"CWA4",year:"2017 May",         question:"Discuss the reaction of either Canada or Latin America towards US involvement in the Vietnam War.", markscheme:"Candidates will provide a considered and balanced review of the reaction of either Canada or Latin America to US involvement in the Vietnam War and may consider both governmental policy and public reaction. Latin America may be considered in respect to either one or more countries or the collective whole. Canada may be addressed in respect to its formal neutrality (though serving as a testing area for US munitions), economic benefits from production of war materials, and providing up to 30,000 volunteers for the US military while also allowing refuge to thousands of US draft- dodgers and deserters. Latin American issues may include nominal economic assistance to the Republic of South Vietnam, Cuba’s supply of engineers and doctors to North Vietnam, student protests against the war and a more critical assessment of US foreign policy." },
  { id:"cwa4-3", paper:"P3 CWA",  section:"CWA4",year:"2018 May",         question:"\"Fear of communist expansion was the main reason for US involvement in Vietnam.\" To what extent do you agree with this statement?", markscheme:"Candidates will consider the merits or otherwise of the argument that US involvement in Vietnam was caused by the fear of communism and its expansion. They may apply relevant background for US involvement through treatment of issues as early as the end of the Second World War. However, the focus must be on supporting, opposing or modifying the given motive for US involvement in Vietnam. Factors that may be addressed include post-war acceptance of the containment and “domino” theories, interpretation of events in Eastern Europe and Korea as reflecting a communist intent toward global domination, failure to recognize conditions in Vietnam as reflecting competing interests for Vietnamese nationalism, and President Johnson’s fear that the failure to deter North Vietnamese advancement would jeopardize his re-election efforts and threaten the achievement of his domestic agenda." },
  { id:"cwa4-4", paper:"P3 CWA",  section:"CWA4",year:"2020 November",    question:"Compare and contrast the policies of Kennedy and Johnson regarding US involvement in Vietnam.", markscheme:"Candidates may refer to both presidents wanting to aid South Vietnam and prevent it from falling to communism. Both presidents gave military and financial aid to South Vietnam and both presidents increased US involvement throughout their presidencies. Contrasts are in the methods used to help South Vietnam. Kennedy continued the use of military advisors, increasing their number to nearly 16,000 to train the South Vietnamese army. He also employed the Strategic Hamlet Program. Johnson, after getting the Gulf of Tonkin Resolution, sent in combat troops in 1965 and began the campaign known as Operation Rolling Thunder, the heavy bombing of North Vietnam. Johnson “Americanized” the war, sending more and more US combat troops into action. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cwa4-5", paper:"P3 CWA",  section:"CWA4",year:"2022 May",         question:"\"The Vietnam War ended as a result of the domestic effects that it caused in the United States.\" Discuss.", markscheme:"Candidates may refer to the shock of the Tet Offensive in 1968 leading to credibility issues for the Johnson administration, implementation of the draft that greatly increased opposition to the war, revelations of atrocities such as the My Lai Massacre, Kent State and Jackson State shootings, growth of anti-war protests, substantial increase in US deaths (58 000 by the end of the war), and the revelations of the Pentagon Papers in 1971. Other relevant factors may be addressed, for example awareness of the corruption of the South Vietnamese government, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cwa4-6", paper:"P3 CWA",  section:"CWA4",year:"2022 November",    question:"Examine the response of Canada and Latin America to US involvement in Vietnam.", markscheme:"Candidates may examine the lack of support from Canada for US participation. Canada did not participate militarily or publicly support US action in Vietnam and most Canadians opposed the war. However, Canadian business profited nicely from the war by selling needed materials to the Pentagon, and thousands of Canadians volunteered in the US to fight in the war. Because of its neutrality, Canada was a safe haven for thousands of US draft resisters and deserters. Anti-war protests were common in Canada. In general, Latin American countries did not support US efforts in Vietnam. Some, like Cuba, saw it as another example of American imperialism and denounced US participation. Cuba sent doctors and medical supplies to North Vietnam. Anti-war protests occurred in Cuba, Chile and Mexico. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cwa4-7", paper:"P3 CWA",  section:"CWA4",year:"2024 November",    question:"Compare and contrast the policies of Johnson and Nixon regarding US involvement in the Vietnam War.", markscheme:"Candidates may consider that both presidents had a containment approach to the war which included the use of a ‘flexible military response’. Consequently, Johnson introduced ‘Operation Rolling Thunder, and Nixon sanctioned the bombing of Cambodia and Laos, and the continued bombing of North Vietnam. Candidates may consider the increase in number of US troops under both presidents. Candidates may consider that Johnson oversaw a significant escalation of US involvement whereas Nixon sought to end US involvement in the conflict with a policy of ‘Peace with honour’ and Vietnamization. Candidates may consider that there were differences in military tactics from the extensive use of search and destroy to shifting the military responsibility to the South Vietnamese military. Similarities and differences must be clearly indicated but there does not need to be an equal number of each. – 9442M" },
  // CWA5
  { id:"cwa5-1", paper:"P3 CWA",  section:"CWA5",year:"2017 November",    question:"Discuss the reasons for, and the impact of, the Panama Canal Treaty of 1977.", markscheme:"Candidates will offer a considered and balanced review of the reasons for the US and Panama to negotiate the treaty and then discuss the impact of the treaty for both countries. Candidates must address both parts of the question, but accept some imbalance in the treatment of each. Opinions or conclusions should be presented clearly and supported by appropriate evidence. Reasons for the treaty could include anti-US riots in Panama, increasing tensions between the two countries and President Carter’s desire to improve relations with Panama, specifically, and Latin America in general. Panamanian reasons include wanting to end US domination, a desire to control the important canal and to benefit economically. The treaty ended the Panama Canal Zone in 1977 and gave the canal to Panama in 1999. The US retained the right to defend the canal. Other effects were increased nationalism in Panama, better US-Panama relations as well as better US-Latin American relations in general. In the US, the treaty caused some political discord and a dislike of Carter for “giving away” the canal." },
  { id:"cwa5-2", paper:"P3 CWA",  section:"CWA5",year:"2018 May",         question:"\"President Carter was successful in his attempt to advance human rights in the Americas.\" To what extent do you agree with this statement?", markscheme:"Candidates will consider the merits or otherwise of the argument that President Carter’s human rights policy in the region was successful. Opinions are likely to differ and candidates may consider both the stated intentions of the Carter administration as well as the actual policies applied. Issues that candidates may address include Carter’s support for an annual Congressional human rights report to help focus public attention on the issue, reduction or elimination of arms sales to countries involved in human rights abuses, initiation and passage of the Panama Canal Treaty, ending of US backing for Somoza in Nicaragua and support for African American and gender equality civil rights issues in the US. Critics have also argued that Carter did little to deter the CIA from circumventing the arms sale ban and that he failed to stop sales approved by previous administrations." },
  { id:"cwa5-3", paper:"P3 CWA",  section:"CWA5",year:"2018 November",    question:"Discuss the effect on Chile of Nixon's covert operations.", markscheme:"Candidates may adopt a chronological or a thematic approach to the question. In their responses, they may refer to Central Intelligence Agency (CIA) activities against Allende\'s election and government and discuss their impact on his fall. Candidates may argue that the covert operations funded labour unions and promoted strikes and protests. They may claim that Nixon financed some opposition groups and the press. Further, they may address the fact that the CIA provided weapons to Chilean military forces. Candidates may also discuss the impact of Nixon\'s economic measures on Chile. They may refer to the end of US economic assistance, the discouragement of foreign investments and the disruption of the international copper market as complementary ways to bring about instability." },
  { id:"cwa5-4", paper:"P3 CWA",  section:"CWA5",year:"2021 May",         question:"Compare and contrast the foreign policies of John F Kennedy and Lyndon B Johnson.", markscheme:"candidates may address the dominance held by foreign policy issues in both administrations (Kennedy with the Cuban Missile Crisis and Johnson with Vietnam); that both engaged in a military invasion of a Latin American country (Kennedy in Cuba and Johnson in the Dominican Republic); the commitment of both to the maintenance of independent government for South Vietnam. For contrast, candidates may discuss Kennedy’s refusal to approve a combat role for the US in Vietnam, while Johnson committed over 500 000 troops; Kennedy’s attempt to improve relations with Latin America through the Peace Corp and Alliance for Progress, while Johnson did not have comparable initiatives. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cwa5-5", paper:"P3 CWA",  section:"CWA5",year:"2023 May",         question:"To what extent was Kennedy's Alliance for Progress successful?", markscheme:"Candidates may offer equal coverage of successes and failures, or they may prioritize their treatment of one. However, both aspects will be a feature of the response. Candidates may refer to the programme’s extent of success at achieving the targeted 2.5% GDP growth across the continent, creating a Latin American free trade area to facilitate the flow of goods and capital, and promoting land reform. They may also evaluate the program’s extent of success at promoting democracy and social reform, including the reduction of adult illiteracy, advancement of housing and health programmes, and enactment of labor reforms. It may also be argued that the programme was largely a failure due to the minimal extent of land reform achieved and the replacement, during the 1960s, of many constitutional governments by military dictatorships. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cwa5-6", paper:"P3 CWA",  section:"CWA5",year:"2024 November",    question:"To what extent did Kennedy's policy of Alliance for Progress improve relations between the US and Latin America?", markscheme:"Candidates will consider the merits or otherwise of the suggestion that Kennedy’s policy of Alliance for Progress improved relations between the US and Latin America. Candidates may consider that the policy included the Agency for International Development and proposed a loan of $20 billion dollars for Latin America. Candidates may also consider the policy was designed to promote democracy, land redistribution, economic and social reform, improved literacy, health, education and technology. All of these were to raise living standards in Latin America. Candidates may consider that Congress was reluctant to provide all the funds and resisted land redistribution as socialism. Candidates may consider that relations were not improved as Latin American countries were critical of the policy’s reliance for them to buy US goods. Also, relations soured as at the same time Kennedy cut off, or suspended, diplomatic relations with some Latin American countries, such as Cuba, Ecuador and the Dominican Republic. Candidates may also consider that by the early 1970s 13 Latin American countries had governments replaced by military dictatorships as evidence that the policy did not improve relations. Candidates may agree, partly agree or disagree with the statement, but their opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cwa5-7", paper:"P3 CWA",  section:"CWA5",year:"2024 May TZ2",     question:"Discuss the reasons which contributed to the US's involvement in Chile in the period 1970–73.", markscheme:"Candidates may examine the impact that the rise of Castro in Cuba bore on U.S. foreign policy towards Latin America and argue that covert operations in Chile were yet another example of manipulation of domestic policy to prevent the rise of communism in the region. Nevertheless, candidates may also argue that it was not only national security concerns that led the U.S. to intervene in Chile but also a desire to safeguard its international credibility. They may also discuss domestic pressures, including pressure exerted by major US corporations, clients of Nixon’s law firm, or the influence of Kissinger. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence. – 5311M" },
  { id:"cwa5-8", paper:"P3 CWA",  section:"CWA5",year:"2025 May TZ1",     question:"Evaluate the impact of Carter's foreign policy on the Americas.", markscheme:"Students will make an appraisal of the impact of Carter’s foreign policy on Latin America. Impact may extend beyond the timeframe, but it must be clearly linked to the issue raised in the question. Students may evaluate the impact of the reorientation of US foreign policy under Carter with a new focus on human rights, democratic values, nuclear non-proliferation and global poverty, and the impact this had on the Americas. Students may also evaluate the impact of Carter’s declaration that US interventionism was over and his condemnation of the coup that had overthrown Chile’s democratically elected President. There may be consideration of the Panama Canal Treaty and its impact on and significance for Panama. Students may also evaluate the impact of the cutbacks to military aid in the Americas and its consequences and the suspending of the military financing of Argentina’s Junta. Students may also refer to the weaknesses in Carter’s foreign policy such as, some military elites in the Americas willing to forgo US support entirely, the downfall of the Nicaraguan anti- communist dictator and engaging with the Sandinista. Students’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
