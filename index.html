  { id:"cw3-3",  paper:"P2 CW",   section:"CW3", year:"2020 November",    question:"To what extent was the arms race the most important reason for the end of the Cold War (1980–1991)?", markscheme:"Candidates may refer to the Second Cold War during the early 1980s that resulted when the US increased its defence spending and invested in researching technology for the Strategic Defence Initiative (SDI). This coincided with a weakening economy in the USSR, exacerbated by falling oil prices and the cost of the Soviet–Afghan War. When Gorbachev became General Secretary, he looked for ways to reduce defence costs. Arguably, this led to arms reduction treaties and the end of the Cold War. Candidates may challenge the argument by claiming that the political and economic consequences of Gorbachev’s reforms within the USSR or the collapse of the Eastern Bloc were of equal or greater importance than the arms race in ending the Cold War. Candidates’ opinions and conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw3-4",  paper:"P2 CW",   section:"CW3", year:"2021 November",    question:"\"The arms race made the greatest contribution to the ending of the Cold War.\" Discuss with reference to the period between 1980 and 1991.", markscheme:"Candidates may discuss the impact of Reagan reigniting the arms race during his first term as president and how this contributed to further economic pressure on a USSR already struggling to maintain nuclear parity. Economic problems that plagued the USSR and were deepened by the burden of the Soviet-Afghan War may be discussed, as these meant that the USSR could no longer afford to compete with US spending on arms. Candidates may also argue that the USSR lagged behind US advances in computer-controlled weaponry and this, along with apprehension about the Strategic Defense Initiative, made it open to arms limitation and a further reduction in Cold War tension. Candidates may challenge the statement by arguing that other factors were of greater importance in ending the Cold War. These may include Gorbachev’s glasnost and democratic reform policies that led to warmer relations with Europe and the US; the breaking away of the satellite states; the breaking up of the USSR. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw3-5",  paper:"P2 CW",   section:"CW3", year:"2023 May TZ2",     question:"\"Reconciliation was more important than confrontation in superpower relations.\" Discuss with reference to the period between 1980 and 1991.", markscheme:"Candidates may offer equal coverage of reconciliation and confrontation, or they may prioritize their discussion of one of them. However, both aspects will be a feature of the response. Candidates may discuss confrontation in the forms of the US boycott of the Moscow Olympics in response to the USSR’s invasion of Afghanistan, the Soviet Union’s disregard for the Helsinki Agreements, and the policies of the early Reagan years, characterised by hostile rhetoric and increased military spending. The SDI initiative may be discussed. Reconciliation came with Gorbachev’s foreign policy and Reagan’s willingness to discuss nuclear disarmament, resulting in successful negotiations of the INF treaty and, later on, of START. Reconciliation was also seen in superpower cooperation at the UN, to the benefit of peace agreements in Namibia and Cambodia, and Middle Eastern diplomacy; also, the USSR did not prevent the US led coalition from intervening in Kuwait in the in the First Gulf War.. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw3-6",  paper:"P2 CW",   section:"CW3", year:"2024 May TZ2",     question:"To what extent were economic factors the main reason for the end of the Cold War in the period 1980–1991?", markscheme:"Candidates may discuss other factors such as the resurgence of nationalism in the Soviet Republics and the impact of the 1988 constitution, which changed the structure and composition of the Supreme Soviet and led to demands for further reform and change. The significance of Gorbachev as a reformer, open to ties to the West, was also a crucial factor, as was his failure to recover power after the 1991 coup. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw3-7",  paper:"P2 CW",   section:"CW3", year:"2024 November TZ2",question:"\"Ideological challenges and dissent were the most significant reasons for the end of the Cold War.\" To what extent do you agree with this statement?", markscheme:"The question requires that students consider the merits or otherwise of the suggestion that ideological challenges and dissent were the most significant reasons for the end of the Cold War. It may be considered that under the rule of Brezhnev, Andropov and Chernenko, the USSR did not waver ideologically in its commitment to Communism and its suppression of dissent, but that under Gorbachev, glasnost undermined government control of both ideology and dissent and democratisation gave voice to critics of Communism, unleashing a resurgence of nationalism. These challenges may be considered crucial to the collapse of the USSR and the end of the Cold War. Other reasons that may be considered either more or less significant include the poor economic state of the USSR and the Eastern Bloc during the 1980s as this contributed to strikes and protests that undermined Communist rule. The cost of the Soviet-Afghan War, as well as the failure to keep up with arms technology, may also be considered as significant to the eventual collapse of the one-party state. By 1988, changes to the constitution gave a voice to dissent, and the relaxation of censorship led to criticism of the USSR. Another reason that may be considered more or less significant would be the policies of President Reagan, who significantly increased US spending on arms knowing the USSR could not keep up. With the timeframe going up to1991, students would be expected to consider the collapse of the USSR in December 1991 as the end of the Cold War. Students’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw3-8",  paper:"P2 CW",   section:"CW3", year:"2025 May TZ3",     question:"\"Confrontation was more important than reconciliation in ending the Cold War.\" To what extent do you agree with this statement?", markscheme:"The question requires that students consider the merits or otherwise of the statement that confrontation was more important than reconciliation to ending the Cold War. Students may weigh the importance of conciliatory acts such as the Soviet withdrawal from Afghanistan, Gorbachev’s ‘Sinatra Doctrine’ in Eastern Europe, and his offer of the ‘zero option’ in nuclear diplomacy. In time, both Gorbachev and Reagan adopted more conciliatory styles, which were mirrored in Gorbachev’s domestic reform programme, culminating in Reagan’s abandonment of the ‘evil empire’ description of the USSR. Both sides showed willingness to engage in ambitious arms reduction programmes for the first time (for example, the INF treaty and START). These examples may be weighed against Reagan’s initially inflammatory rhetoric, coupled with increased arms spending and SDI, and his disavowal of détente. Students may consider whether this hard-line approach exerted significant pressure on the USSR, or whether economic considerations were more important. Other relevant factors may be addressed, for example the strength of NATO leadership at this time, notably Reagan, Thatcher, Kohl and Mitterrand, which strengthened western resolve, but with a focus on the issue in the question. The focus must, however, be on policies and events that led to the end of the Cold War. Students may agree, partly agree or disagree with the statement, but their opinions or conclusions will be presented clearly and supported by appropriate evidence and sound argument." },
  // CW4
  { id:"cw4-1",  paper:"P2 CW",   section:"CW4", year:"2017 November",    question:"Evaluate the impact of two leaders, each from a different region, on the course of the Cold War.", markscheme:"Candidates need to make an appraisal of the impact of two leaders upon the course of the Cold War. The term “leaders” applies to political leaders who led their respective states within the period of the Cold War and while the focus of the response must be within the timeframe of this topic, the two leaders need not be contemporaries. They must, however, be chosen from different regions. The response must refer specifically to the way in which the chosen leaders affected the course of the Cold War and this could be addressed by explaining how their policies may have improved or worsened superpower relations. Alternatively, leaders of smaller states may also be chosen as examples if they had considerable impact on the course of the Cold War by commencing actions that led to wars or crises." },
  { id:"cw4-2",  paper:"P2 CW",   section:"CW4", year:"2018 May TZ2",     question:"Compare and contrast the impact of two leaders, each from a different region, on the development of the Cold War.", markscheme:"Candidates will give an account of the similarities and differences between the impact of two leaders on the development of the Cold War, referring to both leaders throughout. While the focus of the response must be within the timeframe of this topic, the chosen leaders need not have been contemporaries. They must, however, be drawn from different regions. The response must compare specifically the ways in which the chosen leaders affected the course of the Cold War and this could be addressed with reference to their policies that may or may not have improved or worsened superpower relations. Alternatively, leaders of smaller states may have had considerable impact on the course of the Cold War by commencing actions that may have led to wars or crises." },
  { id:"cw4-3",  paper:"P2 CW",   section:"CW4", year:"2019 May TZ2",     question:"\"The actions of individual leaders had a significant impact on the development of the Cold War.\" Discuss with reference to two leaders, each from a different region.", markscheme:"Candidates may offer equal coverage of both leaders, or they may emphasize their discussion of one of them; however, both leaders will be a feature of the response. A comparative approach may or may not be used. Candidates may refer to the leaders’ roles in the establishment of a new pro- communist government, their involvement in proxy wars, or their promotion of the development of technology and/or armaments. Candidates may also refer to actions that led to divisions within one of the blocks, and the impetus this may have given to rapprochement with rival powers, their willingness to sign treaties, or to decrease military armament and/or involvement. Candidates may agree, partly agree or disagree with the statement." },
  { id:"cw4-4",  paper:"P2 CW",   section:"CW4", year:"2021 November",    question:"Examine the influence of two leaders, each chosen from a different region, on the development of the Cold War.", markscheme:"Candidates may examine the influence of Stalin and Truman, for example, upon the early years of the Cold War attributing its origins either to one or to both. Other appropriate examples of superpower leaders would be Nixon and Mao or Reagan and Gorbachev whose relationship did much to change the trajectory of the Cold War. The influence of Non-Aligned leaders such as Sukarno and Nasser may be examined, and links made to how they were able to impact the Cold War policies of the US and/or the USSR. Similarly, the influence of Castro or Ho Chi Minh may be examined to demonstrate how the leaders of client states were able to impact the development of the Cold War. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw4-5",  paper:"P2 CW",   section:"CW4", year:"2023 May TZ1",     question:"With reference to two leaders, each from a different region, evaluate their impact on the development of the Cold War.", markscheme:"Candidates may offer equal coverage of the leaders, or they may prioritize their evaluation of one of them. However, both leaders will be a feature of the response. In the context of the development of the Cold War, candidates may evaluate the impact of Stalin, whose policies in eastern Europe and support of North Korea contributed to rising tension. Castro’s role in accepting Russian missiles onto Cuban soil, and support for overseas socialist revolutions, or Nixon’s adoption of détente, rapprochement with China and withdrawal from Vietnam, may be evaluated. Other choices could include Truman, the pioneer of containment who faced down the Soviet challenge over Berlin in 1948, Brandt, the architect of Ostpolitik, or Mao, who fought the US in Korea, stoked tension with the Islands Crisis, broke with the USSR, and opened the door to US diplomacy. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw4-6",  paper:"P2 CW",   section:"CW4", year:"2023 May TZ2 (Q24)",question:"Discuss the impact of two leaders, each chosen from a different region, on the course of the Cold War.", markscheme:"Candidates may offer equal coverage of both leaders, or they may prioritize their discussion of one. However, both leaders will be a feature of the response. Candidates may discuss the influence of Truman and the use of the atomic bomb, as well as his criticism of Stalin’s failure to honour the Yalta agreements on democracy in Europe. The Truman Doctrine followed by the Marshall Plan both influenced the course of the Cold War. Stalin’s policies in Eastern Europe solidified division between East and West in Europe. Kennedy and Khrushchev may be seen as negatively influencing the Cold War but also to have initiated the early stages of détente. The impact of Nixon’s presidency may be discussed with a focus on détente and better relations with both the USSR and China. Candidates may discuss the impact of other leaders on the course of the Cold War, including Gorbachev, Nasser, Sukarno and Castro. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw4-7",  paper:"P2 CW",   section:"CW4", year:"2024 November TZ1",question:"Evaluate the impact of two leaders, each chosen from a different region, on the course of the Cold War.", markscheme:"The question requires that students make an appraisal of the impact of two leaders, weighing up the significance or otherwise of their impact on the course of the Cold War. The two leaders must be chosen from different regions. Students may offer equal coverage of both leaders, or may prioritize their evaluation of one. However, both will be a feature of the response. Students may evaluate Truman’s impact on the course of the Cold War through his policy of containment, as evidenced by his response to the Berlin Blockade, the Korean Crisis and the establishment of NATO. An evaluation of Stalin’s impact may include his refusal to allow democratic elections in countries occupied by the Red Army, his support of spy networks in many Western countries as well as actions such as the Berlin Blockade, a Friendship Treaty with the PRC and the sending of arms and advisors to Korea. An evaluation of Sukarno’s impact on the course of the Cold War may include his hosting the initial meeting of what became the Non-Aligned Movement. This led to member states distancing themselves from the US perhaps making the Cold War less bilateral and fuelling US suspicions of USSR expansionism. Similar evaluation may be made of the impact on the Cold War of Tito, Nehru and Nasser. An evaluation of the impact of Kim Il Sung may include his invasion of South Korea that led to a proxy war that weakened PRC links to the USSR and led to the establishment of SEATO. Kennedy and Khrushchev and their involvement in the Cuban Missile Crisis may be evaluated as this led not only to the near-miss of nuclear war but, in its aftermath, improved superpower relations. Students’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw4-8",  paper:"P2 CW",   section:"CW4", year:"2025 May TZ2",     question:"\"The impact of Cold War leaders was to increase, rather than reduce, superpower tensions.\" Discuss with reference to two leaders, each chosen from a different region.", markscheme:"The question requires that students offer a considered and balanced review of the statement that the impact of Cold War leaders was to increase, rather than reduce, superpower tensions. The two leaders must be from different regions. Impact may extend beyond the timeframe, but it must be clearly linked to the issue raised in the question. Students may offer equal coverage of the two leaders, or they may prioritize their discussion of one of them. However, both leaders will feature in the response. Students may discuss Truman’s response to Soviet policy which, through the Truman Doctrine, Marshall Plan and formation of NATO, increased tension, as did Khrushchev’s approaches over Cuba and Berlin, although tensions eased with the Partial Test Ban Treaty in 1963. Nixon’s role in easing superpower tensions by ending the Vietnam War and promoting détente may be discussed; his rapprochement with Mao had the opposite effect. Reagan heightened tensions with his early rhetoric and SDI, but eased them with his subsequent diplomacy, in cooperation with Gorbachev, leading to arms reduction agreements and, ultimately, the removal of the Berlin Wall and the Iron Curtain. Students may discuss the impact of Castro’s anti-US policies, his close relationship with the USSR, and support for communist revolutionary groups overseas. While other, relevant, factors may be referred to, the bulk of the response will remain on the issue raised in the question. Students’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  // CW5
  { id:"cw5-1",  paper:"P2 CW",   section:"CW5", year:"2017 May",         question:"Evaluate the impact of Cold War tensions on two countries (excluding the USSR and the US).", markscheme:"Candidates will make an appraisal of the impact of Cold War tensions on two countries of their choice. While the focus of the response must be within the timeframe of the Cold War, the impact on the two countries does not need to be contemporaneous and they may or may not be chosen from the same region. The candidates must not use either the USSR or the US as these are excluded in the History Guide. Candidates may choose to deal with the impact of Cold War tensions on each country separately. Alternatively, candidates may deal with the question thematically and gauge how individual issues affected the two states in the same or different ways and/or to the same or a different extent. There may also be an attempt to deal with the issues chronologically." },
  { id:"cw5-2",  paper:"P2 CW",   section:"CW5", year:"2019 May TZ1",     question:"\"The impact of Cold War tensions was mainly economic.\" Discuss with reference to two countries (excluding the USSR and the US).", markscheme:"Candidates may offer equal coverage of the impact of Cold War tensions on both countries or they may emphasize their discussion of one of them; however, both countries will be a feature of the response. A comparative approach may or may not be used. Candidates may refer to the economic impact of the participation in or exclusion from aid programmes, for example the Marshall Plan, or the impact on commerce of trade links/limitation with rival countries. Candidates may also refer to internal conflicts lengthened by superpower involvement, such as the Vietnam War, and the associated war costs. While other relevant factors, for example social, political or cultural effects, may be referred to, the bulk of the response will remain on the issue raised in the question. Candidates may agree, partly agree or disagree with the statement." },
  { id:"cw5-3",  paper:"P2 CW",   section:"CW5", year:"2020 November",    question:"Examine the economic impact of the Cold War on two countries, each chosen from a different region.", markscheme:"Candidates may focus upon the impact of the Cold War upon the economies of US, the USSR and/or China and so consider the cost of the arms race; the need to provide aid to countries within their sphere of influence; and the cost of financial or military aid provided when proxy wars were being fought. For countries within the orbit of the superpowers, candidates may consider trade agreements; loans or investment in industrialization or infrastructure; pressure to adopt central planning or a free market system; and the pressure to increase expenditure on arms. Examples may include the economic impact on Cuba of aid from the USSR, as well as its withdrawal; or the economic dependence, both positive and negative, of many Latin American countries on the US. Candidates may consider both the advantages and the disadvantages of being within the economic sphere of a superpower. Candidates’ opinions and conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw5-4",  paper:"P2 CW",   section:"CW5", year:"2022 November",    question:"Evaluate the cultural impact of the Cold War on two countries, each chosen from a different region.", markscheme:"Candidates may offer equal coverage of both countries or may prioritize one of them. However, both must feature in the response. Candidates may evaluate the impact of McCarthyism upon the Hollywood film industry. The desire to promote abstract art and jazz as indicators of a “free society” in the US may also be evaluated. In Cuba, the impact of Soviet brutalist architecture that ended projects such as the National Arts School may be evaluated as may the promotion of ballet as instrumental to promoting excellence in revolutionary Cuba. Candidates may also refer to the impact of the Cold War upon sporting activities such as boycotts of the Olympics. In China, the impact of the Cultural Revolution may be evaluated and the explosion of propaganda directed at the “revisionist” USSR as well as the castigation of all culture associated with the West. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw5-5",  paper:"P2 CW",   section:"CW5", year:"2022 May TZ1",     question:"Examine the economic impact of the Cold War on two countries, each chosen from a different region.", markscheme:"Candidates may focus upon the impact of the Cold War upon the economies of US, the USSR and/or China and so consider the cost of the arms race; the need to provide aid to countries within their sphere of influence; and the cost of financial or military aid provided when proxy wars were being fought. For countries within the orbit of the superpowers, candidates may consider trade agreements; loans or investment in industrialization or infrastructure; pressure to adopt central planning or a free market system; and the pressure to increase expenditure on arms. Examples may include the economic impact on Cuba of aid from the USSR, as well as its withdrawal; or the economic dependence, both positive and negative, of many Latin American countries on the US. Candidates may consider both the advantages and the disadvantages of being within the economic sphere of a superpower. Candidates’ opinions and conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw5-6",  paper:"P2 CW",   section:"CW5", year:"2022 May TZ2",     question:"Examine the economic impact of the Cold War on two countries, each chosen from a different region.", markscheme:"Candidates may focus upon the impact of the Cold War upon the economies of US, the USSR and/or China and so consider the cost of the arms race; the need to provide aid to countries within their sphere of influence; and the cost of financial or military aid provided when proxy wars were being fought. For countries within the orbit of the superpowers, candidates may consider trade agreements; loans or investment in industrialization or infrastructure; pressure to adopt central planning or a free market system; and the pressure to increase expenditure on arms. Examples may include the economic impact on Cuba of aid from the USSR, as well as its withdrawal; or the economic dependence, both positive and negative, of many Latin American countries on the US. Candidates may consider both the advantages and the disadvantages of being within the economic sphere of a superpower. Candidates’ opinions and conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw5-7",  paper:"P2 CW",   section:"CW5", year:"2023 November TZ2",question:"Discuss the social and cultural impact of the Cold War on two countries, each chosen from a different region.", markscheme:"Candidates will offer a considered and balanced review of the social and cultural impact of the Cold War on two countries. The two countries may or may not be from the same region and may or may not be contemporaneous with each other. A comparative approach may or may not be used. Candidates may refer to the ideological impact of Cold War rivalry on society and culture in the USSR where much was made of public access to “high cultural” such as theatre, ballet and orchestral concerts, as well as sporting prowess in events such as the Olympics. The social impact was evident such as travel restrictions, limited access to foreign news and an emphasis on the external threat posed by ideological enemies. In the US, the McCarthy era led to the boycott of Hollywood writers and actors, whilst there was CIA funding for abstract art and Encounter magazine. Meanwhile, fear of nuclear war led to the building of bomb shelters and the inculcation of drills in schools and society at large. In Cuba, the impact of the Cold War led to greater dependency on the USSR and an obligation to follow its cultural and social guideline The cultural and social impact of the Cold War on scientific education, as well as the teaching of History, in specific countries may be discussed. Candidates may also discuss the environmental impact of nuclear testing on society. Candidate\'s’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw5-8",  paper:"P2 CW",   section:"CW5", year:"2024 May TZ1",     question:"Examine the social and cultural impact of the Cold War on two countries, each chosen from a different region.", markscheme:"Candidates may offer equal coverage of the impact the Cold War upon both society and culture or they may prioritize their examination of one over the other. However, both aspects will be a feature of the response. In the US, candidates may examine McCarthyism and the impact of the House Un-American Activities Committee. An examination may be made of CIA funding for “Encounter” magazine as well as the promotion of modern art to demonstrate freedom of expression. In the USSR, the increased production of consumer goods under Khrushchev to improve living standards may be examined as well as the illicit circulation of samizdat copies of books and articles. In South Africa, promoting anti- communism ensured support from Western powers, prolonging apartheid and strict government control over education and the media. In China, during the Cultural Revolution, the condemnation of the USSR as well as the West, led to a ban on music, art and literature that did not promote Maoist values. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw5-9",  paper:"P2 CW",   section:"CW5", year:"2025 May TZ2",     question:"Examine the social and cultural impact of the Cold War on two countries, each chosen from a different region.", markscheme:"Candidates may offer equal coverage of the impact the Cold War upon both society and culture or they may prioritize their examination of one over the other. However, both aspects will be a feature of the response. In the US, candidates may examine McCarthyism and the impact of the House Un-American Activities Committee. An examination may be made of CIA funding for “Encounter” magazine as well as the promotion of modern art to demonstrate freedom of expression. In the USSR, the increased production of consumer goods under Khrushchev to improve living standards may be examined as well as the illicit circulation of samizdat copies of books and articles. In South Africa, promoting anti- communism ensured support from Western powers, prolonging apartheid and strict government control over education and the media. In China, during the Cultural Revolution, the condemnation of the USSR as well as the West, led to a ban on music, art and literature that did not promote Maoist values. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  // CW6
  { id:"cw6-1",  paper:"P2 CW",   section:"CW6", year:"2018 May TZ1",     question:"Compare and contrast the causes of two Cold War crises, each from a different region.", markscheme:"Candidates will give an account of the similarities and differences between the causes of two Cold War crises referring to both crises throughout. While some of the countries may be involved in both crises, or may be from the same region, the crises themselves must be from different regions. While the focus of the response must be within the timeframe of the topic, the two crises need not be contemporaneous with each other. Causes which candidates may consider could include, but are not confined to, the Soviet need to protect or extend its sphere of influence, US attempts to prevent the spread of communism and/or respond to perceived threats, and superpower competition in Africa and the Middle East." },
  { id:"cw6-2",  paper:"P2 CW",   section:"CW6", year:"2018 November",    question:"Discuss the impact of two Cold War crises, each from a different region, on the development of superpower tensions.", markscheme:"Candidates may refer to a range of factors including increasing tensions (perhaps even to the point of risking nuclear war), an easing of tensions and/or the geographical expansion of the Cold War. While other relevant factors, for example ideology, may be referred to, the bulk of the response will remain on the issue raised in the question." },
  { id:"cw6-3",  paper:"P2 CW",   section:"CW6", year:"2021 May TZ1",     question:"Discuss the impact of two Cold War crises on superpower rivalry.", markscheme:"Candidates may offer equal coverage of both crises or they may prioritize their discussion of one of them. However, both crises will be a feature of the response. Candidates may refer to the impact of a Cold War crisis in positioning superpowers in opposing camps, for instance the Berlin Blockade. Candidates could discuss the impact of crises like Korea (1950) or Congo (1960–61) that brought the struggle to new regions, and/or involved the UN in Cold War tensions. It would be valid for candidates to discuss the different aspects of crisis, for example Cuba (1962) and refer to the negative impact of brinkmanship or to the compromise reached in Turkey. Other crises, like Hungary (1956) and Prague Spring (1968), provided an opportunity to discuss steps taken by a superpower to deal with perceived challenges to their influence and international reactions. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw6-4",  paper:"P2 CW",   section:"CW6", year:"2021 May TZ2",     question:"Discuss the impact of two Cold War crises on superpower rivalry.", markscheme:"Candidates may offer equal coverage of both crises or they may prioritize their discussion of one of them. However, both crises will be a feature of the response. Candidates may refer to the impact of a Cold War crisis in positioning superpowers in opposing camps, for instance the Berlin Blockade. Candidates could discuss the impact of crises like Korea (1950) or Congo (1960–61) that brought the struggle to new regions, and/or involved the UN in Cold War tensions. It would be valid for candidates to discuss the different aspects of crisis, for example Cuba (1962) and refer to the negative impact of brinkmanship or to the compromise reached in Turkey. Other crises, like Hungary (1956) and Prague Spring (1968), provided an opportunity to discuss steps taken by a superpower to deal with perceived challenges to their influence and international reactions. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw6-5",  paper:"P2 CW",   section:"CW6", year:"2022 November",    question:"Evaluate the impact of two crises, each chosen from a different region, on the development of the Cold War.", markscheme:"Candidates may offer equal coverage of both crises or prioritize one of them. However, both crises must feature in the response. Candidates may refer to the impact of the Cuban Missile Crisis and evaluate how it influenced superpower relations where tensions were initially heightened only to give way to agreements over nuclear testing. The impact of the Hungarian Revolution of 1956 may be evaluated with reference to the tightening of control over the Eastern Bloc and the impact it had upon the membership of Communist Parties in the West. The impact of the Korean Crisis leading to a proxy war may be evaluated and how this crisis was indicative of the reluctance of the superpowers to engage in open warfare. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw6-6",  paper:"P2 CW",   section:"CW6", year:"2023 May TZ1",     question:"\"Cold War crises were mainly caused by superpower aggression.\" Discuss, with reference to two crises, each chosen from a different region.", markscheme:"Candidates may offer equal coverage of the two crises, or they may prioritize their discussion of one of them. However, both crises will be a feature of the response. Candidates may discuss Soviet actions in Berlin in 1948, which may be viewed either as aggression to expel the Allies, or defence of a sphere of influence. There may be discussion of the Cuban Missile Crisis, which may be regarded either as aggression by the USSR in placing missiles so close to the US, or as Khrushchev’s defence of a socialist ally. Other relevant factors may be addressed, for example the role of leaders such as Nasser, whose actions, arguably, provoked the Suez Crisis, or Kim Il- Sung, whose invasion of South Korea caused war, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw6-7",  paper:"P2 CW",   section:"CW6", year:"2023 May TZ2",     question:"\"Mistrust between the superpowers was the most important cause of Cold War crises.\" Discuss, with reference to two crises, each chosen from a different region.", markscheme:"Candidates may offer equal coverage of the two crises, or they may prioritize their discussion of one of them. However, both aspects will be a feature of the response. Candidates may discuss the mistrust of Soviet intentions in Berlin in 1948 and Cuba in 1962 or the mistrust of the US’s aims in Korea, especially after military action spread to the North. Other relevant factors may be addressed, for example the defence of spheres of influence, which triggered Soviet invasions of Hungary and Czechoslovakia, or the roles of leaders such as Nasser, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw6-8",  paper:"P2 CW",   section:"CW6", year:"2023 November TZ1",question:"Evaluate the impact of two Cold War crises on superpower rivalry.", markscheme:"Candidates will make an appraisal of the impact of two Cold War crises on superpower rivalry. The two crises may or may not be from the same region and may or may not be contemporaneous with each other. Impact may extend beyond the timeframe, but it must be clearly linked to the issue raised in the question. Candidates may offer equal coverage of both crises or they may prioritize their evaluation of one of them. However, both crises will be a feature of the response. Candidates may evaluate the impact of a Cold War crisis in positioning superpowers in opposing camps, for instance the Berlin Blockade. Candidates may evaluate the impact of crises such as Korea (1950) or Congo (1960–61) that brought the struggle to different regions, and/or involved the UN in Cold War tensions. It would be valid for candidates to evaluate the different aspects of the crisis, for example Cuba (1962) and refer to the negative impact of brinkmanship or to the compromise reached over weapons in Cuba and Turkey. Other crises, like Hungary (1956) and Prague Spring (1968), provide an opportunity to evaluate the impact of steps taken by a superpower to deal with perceived challenges to their influence. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"cw6-9",  paper:"P2 CW",   section:"CW6", year:"2023 November TZ2",question:"\"Superpower rivalry increased as a result of Cold War crises.\" With reference to two crises, each chosen from a different region, to what extent do you agree with this statement?", markscheme:"Candidates will consider the merits or otherwise of the statement that superpower rivalry increased as a result of Cold War crises. The two crises may or may not be chosen from a different region and may or may not be contemporaneous with each other. A comparative approach may or may not be used. Candidates may refer to the Cuban Missile Crisis when superpower rivalry increased during the crisis but decreased subsequently with agreements reached over the withdrawal of nuclear weapons from Cuba and Turkey and limits placed on the atmospheric testing and, later, the proliferation of nuclear weapons. The Berlin Blockade increased tension over the application of post-war agreements and exacerbated rivalry leading to deeper divisions between the US and the USSR. Arguably, the Berlin Crisis of 1958-61 and the building of the Wall led to a more stable Berlin, and so relieved pressure in one of the most dangerous pressure points of Cold War rivalry. Although the Hungarian Revolution and the Suez Crisis may have worsened relations between the superpowers and their allies, suggesting a possible decrease in tension, nevertheless, these two crises also heightened superpower rivalry. Candidates may agree, partly agree or disagree with the statement, but their opinions or conclusions will be presented clearly and supported by appropriate evidence and sound argument." },
  { id:"cw6-10", paper:"P2 CW",   section:"CW6", year:"2025 May TZ1",     question:"\"Superpower relations improved rather than worsened as a result of Cold War crises.\" Discuss with reference to two crises, each chosen from a different region.", markscheme:"The question requires that students offer a considered and balanced review of the statement that superpower relations improved rather than worsened as a result of Cold War crises. The two crises must be from different regions. Consequences may extend beyond the timeframe but they must be clearly linked to the issue raised in the question. Students may offer equal coverage of the two crises or they may prioritize their discussion of one of them. However, both crises will be a feature of the response. Students may discuss improved relations between the superpowers after the Cuban Missile Crisis, which saw arms control agreements and the establishment of the hotline. While the 1948-1949 Berlin Blockade worsened superpower tensions, the crisis of 1960-1961, while seeing confrontation in the short term, froze the Berlin issue until 1989. The Hungarian crisis barely affected superpower tensions, while Eisenhower’s pressure on the UK and France calmed tensions over Suez. There may be discussion of the impact of the Afghan crisis, which brought an end to détente, and the Korean crisis which brought war; tension was only partially reduced by the armistice of 1953. Students may agree, partly agree or disagree with the statement, but their opinions or conclusions will be presented clearly and supported by appropriate evidence." },

  // ── THE SECOND WORLD WAR AND THE AMERICAS ─────────────────────────────────
  // WW1
  { id:"ww1-1",  paper:"P3 WW2",  section:"WW1", year:"2017 May",         question:"Evaluate the effects of Franklin D Roosevelt's Good Neighbor Policy in the Americas.", markscheme:"Candidates will make an appraisal of the effects of President Franklin Roosevelt’s Good Neighbor policy by weighing up its strengths and limitations. They may consider the effects on the US as well as other countries in the Americas. Issues that may be assessed include the repudiation of the right of intervention in Latin American internal affairs, the withdrawal of US military forces from Nicaragua and Haiti, and the implementation of reciprocal tariff agreements to achieve lower rates. Some candidates may argue that the response of countries to ally with the US in the Second World War is evidence of the policy’s success, but it may also be argued that the war, rather than the policy, increased trade with the US and brought a new wave of economic intervention." },
  { id:"ww1-2",  paper:"P3 WW2",  section:"WW1", year:"2018 November",    question:"Examine the application and effects of Franklin D Roosevelt's Good Neighbor Policy.", markscheme:"Candidates may see the application as an extension of the improved relations established by the Hoover administration. However, they must focus on the Roosevelt presidency. The Good Neighbor Policy, which was implemented in 1933, pledged that the US would stop unilateral interventions in Latin American countries. It was reinforced at the Montevideo Conference in December 1933 and at other hemispheric conferences before and during the Second World War. The policy resulted in the withdrawal of US Marines from Nicaragua and Haiti, and terminated the Platt Amendment with Cuba. It also led to reciprocal trade agreements between the US and several Latin American countries. Some candidates may suggest that the policy enabled negotiations, rather than military action, between the US and Mexico after the seizure of American oil companies in Mexico." },
  { id:"ww1-3",  paper:"P3 WW2",  section:"WW1", year:"2020 November",    question:"To what extent did the United States follow its policy of neutrality prior to entering the Second World War?", markscheme:"Candidates will have to decide if these actions follow a policy of neutrality. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"ww1-4",  paper:"P3 WW2",  section:"WW1", year:"2021 May",         question:"Discuss the impact of events in Europe and Asia on inter-American diplomacy up to 1941.", markscheme:"Candidates may refer to the Panama Conference (1939) in which participant nations adopted a position of neutrality towards the war in Europe. They may discuss plans for economic cooperation within the region. They may also discuss the impact of the Havana Conference (1940) which aimed at upholding the Monroe Doctrine and implementing collective security to protect the region from European and Asian expansionism. Candidates may discuss the diplomatic response to the Second World War leading to the Permanent Joint Board of Defense (1940) by Canada and the US. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"ww1-5",  paper:"P3 WW2",  section:"WW1", year:"2022 May",         question:"To what extent did Franklin D Roosevelt's Good Neighbor policy improve relations between the USA and Latin America?", markscheme:"Candidates may refer to inter-hemispheric conferences to evaluate if Pan- American relations showed improvement. For example, they may refer to Mexican and Argentinean refusal to sign agreements at Montevideo (1933), as evidence of failure in improving relations. Candidates could also analyse the state of US–Latin American relations through Latin American participation in trade agreements with the US. For example, candidates may argue the signing of 11 tariff reduction agreements by 1939 improved relations, but highlight that Argentina, Mexico and Chile’s refusal to participate limited progress. Other relevant factors may be addressed, for example the removal of the Platt amendment in 1934 or the withdrawal of occupation troops from Haiti, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"ww1-6",  paper:"P3 WW2",  section:"WW1", year:"2023 May",         question:"\"Inter-American diplomacy between 1933 and 1945 was largely a failure.\" To what extent do you agree with this statement?", markscheme:"candidates may refer to the US pledge of non-intervention made at the Montevideo Conference (1933), the removal of troops from Haiti and the annulment of the Platt Amendment, the negotiated settlement in response to Mexico’s nationalization of US oil fields, the advancement of collective security outlined by the Declaration of Lima (1938), Mexico and Brazil sending troops to combat zones and Mexico helping to meet US labour needs (Bracero program). Examples of failure may include the argument that the US did little to help Latin America recover from the Great Depression, US support for Pan-Americanism was motivated predominantly by US efforts to win the Second World War, and the successes were transitory given the dominance of Cold War issues after 1945. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"ww1-7",  paper:"P3 WW2",  section:"WW1", year:"2023 November",    question:"To what extent did reactions in the Americas change towards the challenges presented by events in Europe and Asia between 1933 and 1945?", markscheme:"Candidates may refer to initial reactions, to attempts to promote hemispheric cooperation through meetings at Panama, Havana and Lima. The US passed Neutrality Laws in 1935, ‘36 and ‘37 trying to stay out of war, but the Neutrality Law of 1939 allowed for the sale of weapons. The US and Canada formed a Joint Board of Defense. Candidates might indicate that Canada joined the war in 1939 and was heavily involved in securing the North Atlantic, while all other nations in the Americas remained neutral. The US began imposing sanctions on Japan in 1940 and increased them in 1941. The US made a bases for destroyers trade with Great Britain in 1940, enacted Lend-Lease and signed the Atlantic Charter in 1941. Candidates may refer to the US and Brazil agreement in 1941 to cooperate against the Axis, which allowed the US to build air bases in Brazil and for Brazil to defend the South Atlantic. The US entered the war after Pearl Harbor and many Latin American nations did so in 1942. Argentina was pro-German until 1944. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"ww1-8",  paper:"P3 WW2",  section:"WW1", year:"2024 May TZ1",     question:"\"Events in Europe and Asia mostly led to cooperation in the Americas between 1933 and 1945.\" To what extent do you agree with this statement?", markscheme:"Candidates may consider Franklin Roosevelt’s Good Neighbor Policy as a measure that anticipated the deteriorating conditions in Europe and Asia but which was also economically motivated as a response to the Great Depression. The rejection of unilateral intervention at Montevideo (1933) and the abrogation of the Platt Amendment (1934) also evidenced a movement toward cooperation. The conferences at Havana (1940) and Rio (1942) established the doctrines of collective security for hemispheric defence and were a response to the threats emanating from Europe and Asia. Evidence that demonstrates less cooperation in the Americas’ may be addressed, for example the insubstantial military assistance from Latin America and the willingness of Argentina to support Fascist regimes, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"ww1-9",  paper:"P3 WW2",  section:"WW1", year:"2024 May TZ2",     question:"\"The US followed a strict policy of neutrality prior to its entry into the Second World War.\" To what extent do you agree with this statement?", markscheme:"Candidates may consider the relatively strict support of neutrality represented in the Neutrality Acts of 1935 and 1936 that prevented loans or export of arms to belligerents. They may argue that the 1939 Neutrality Act with its ‘cash and carry’ provisions began to favour the eventual allies of the US. Other relevant factors which argue against strict neutrality may be addressed, for example the bases for destroyers trade, the Atlantic Charter, the establishment of the 1941 Lend-Lease policy and subsequent arming of US merchant ships represented support of the allies just short of declaring war, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported with appropriate evidence." },
  { id:"ww1-10", paper:"P3 WW2",  section:"WW1", year:"2025 May TZ1",     question:"Evaluate the reasons why countries in the Americas followed a policy of neutrality towards events in Europe and Asia up to 1942.", markscheme:"Candidates may offer equal coverage of both countries or they may prioritize their discussion by the amount of contributions. A comparative approach may or may not be used. Candidates may refer to economic, diplomatic or military contributions. Canada, the United States and Brazil are likely choices for candidates who disagree with the quote. Many other countries in the Americas could be used to agree with the quote. Candidates might use one country with heavy involvement and another with limited involvement to show the differences between countries in the Americas. Candidates may agree, partly agree or disagree with the statement." },
  { id:"ww1-11", paper:"P3 WW2",  section:"WW1", year:"2025 May TZ2",     question:"\"The events in Europe and Asia reinforced cooperation among countries in the Americas.\" Discuss.", markscheme:"Candidates may refer to the Panama Conference (1939) in which participant nations adopted a position of neutrality towards the war in Europe. They may discuss plans for economic cooperation within the region. They may also discuss the impact of the Havana Conference (1940) which aimed at upholding the Monroe Doctrine and implementing collective security to protect the region from European and Asian expansionism. Candidates may discuss the diplomatic response to the Second World War leading to the Permanent Joint Board of Defense (1940) by Canada and the US. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"ww1-12", paper:"P3 WW2",  section:"WW1", year:"2025 May TZ3",     question:"\"Franklin D Roosevelt's Good Neighbor policy was mostly beneficial for countries in the Americas.\" Discuss.", markscheme:"Candidates will make an appraisal of the effects of President Franklin Roosevelt’s Good Neighbor policy by weighing up its strengths and limitations. They may consider the effects on the US as well as other countries in the Americas. Issues that may be assessed include the repudiation of the right of intervention in Latin American internal affairs, the withdrawal of US military forces from Nicaragua and Haiti, and the implementation of reciprocal tariff agreements to achieve lower rates. Some candidates may argue that the response of countries to ally with the US in the Second World War is evidence of the policy’s success, but it may also be argued that the war, rather than the policy, increased trade with the US and brought a new wave of economic intervention." },
  // WW2
  { id:"ww2-1",  paper:"P3 WW2",  section:"WW2", year:"2021 May",         question:"Compare and contrast the involvement of two countries of the Americas in the Second World War.", markscheme:"Candidates may compare and contrast the countries’ diplomatic policies and their relations with belligerent nations. They may also compare and contrast the extent of involvement of both countries by, for example, referring to whether they declared war or remained neutral. They may compare and contrast the role played by the US to involve the selected countries in the Second World War. They may also compare and contrast the significance of the countries’ military contribution with reference to their contribution of troops, access to military bases or territory and contribution to equipment. Candidates may also compare and contrast the economic contributions to the war’s efforts by making reference to trade during the war. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"ww2-2",  paper:"P3 WW2",  section:"WW2", year:"2022 November",    question:"\"Diplomatic tensions were the main reason for involvement in the Second World War.\" Discuss with reference to two countries of the Americas.", markscheme:"Candidates may discuss other reasons for involvement, but they must address diplomatic tensions. For the US, there were diplomatic tensions between the US and Japan from the late 1930s onward as the US was attempting to stop Japanese expansion. Candidates may discuss that the bombing of Pearl Harbor was the main reason for US involvement. Tensions with Germany were less diplomatic and more military as Germany sank American ships. Canadian participation began shortly after Great Britain declared war on Germany. Canada entered to help defend Great Britain and the British Empire. For the most part, Latin American nations joined in response to direct German aggression or to protect the hemisphere. Candidates might refer to diplomatic tensions with the US as causing some Latin American nations to join. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"ww2-3",  paper:"P3 WW2",  section:"WW2", year:"2024 November",    question:"Discuss the importance of the involvement of any two countries in the Americas in the Second World War.", markscheme:"Candidates may consider the importance of the countries’ involvement from a range of aspects, such as military, diplomatic, economic and social. The importance of a country’s involvement could be seen both foreign and domestic. Candidates may argue that US involvement was paramount to Allied victory by citing military, economic and diplomatic participation. Candidates may consider the importance of military involvement by Canada with its contribution to armed forces, the air force and navy and the significance of its D-Day support. Candidates may also consider the military and diplomatic role of Brazil, Mexico, Argentina or other countries in the Americas and discuss why some were more active while others remained neutral. Candidates may also discuss how involvement had a social impact domestically and consider such aspects as the effect on Japanese Americans and Japanese Canadians, and minority groups and women. Candidates’ opinions and conclusions will be presented clearly and supported by appropriate evidence. – 9442M" },
  // WW3
  { id:"ww3-1",  paper:"P3 WW2",  section:"WW3", year:"2018 May",         question:"With reference to the period up to 1945, discuss the social impact of the Second World War on women and minorities.", markscheme:"Candidates will offer a considered and balanced review that includes a range of arguments to explain the effects of the Second World War on both women and minorities. Although candidates may vary in the emphasis they place on women and minorities, there should be at least some discussion of each. With respect to women, candidates may discuss the increase in employment opportunities, development of new skills and entrance into the armed forces that became available due to the war and which contributed to demands for equality. It may also be argued that discrimination in the workplace sometimes followed and that there was pressure to return to domestic roles at the end of the war. For minorities, candidates may discuss the discrimination faced by people of Japanese descent, but also the increased opportunities available to African– Americans and Latinos that helped fuel the post-war movement toward equality." },
  { id:"ww3-2",  paper:"P3 WW2",  section:"WW3", year:"2019 November",    question:"Discuss the social impact of the Second World War on one country in the Americas.", markscheme:"The question requires that candidates offer a considered and balanced review of the social impact of the Second World War on one country in the Americas. The social impact may extend beyond the Second World War, but it must be clearly linked to the issue raised in the question. The social impact of the Second World War on one country will certainly vary depending on which country is chosen. Some common themes that could be mentioned include impact on women, families, minority groups, society as a whole, personal liberties, the arts and media, culture and government. While other relevant factors, such as political or economic factors, may be referred to, the bulk of the response will remain on the issue raised in the questions." },
  { id:"ww3-3",  paper:"P3 WW2",  section:"WW3", year:"2022 May",         question:"Examine the social impact of the Second World War on one country of the Americas up to 1945.", markscheme:"Candidates may refer to labour issues; changes to women’s status (work, family, suffrage); effects on minorities (African Americans, Native Americans, and French Canadians); the emergence of radicalism (Communism or right-wing movements) and the measures taken to control them; and/or internal migration and immigration. With respect to women, candidates may discuss the increase in employment opportunities, development of new skills and entrance into the armed forces that became available due to the war and which contributed to demands for equality. For minorities, candidates may discuss the discrimination faced by people of Japanese descent, but also the increased opportunities available to African Americans and Latinos. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"ww3-4",  paper:"P3 WW2",  section:"WW3", year:"2022 November",    question:"Evaluate the social impact of the Second World War on women and minorities up to 1945.", markscheme:"The question requires that candidates make an appraisal of the social impact of the Second World War on women and minorities up to 1945. Responses will vary depending on the countries chosen to give examples. In nearly all countries, economic opportunities for women and minorities increased. Nevertheless, discrimination still existed resulting in lower pay and fewer opportunities than white counterparts. In many countries, the war presented greater opportunities for women and minorities in the military, with members in both groups gaining respect for their contributions. In some countries, the war led to internal migration from rural areas to urban centres or from one region to another. There may also have been increased immigration to fill vacant jobs. In a few countries, some minorities, especially those of Japanese origin were isolated to internment camps. Internment meant the loss of civil liberties, property losses as well as post-war stigma. In many countries, increased economic and social mobility fostered thoughts of racial and gender equality. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"ww3-5",  paper:"P3 WW2",  section:"WW3", year:"2023 May",         question:"Evaluate the impact of conscription on the US and Canada during the Second World War.", markscheme:"Candidates may refer to the precedent of the US instituting its first peace-time draft, substantial opposition in the US House of Representatives where conscription passed by a margin of one vote, and the initial racist exclusion of African-Americans (though a quota system was adopted in 1943). For Canada, candidates may address Mackenzie King’s initial promise to prevent conscription to avoid the disunity experienced in the First World War, the 1940 National Resources Mobilization Act allowing a draft for home service jobs only, and the 1942 plebiscite where 65% of Canadians approved unrestricted conscription. Other relevant factors may be addressed, for example the impact of conscription upon the role of women and minorities in the economy, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"ww3-6",  paper:"P3 WW2",  section:"WW3", year:"2025 May TZ1",     question:"\"The Second World War had limited impact on women in the Americas.\" To what extent do you agree with this statement?", markscheme:"Candidates may discuss Canada as being strongly impacted as it was a close US ally, a member of NATO, participated in the Korean War and made joint defense agreements with the US. However, Canada was not supportive of the Vietnam War nor the US’ strong stance against Cuba. For most Latin American countries, excepting Cuba, candidates are likely to agree with the statement, despite the Rio Treaty of 1947 and the later formation of the OAS. Most Latin American countries sought to have foreign policies that would not anger the US. Cuba, post-Batista, is the exception. The Cold War had a great impact on Cuba with its alliance with the USSR, the Bay of Pigs invasion, the Cuban Missile Crisis and its exportation of the revolution. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence. – 5307M" },
  { id:"ww3-7",  paper:"P3 WW2",  section:"WW3", year:"2025 May TZ2",     question:"\"The Second World War had limited impact on minorities in the Americas.\" To what extent do you agree with this statement?", markscheme:"Candidates may discuss Canada as being strongly impacted as it was a close US ally, a member of NATO, participated in the Korean War and made joint defense agreements with the US. However, Canada was not supportive of the Vietnam War nor the US’ strong stance against Cuba. For most Latin American countries, excepting Cuba, candidates are likely to agree with the statement, despite the Rio Treaty of 1947 and the later formation of the OAS. Most Latin American countries sought to have foreign policies that would not anger the US. Cuba, post-Batista, is the exception. The Cold War had a great impact on Cuba with its alliance with the USSR, the Bay of Pigs invasion, the Cuban Missile Crisis and its exportation of the revolution. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence. – 5307M" },
  { id:"ww3-8",  paper:"P3 WW2",  section:"WW3", year:"2025 May TZ3",     question:"Evaluate the impact of conscription during the Second World War in the Americas.", markscheme:"The question requires that candidates make an appraisal of the social impact of the Second World War on women and minorities up to 1945. Responses will vary depending on the countries chosen to give examples. In nearly all countries, economic opportunities for women and minorities increased. Nevertheless, discrimination still existed resulting in lower pay and fewer opportunities than white counterparts. In many countries, the war presented greater opportunities for women and minorities in the military, with members in both groups gaining respect for their contributions. In some countries, the war led to internal migration from rural areas to urban centres or from one region to another. There may also have been increased immigration to fill vacant jobs. In a few countries, some minorities, especially those of Japanese origin were isolated to internment camps. Internment meant the loss of civil liberties, property losses as well as post-war stigma. In many countries, increased economic and social mobility fostered thoughts of racial and gender equality. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  // WW4
  { id:"ww4-1",  paper:"P3 WW2",  section:"WW4", year:"2017 May",         question:"Discuss the treatment of people of Japanese origin in two countries of the Americas during the Second World War.", markscheme:"Candidates will offer a considered and balanced review of the treatment of people of Japanese origin in any two countries of the Americas during the Second World War. Focus is limited to the time span of the war. Issues that may be discussed include the relocation of people of Japanese origin away from the coastal areas, usually to labour or internment camps. People of Japanese origin were subject to surveillance and racial prejudice supported by government propaganda despite little evidence they posed any threat. Homes, land and businesses were often confiscated and civil rights denied, and some countries banned Japanese texts and language. Candidates may point out that some countries of the region, such as Mexico, Argentina and Brazil did not engage in overtly hostile actions toward their populations of Japanese descent, in part due to dependence on their labour." },
  { id:"ww4-2",  paper:"P3 WW2",  section:"WW4", year:"2018 November",    question:"\"The treatment of people of Japanese origin was consistent throughout the Americas during the Second World War.\" Discuss.", markscheme:"candidates will note differences in treatment of Japanese, even within a country. Japanese Americans on the west coast were relocated, those on the east coast were not, nor were those in Hawaii. Some Japanese–American citizens enlisted in the armed forces. Argentina, Brazil and Chile did not mistreat their Japanese population to any great extent." },
  { id:"ww4-3",  paper:"P3 WW2",  section:"WW4", year:"2021 November",    question:"Compare and contrast the treatment of people of Japanese origin in two countries of the Americas.", markscheme:"Candidates may refer to the Japanese losing their personal property and many of their personal possessions because of the relocation. Candidates may refer to US and Canadian camps and compare the conditions there. Japanese-Canadians tended to have worse conditions than Japanese-Americans. In Peru and other Latin American countries, many Japanese, but not all, were deported to the US for internment during the war. Argentina, Brazil and Chile did not relocate Japanese, though they were closely monitored. Both similarities and differences must be clearly indicated, but there does not need to be an equal number of each." },
  // WW5
  { id:"ww5-1",  paper:"P3 WW2",  section:"WW5", year:"2017 November",    question:"Evaluate the reasons for US use of atomic weapons against Japan.", markscheme:"Candidates will make an appraisal of the reasons for the decision of the US to deploy atomic weaponry against Japan. The reasons may cover a range of issues, be they political, military, strategic, emotional or scientific. Candidates might include the Japanese refusal to surrender and the American fear that an invasion of Japan would be very costly (financially and in the number of lives lost). They may also refer to the cost of building the bomb, the desire for revenge for Pearl Harbor, and the desire to show American power to the Soviets. The response should not discuss the results of the bombing on the war or subsequent events, nor should it describe the immediate effects of the bomb." },
  { id:"ww5-2",  paper:"P3 WW2",  section:"WW5", year:"2019 May",         question:"\"The desire to defeat Japan was the main reason for the use of atomic weapons by the US.\" Discuss.", markscheme:"Candidates may refer to US officials believing that a costly invasion would be required before Japan surrendered, thus weapons were dropped to shorten the war and save American lives. The battles on Iwo Jima and Okinawa may be examined to reflect the kind of defence the Japanese could make. Candidates may also refer to multiple opportunities for surrender offered to Japan, which had not been accepted. Other relevant factors, for example the US’s desire to display power over the USSR; the expense of the Manhattan Project and/or retaliation for Pearl Harbor, may be referred to, but with a focus on the issue in the question." },
  { id:"ww5-3",  paper:"P3 WW2",  section:"WW5", year:"2020 November",    question:"Discuss the reasons for, and significance of, US use of atomic weapons against Japan.", markscheme:"Candidates may refer to military, economic and political reasons. They may cite that the US used atomic bombs to end the war as soon as possible in order to save lives and to forgo a land invasion of the mainland. Some might say Truman used atomic weapons to show the USSR the power of the US, in the hope of making Stalin more cooperative. Other reasons could be to justify the enormous cost of the bomb, to get revenge on Japan for Pearl Harbor and to gain popular support. The significance of the use of atomic weapons could be the quick conclusion of the war, though that is debatable; it began the atomic age and the arms race; and the establishment of the US as a superpower. Candidates might include other reasons and explanations of significance. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"ww5-4",  paper:"P3 WW2",  section:"WW5", year:"2024 May TZ1",     question:"To what extent was the US use of atomic weapons against Japan primarily for military reasons?", markscheme:"Candidates may consider the refusal of Japan to surrender when threatened with destruction from atomic weapons and the assessment President Truman received from some advisors that US losses would be catastrophic if a conventional assault were made on the Japanese islands. Other relevant factors that had less to do with military considerations may be addressed, for example cultural prejudice against the Japanese, the desire for revenge due to Japan’s attack on Pearl Harbor, the desire to intimidate the USSR and prevent their expansion, political concerns over the cost of the Manhattan Project and the political impact on the Truman administration if the atomic bomb was not used to limit US military losses, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence. – 5307M" },
  // WW6
  { id:"ww6-1",  paper:"P3 WW2",  section:"WW6", year:"2017 November",    question:"\"During the Second World War, the economies of countries in the Americas were transformed.\" With reference to two countries, to what extent do you agree with this statement?", markscheme:"Candidates will consider the merits or otherwise of the statement that the Second World War brought notable change to the economy in two countries. Any two countries from the region may be discussed. The concept of change involves both short-and long-term changes. These changes may be either positive or negative in nature and may comprise a wide range of issues depending on the countries chosen. Issues covered may include industrialization, financial structures, government involvement, changes in the labour force, trade and balance of payments, the development of new products, technologies and/or movement of population. The changes that resulted are largely based on the extraordinary increase in demand for all types of products both raw and manufactured that the war created. Many suppliers of goods were no longer able to do so and the needs of the combatants had to be met from other regions." },
  { id:"ww6-2",  paper:"P3 WW2",  section:"WW6", year:"2018 May",         question:"Evaluate the diplomatic effects of the Second World War in two countries of the Americas up to 1945.", markscheme:"Candidates will make an appraisal of the diplomatic effects of the Second World War in any two countries of the Americas up to 1945. It is important to note that the question requires focus on effects in the Americas. Diplomatic effects may be interpreted widely and the nature of material presented will vary per the countries selected. Argentina’s relationship with the Axis powers is a likely topic and may include evaluation of Argentina’s effort to maintain official neutrality despite US pressure to end any relationship with the Axis countries. Candidates might also choose to evaluate how US diplomatic pressures affected Latin American countries’ war efforts as well as their business relationship with Axis nationals. The efforts of the US to establish better relations with Latin America and to negotiate security and trade agreements are another likely topic." },
  { id:"ww6-3",  paper:"P3 WW2",  section:"WW6", year:"2019 May",         question:"Examine the economic effects of the Second World War on two countries of the Americas.", markscheme:"Candidates may offer equal coverage of effects on both countries, or they may prioritize their discussion of either one. However, both aspects will be a feature of the response. A comparative approach may or may not be used. Candidates may refer to a wide range of effects of war on domestic economics including inflation, end of the Depression, changes in trade patterns, industrialization, changes in the economic role of government, economic integration of markets, and promotion of technology. The examination of economic effects is relevant up to 1945. Answers will vary according to the selected case study. Within Latin America some possible countries could be Brazil, Argentina or Mexico; Canada and the US might also be popular choices. While other relevant factors, for example social effects, may be referred to, they would be relevant mainly as context for the issue raised in the question." },
  { id:"ww6-4",  paper:"P3 WW2",  section:"WW6", year:"2021 November",    question:"Examine the diplomatic effects of the Second World War up to 1945 in two countries of the Americas.", markscheme:"Candidates may refer to the break in diplomatic relations with the Axis powers for most countries in the region. They may also refer to hemispheric cooperation agreements signed in 1939, 1940 and 1942, all of which were forerunners of the Rio Pact and eventually the Organization of American States (OAS). The US took actions against the Japanese in December 1941, allied with the Chinese and signed the Atlantic Charter. Candidates may refer to Canada’s immediate declaration of war on Germany, ties to the Allies and later to the US, and increased presence in diplomacy at the end of the war. Mexico and Brazil declared war on Germany in 1942, drawing both countries closer to the US. Argentina remained neutral until March 1945. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  { id:"ww6-5",  paper:"P3 WW2",  section:"WW6", year:"2023 November",    question:"Evaluate the economic impact of the Second World War on two countries in the Americas.", markscheme:"Candidates may choose any two countries, but likely choices could be the United States, Canada, Brazil, Argentina and Mexico. Some effects could be increased GDP, higher employment rates, inflation, new industries, new technology, changing trade patterns and changes in government involvement in the economy. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence. – 5307M" },
  { id:"ww6-6",  paper:"P3 WW2",  section:"WW6", year:"2024 May TZ2",     question:"To what extent were the economic effects of the Second World War more significant than the diplomatic effects up to 1945? Answer with reference to two countries in the Americas.", markscheme:"candidates may consider the extent to which particular countries were aided in their emergence from the economic conditions of the Great Depression as well as the extent to which the mobilization of the economy for production of munitions stimulated long-term economic growth. Factors such as unemployment rates, Gross Domestic Product (GDP), and foreign trade may be discussed in this context. With regard to diplomatic effects, candidates may consider the significance of the advances of inter-American diplomacy and cooperation established at conferences in Havana (1940) and Rio (1942) but perhaps noting the support Argentina gave to Fascist powers, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported with appropriate evidence. – 5311M" },

  // ── POLITICAL DEVELOPMENTS IN LATIN AMERICA ───────────────────────────────
  // LA1
  { id:"la1-1",  paper:"P3 LatAm",section:"LA1", year:"2018 November",    question:"\"Social rather than political factors were the main cause of the Cuban Revolution.\" To what extent do you agree with this statement.", markscheme:"Candidates may agree, partly agree, or disagree with the assessment. They may address the contribution of social causes to the outbreak of the revolution by referring to the grievances of the peasantry and urban workers and consider issues such as shortage of land, poor working and living conditions and limited access to healthcare, housing and education. Candidates may challenge the statement and claim that political causes played a more significant role in the revolution. In doing so, they may gauge the contributions of the rising opposition to Batista and his ineffective response, the role of political parties and of Fidel Castro. Candidates may, alternatively, argue that other factors played a more substantial role. While this is acceptable, candidates must focus on the importance or otherwise of the named issues." },
