  { id:"cwa5-9", paper:"P3 CWA",  section:"CWA5",year:"2025 May TZ2",     question:"Evaluate the impact of Nixon's foreign policy on the Americas.", markscheme:"Candidates may offer equal coverage of both authoritarian states, or they may prioritize their discussion of one of them. However, both states will be a feature of the response. Candidates may refer to the role of the authoritarian ruler defending national interests and its impact on their popularity, for example, the increase of Nasser’s popularity after the Suez Crisis. They may also refer to the use of a foreign policy to unify the population around the regime, for example, Castro\'s confrontations against the US. Candidates may evaluate the impact of the Cold War, for example, Sukarno\'s relationship with the Soviet Union. They may also refer to the importance of wars, but with a focus on the issue in the question. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence." },
  // CWA6
  { id:"cwa6-1", paper:"P3 CWA",  section:"CWA6",year:"2019 November",    question:"Examine the impact of the Cold War on the foreign policy of either Canada or one Latin American country.", markscheme:"Candidates may refer to Castro’s rejection of US interference, his closer ties with the Soviet Union, and eventually his leadership in the Non-Aligned Movement. Whichever country is chosen, candidates must examine the impact of the Cold War on foreign policy." },
  { id:"cwa6-2", paper:"P3 CWA",  section:"CWA6",year:"2023 November",    question:"\"The Cold War had limited impact on the foreign policy of countries in the Americas.\" Discuss with reference to one country in the Americas (except the US).", markscheme:"Candidates may discuss Canada as being strongly impacted as it was a close US ally, a member of NATO, participated in the Korean War and made joint defense agreements with the US. However, Canada was not supportive of the Vietnam War nor the US’ strong stance against Cuba. For most Latin American countries, excepting Cuba, candidates are likely to agree with the statement, despite the Rio Treaty of 1947 and the later formation of the OAS. Most Latin American countries sought to have foreign policies that would not anger the US. Cuba, post-Batista, is the exception. The Cold War had a great impact on Cuba with its alliance with the USSR, the Bay of Pigs invasion, the Cuban Missile Crisis and its exportation of the revolution. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence. – 5307M" },
  { id:"cwa6-3", paper:"P3 CWA",  section:"CWA6",year:"2025 May TZ3",     question:"To what extent were domestic policies affected by the Cold War? Discuss with reference to one country of the Americas (except the US).", markscheme:"Candidates may offer equal coverage of both states, or they may prioritize their assessment of one of them. However, both aspects will be a feature of the response. Candidates may consider the social change engineered by Nyerere through his extensive Ujamaa scheme, or to Mao’s attempts to introduce communes during the Cultural Revolution. There may be consideration of attempts to boost the birth rate in Nazi Germany and Stalin’s Russia. The significance of educational reform may be considered, for example, in Cuba, where new countryside schools and the Literacy Campaign had a great impact. There may be consideration of policies towards women, for example the impact of the Marriage Law in China. Other relevant factors may be addressed, for example changes brought about by economic or political policies. Candidates’ opinions or conclusions will be presented clearly and supported by appropriate evidence. – 5303M" },

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function countLeafNodes(suboutlines) {
  let total = 0;
  let filled = 0;
  function traverse(item) {
    if (typeof item === "string") {
      total++;
      return;
    }
    if (!item.children || item.children.length === 0) {
      total++;
      if (item.content && item.content.length > 0) filled++;
    } else {
      item.children.forEach(traverse);
    }
  }
  if (suboutlines) suboutlines.forEach(traverse);
  return { total, filled };
}

function countAllLeaderLeaves(merged) {
  const src = merged || data;
  let total = 0;
  let filled = 0;
  src.leaders.forEach((l) => {
    const r = countLeafNodes(l.suboutlines);
    total += r.total;
    filled += r.filled;
  });
  return { total, filled };
}

function countCrisisProgress(merged) {
  const src = merged || data;
  let total = 0;
  let filled = 0;
  src.crises.forEach((c) => {
    total += 2; // causes + impact
    if (Array.isArray(c.causes) && c.causes.length > 0) filled++;
    if (Array.isArray(c.impact) && c.impact.length > 0) filled++;
    if (c.leaderContent && c.leaderContent.length > 0) {
      total++;
      filled++;
    }
  });
  return { total, filled };
}

function countDevProgress(merged) {
  const src = merged || data;
  const allItems = Object.values(src.developments).flatMap((d) => d.items);
  const standalone = allItems.filter((d) => !d.absorbed);
  const filled = standalone.filter((d) => (Array.isArray(d.detail) && d.detail.length > 0) || (typeof d.detail === 'string' && d.detail.trim().length > 0)).length;
  return { total: standalone.length, filled };
}

function countTotalWords(merged) {
  const src = merged || data;
  let words = 0;
  function ws(s) { if (!s) return; words += s.trim().split(/\s+/).filter(Boolean).length; }
  function countArr(arr) {
    if (!arr) return;
    arr.forEach((c) => {
      if (typeof c === "string") { ws(c); }
      else { if (c.title) ws(c.title); if (c.body) ws(c.body); if (c.bullets) c.bullets.forEach(ws); }
    });
  }
  function traverseLeaves(items) {
    if (!items) return;
    items.forEach((item) => {
      if (item.content) countArr(item.content);
      if (item.children) traverseLeaves(item.children);
    });
  }
  src.leaders.forEach((l) => traverseLeaves(l.suboutlines));
  src.crises.forEach((c) => {
    if (Array.isArray(c.causes)) countArr(c.causes); else if (typeof c.causes === "string") ws(c.causes);
    if (Array.isArray(c.impact)) countArr(c.impact); else if (typeof c.impact === "string") ws(c.impact);
    if (c.leaderContent) c.leaderContent.forEach((lc) => { if (lc.bullets) lc.bullets.forEach(ws); });
  });
  Object.values(src.developments).forEach(section => {
    section.items.forEach(item => {
      if (Array.isArray(item.detail)) countArr(item.detail);
      else if (typeof item.detail === 'string') ws(item.detail);
    });
  });
  return words;
}

function getAbsorbedTargets(status) {
  const leaderNames = data.leaders.map((l) => l.name);
  const crisisNames = data.crises.map((c) => c.name);
  const foundLeaders = leaderNames.filter((name) => status.includes(name));
  const foundCrises = crisisNames.filter((name) => status.includes(name));
  return { leaders: foundLeaders, crises: foundCrises };
}

function ContentRenderer({ paragraphs }) {

            {p.title}
          </div>
          {p.bullets ? (
            <ul style={{ margin: "0", paddingLeft: "18px", listStyleType: "disc" }}>
              {p.bullets.map((b, j) => (
                <li key={j} style={{ fontSize: "12.5px", color: "#333", fontFamily: "'Georgia', serif", lineHeight: 1.65, marginBottom: "3px" }}>
                  {b}
                </li>
              ))}
            </ul>
          ) : (
            <div style={{ fontSize: "13px", color: "#333", fontFamily: "'Georgia', serif", lineHeight: 1.75 }}>
              {p.body}
            </div>
          )}
        </div>
      ))}
    </>
  );
}

// ─── EDIT CONTEXT + MODAL ─────────────────────────────────────────────────────
const EditContext = React.createContext({ overlay: {}, onEdit: () => {} });

function parseEditText(text) {
  const cards = [];
  text.trim().split(/\n\s*\n/).forEach(block => {
    const lines = block.trim().split('\n').filter(Boolean);
    if (!lines.length) return;
    const title = lines[0].replace(/^#+\s*/, '').trim();
    const bullets = lines.slice(1).map(l => l.replace(/^[-*•]\s*/, '').trim()).filter(Boolean);
    if (title) cards.push({ title, bullets });
  });
  return cards;
}

function serializeContent(content) {
  if (!Array.isArray(content) || !content.length) return '';
  return content.map(c => `# ${c.title}\n${(c.bullets || []).map(b => `- ${b}`).join('\n')}`).join('\n\n');
}

function EditModal({ pathArr, currentContent, onSave, onClose, mode }) {
  const isText = mode === "text";
  const [text, setText] = useState(isText ? (currentContent || "") : serializeContent(currentContent));
  return (
    <div style={{ position: 'fixed', inset: 0, backgroundColor: 'rgba(0,0,0,0.5)', zIndex: 200, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px' }}>
      <div style={{ backgroundColor: '#fff', borderRadius: '6px', width: '100%', maxWidth: '560px', maxHeight: '82vh', display: 'flex', flexDirection: 'column', boxShadow: '0 8px 40px rgba(0,0,0,0.2)' }}>
        <div style={{ padding: '14px 18px', borderBottom: '1px solid #eee', backgroundColor: '#264653', borderRadius: '6px 6px 0 0' }}>
          <div style={{ fontSize: '10px', color: '#E9C46A', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '1px', marginBottom: '3px' }}>Editing</div>
          <div style={{ fontSize: '13px', color: '#fff', fontFamily: "'Georgia', serif" }}>{pathArr.join(' › ')}</div>
        </div>
        {!isText && (
          <div style={{ padding: '8px 14px', backgroundColor: '#f5f3ee', borderBottom: '1px solid #eee', fontSize: '11px', color: '#999', fontFamily: "'Georgia', serif", fontStyle: 'italic' }}>
            # Card Title → newlines with - bullets → blank line between cards
          </div>
        )}
        <textarea
          autoFocus
          value={text}
          onChange={e => setText(e.target.value)}
          placeholder={isText ? "Enter notes here..." : "# Card Title\n- First bullet\n- Second bullet\n\n# Another Card\n- Another point"}
          style={{ flex: 1, padding: '14px 16px', border: 'none', outline: 'none', fontFamily: "'Georgia', serif", fontSize: '13px', lineHeight: 1.6, resize: 'none', minHeight: '220px', color: '#333' }}
        />
        <div style={{ padding: '10px 14px', borderTop: '1px solid #eee', display: 'flex', justifyContent: 'flex-end', gap: '8px' }}>
          <button onClick={onClose} style={{ padding: '7px 16px', fontSize: '12px', border: '1px solid #ccc', borderRadius: '3px', cursor: 'pointer', backgroundColor: '#f5f3ee', fontFamily: "'Georgia', serif" }}>Cancel</button>
          <button onClick={() => { onSave(isText ? text : parseEditText(text)); onClose(); }} style={{ padding: '7px 16px', fontSize: '12px', border: 'none', borderRadius: '3px', cursor: 'pointer', backgroundColor: '#264653', color: '#fff', fontWeight: 700, fontFamily: "'Georgia', serif" }}>Save</button>
        </div>
      </div>
    </div>
  );
}

// ─── SUBOUTLINE ITEM (with depth-0 branch collapse) ─────────────────────────
function SuboutlineItem({ item, depth, path, onContentClick }) {
  const [branchOpen, setBranchOpen] = useState(true);

  const isString = typeof item === "string";
  const name = isString ? item : item.name;
  const children = isString ? null : item.children;
  const content = isString ? null : item.content;
  const hasContent = content && content.length > 0;
  const hasChildren = children && children.length > 0;
  const currentPath = [...path, name];
  const isTopBranch = depth === 0 && hasChildren;
  const isLeaf = !hasChildren;

  const { overlay, onEdit } = React.useContext(EditContext);
  const pathKey = currentPath.join(" > ");
  const effectiveContent = overlay[pathKey] !== undefined ? overlay[pathKey] : content;
  const effectiveHasContent = effectiveContent && effectiveContent.length > 0;

  const handleClick = () => {
    if (isTopBranch) {
      setBranchOpen(!branchOpen);
    } else if (effectiveHasContent) {
      onContentClick(effectiveContent, currentPath);
    }
  };

  // Leaf nodes render as cards
  if (isLeaf) {
    return (
      <div style={{ paddingLeft: depth > 0 ? "10px" : "0" }}>
        <div
          onClick={effectiveHasContent ? handleClick : undefined}
          style={{
            marginBottom: "5px", marginTop: "5px", padding: "8px 12px",
            backgroundColor: effectiveHasContent ? "#fff" : "#faf9f6",
            border: effectiveHasContent ? "1px solid #d0cec8" : "1px solid #e0ddd6",
            borderRadius: "5px", cursor: effectiveHasContent ? "pointer" : "default",
            display: "flex", justifyContent: "space-between", alignItems: "center", transition: "all 0.15s",
          }}
        >
          <span style={{ fontSize: "12px", fontWeight: effectiveHasContent ? 600 : 400, color: effectiveHasContent ? "#264653" : "#888", fontFamily: "'Georgia', serif", lineHeight: 1.4 }}>
            {name}
          </span>
          <div style={{ display: "flex", alignItems: "center", gap: "6px", flexShrink: 0 }}>
            {effectiveHasContent ? (
              <span style={{ fontSize: "9px", backgroundColor: "#2D6A4F", color: "#fff", borderRadius: "3px", padding: "1px 6px", fontFamily: "sans-serif", fontWeight: 700, letterSpacing: "0.3px" }}>
                {effectiveContent.length} {effectiveContent.length === 1 ? "card" : "cards"}
              </span>
            ) : (
              <span style={{ fontSize: "9px", color: "#bbb", fontStyle: "italic", fontFamily: "sans-serif" }}>empty</span>
            )}
            <button
              onClick={(e) => { e.stopPropagation(); onEdit(currentPath, effectiveContent); }}
              title="Edit content"
              style={{ fontSize: "11px", padding: "1px 6px", backgroundColor: "transparent", color: "#bbb", border: "1px solid #ddd", borderRadius: "3px", cursor: "pointer", fontFamily: "sans-serif", lineHeight: 1.4, transition: "all 0.15s" }}
              onMouseEnter={e => { e.currentTarget.style.backgroundColor = "#264653"; e.currentTarget.style.color = "#fff"; e.currentTarget.style.borderColor = "#264653"; }}
              onMouseLeave={e => { e.currentTarget.style.backgroundColor = "transparent"; e.currentTarget.style.color = "#bbb"; e.currentTarget.style.borderColor = "#ddd"; }}
            >✎</button>
          </div>
        </div>
      </div>
    );
  }

  // Branch nodes
  const depthStyles = [
    { fontSize: "12px", fontWeight: 700, color: "#2D5A4A", paddingLeft: "0", borderLeft: "none" },
    { fontSize: "12px", fontWeight: 500, color: "#3a3a3a", paddingLeft: "10px", borderLeft: "2px solid #b8d9c8" },
    { fontSize: "11px", fontWeight: 400, color: "#555", paddingLeft: "10px", borderLeft: "2px solid #dde9e4" },
  ];
  const s = depthStyles[Math.min(depth, 2)];

  return (
    <div style={{ paddingLeft: depth > 0 ? "10px" : "0" }}>
      <div
        onClick={isTopBranch ? handleClick : undefined}
        style={{
          fontSize: s.fontSize,
          fontWeight: s.fontWeight,
          color: s.color,
          paddingLeft: s.paddingLeft,
          borderLeft: s.borderLeft,
          marginBottom: "3px",
          marginTop: depth === 0 ? "6px" : "0",
          fontFamily: "'Georgia', serif",
          lineHeight: 1.4,
          cursor: isTopBranch ? "pointer" : "default",
          display: "flex",
          alignItems: "center",
          gap: "6px",
          transition: "background 0.1s",
        }}
      >
        {isTopBranch && (
          <span style={{ fontSize: "9px", color: "#888", flexShrink: 0, width: "10px", textAlign: "center", transition: "transform 0.15s", transform: branchOpen ? "rotate(90deg)" : "rotate(0)" }}>
            {"\u25B6"}
          </span>
        )}
        <span>{name}</span>
      </div>
      {hasChildren &&
        (isTopBranch ? branchOpen : true) &&
        children.map((child, i) => (
          <SuboutlineItem key={i} item={child} depth={depth + 1} path={currentPath} onContentClick={onContentClick} />
        ))}
    </div>
  );
}

// ─── LEADER CARD ──────────────────────────────────────────────────────────────
function LeaderCard({ leader, isExpanded, onToggle, onNavigate, onXRef, id }) {
  const [detailView, setDetailView] = useState(null);

  useEffect(() => {
    if (!isExpanded) setDetailView(null);
  }, [isExpanded]);

  const handleToggle = () => {
    if (isExpanded) setDetailView(null);
    onToggle();
  };

  const leafInfo = countLeafNodes(leader.suboutlines);

  return (
    <div
      id={id}
      style={{
        border: "1px solid #d0cec8",
        borderRadius: "4px",
        marginBottom: "8px",
        backgroundColor: "#fff",
        borderLeft: "1px solid #d0cec8",
      }}
    >
      {/* Header */}
      <div
        onClick={handleToggle}
        style={{ padding: "12px 16px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", userSelect: "none" }}
      >
        <div>
          <span style={{ fontWeight: 700, fontSize: "15px", color: "#1a1a1a", fontFamily: "'Georgia', serif" }}>
            {leader.name}
          </span>
          <div style={{ marginTop: "4px" }}>
            {leader.papers.map((p) => (
              <PaperBadge key={p} paper={p} onNavigate={onNavigate} />
            ))}
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
          {leafInfo.total > 0 && (
            <span style={{ fontSize: "11px", color: "#888", fontFamily: "'Georgia', serif" }}>
              {leafInfo.filled}/{leafInfo.total}
            </span>
          )}
          <button
            onClick={(e) => { e.stopPropagation(); onXRef(leader.name); }}
            title="Show where this leader appears"
            style={{
              fontSize: "14px", padding: "1px 7px", backgroundColor: "#e8f0ed",
              color: "#2D6A4F", border: "1px solid #b8d9c8", borderRadius: "3px",
              cursor: "pointer", fontFamily: "sans-serif", fontWeight: 400,
              lineHeight: 1.4, transition: "all 0.15s",
            }}
            onMouseEnter={e => { e.currentTarget.style.backgroundColor = "#264653"; e.currentTarget.style.color = "#fff"; e.currentTarget.style.borderColor = "#264653"; }}
            onMouseLeave={e => { e.currentTarget.style.backgroundColor = "#e8f0ed"; e.currentTarget.style.color = "#2D6A4F"; e.currentTarget.style.borderColor = "#b8d9c8"; }}
          >
            {"\u24D8"}
          </button>
          <span style={{ fontSize: "18px", color: "#888", transition: "transform 0.2s", transform: isExpanded ? "rotate(90deg)" : "rotate(0)" }}>{"\u25B6"}</span>
        </div>
      </div>

      {/* Outline view */}
      {isExpanded && !detailView && (
        <div style={{ padding: "0 16px 16px", borderTop: "1px solid #eee" }}>
          {/* Notes field */}
          {leader.notes && (
            <div style={{ marginTop: "12px", padding: "10px 14px", backgroundColor: "#f5f3ee", borderRadius: "4px", borderLeft: "3px solid #aaa" }}>
              <div style={{ fontSize: "13px", color: "#444", fontFamily: "'Georgia', serif", lineHeight: 1.6 }}>{leader.notes}</div>
            </div>
          )}

          {/* Topic Outlines */}
          {leader.suboutlines && leader.suboutlines.length > 0 && (
            <div style={{ marginTop: "14px" }}>
              <div style={{ fontSize: "11px", fontWeight: 700, color: "#888", textTransform: "uppercase", letterSpacing: "1px", marginBottom: "8px" }}>
                Topic Outlines
                <span style={{ marginLeft: "8px", fontSize: "10px", fontWeight: 400, color: "#aaa", fontStyle: "italic" }}>click filled items to read</span>
              </div>
              <div style={{ backgroundColor: "#f4f8f5", borderRadius: "4px", padding: "10px 14px", border: "1px solid #d4e8db" }}>
                {leader.suboutlines.map((item, i) => (
                  <SuboutlineItem key={i} item={item} depth={0} path={[leader.name]} onContentClick={(content, path) => setDetailView({ content, path })} />
                ))}
              </div>
            </div>
          )}

        </div>
      )}

      {/* Detail / reading view */}
      {isExpanded && detailView && (
        <div style={{ padding: "0 16px 20px", borderTop: "1px solid #eee" }}>
          <div style={{ marginTop: "12px", display: "flex", alignItems: "center", gap: "10px", marginBottom: "16px" }}>
            <button
              onClick={() => setDetailView(null)}
              style={{ padding: "5px 12px", fontSize: "12px", fontFamily: "'Georgia', serif", border: "1px solid #ccc", borderRadius: "3px", cursor: "pointer", backgroundColor: "#f5f3ee", color: "#333", fontWeight: 600 }}
            >
              {"\u2190"} Back
            </button>
            <div style={{ fontSize: "11px", color: "#888", fontFamily: "'Georgia', serif" }}>
              {detailView.path.join(" \u203A ")}
            </div>
          </div>
          <div style={{ fontSize: "16px", fontWeight: 700, color: "#1a1a1a", fontFamily: "'Georgia', serif", marginBottom: "16px", paddingBottom: "8px", borderBottom: "1px solid #e8e6e0" }}>
            {detailView.path[detailView.path.length - 1]}
          </div>
          <ContentRenderer paragraphs={detailView.content} />
        </div>
      )}
    </div>
  );
}

// ─── CRISIS ACCORDION SECTION ────────────────────────────────────────────────
function AccordionSection({ title, isOpen, onToggle, count, onEdit, children }) {
  const hasContent = count != null;
  const headerBg = hasContent ? "#fff" : "#faf9f6";
  const borderColor = hasContent ? "#d0cec8" : "#e0ddd6";
  return (
    <div style={{ marginTop: "10px", border: `1px solid ${borderColor}`, borderRadius: "4px", overflow: "hidden" }}>
      <div
        onClick={onToggle}
        style={{ padding: "10px 14px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", userSelect: "none", backgroundColor: headerBg, transition: "background 0.15s" }}
      >
        <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
          <span style={{ fontSize: "11px", fontWeight: 700, color: hasContent ? "#264653" : "#888", textTransform: "uppercase", letterSpacing: "1px" }}>{title}</span>
          {hasContent ? (
            <span style={{ fontSize: "9px", backgroundColor: "#2D6A4F", color: "#fff", borderRadius: "3px", padding: "1px 6px", fontWeight: 700, fontFamily: "sans-serif" }}>{count}</span>
          ) : (
            <span style={{ fontSize: "9px", color: "#bbb", fontStyle: "italic", fontFamily: "sans-serif" }}>empty</span>
          )}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
          {onEdit && (
            <button
              onClick={(e) => { e.stopPropagation(); onEdit(); }}
              style={{ fontSize: "11px", padding: "1px 6px", backgroundColor: "transparent", color: "#bbb", border: "1px solid #ddd", borderRadius: "3px", cursor: "pointer", lineHeight: 1.4, transition: "all 0.15s" }}
              onMouseEnter={e => { e.currentTarget.style.backgroundColor = "#264653"; e.currentTarget.style.color = "#fff"; e.currentTarget.style.borderColor = "#264653"; }}
              onMouseLeave={e => { e.currentTarget.style.backgroundColor = "transparent"; e.currentTarget.style.color = "#bbb"; e.currentTarget.style.borderColor = "#ddd"; }}
            >✎</button>
          )}
          <span style={{ fontSize: "14px", color: "#888", transition: "transform 0.2s", transform: isOpen ? "rotate(90deg)" : "rotate(0)" }}>{"\u25B6"}</span>
        </div>
      </div>
      {isOpen && <div style={{ padding: "12px 14px", borderTop: `1px solid ${borderColor}` }}>{children}</div>}
    </div>
  );
}

// ─── CRISIS CARD ─────────────────────────────────────────────────────────────
function CrisisCard({ crisis, isExpanded, onToggle, onNavigate, onXRef, id }) {
  const [openSections, setOpenSections] = useState({});

  useEffect(() => {
    if (!isExpanded) setOpenSections({});
  }, [isExpanded]);

  const toggleSection = (section) => {
    setOpenSections((prev) => ({ ...prev, [section]: !prev[section] }));
  };

  const { overlay, onEdit } = React.useContext(EditContext);
  const causesKey = `crisis > ${crisis.name} > causes`;
  const impactKey = `crisis > ${crisis.name} > impact`;
  const effectiveCauses = overlay[causesKey] !== undefined ? overlay[causesKey] : crisis.causes;
  const effectiveImpact = overlay[impactKey] !== undefined ? overlay[impactKey] : crisis.impact;
  const causesCount = Array.isArray(effectiveCauses) ? effectiveCauses.length : 0;
  const impactCount = Array.isArray(effectiveImpact) ? effectiveImpact.length : 0;
  const leaderContentCount = crisis.leaderContent ? crisis.leaderContent.length : 0;

  return (
    <div id={id} style={{ border: "1px solid #d0cec8", borderRadius: "4px", marginBottom: "8px", backgroundColor: "#fff" }}>
      <div onClick={onToggle} style={{ padding: "12px 16px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", userSelect: "none" }}>
        <div>
          <span style={{ fontWeight: 700, fontSize: "15px", color: "#1a1a1a", fontFamily: "'Georgia', serif" }}>{crisis.name}</span>
          <div style={{ marginTop: "4px" }}>
            {crisis.papers.map((p) => (
              <PaperBadge key={p} paper={p} onNavigate={onNavigate} />
            ))}
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
          {(causesCount > 0 || impactCount > 0) && (
            <span style={{ fontSize: "10px", color: "#2D6A4F", fontWeight: 600 }}>
              {causesCount > 0 ? "\u2713 C" : ""}{impactCount > 0 ? " \u2713 I" : ""}
            </span>
          )}
          <button
            onClick={(e) => { e.stopPropagation(); onXRef(crisis.name); }}
            title="Show where this crisis appears"
            style={{ fontSize: "14px", padding: "1px 7px", backgroundColor: "#e8f0ed", color: "#2D6A4F", border: "1px solid #b8d9c8", borderRadius: "3px", cursor: "pointer", fontFamily: "sans-serif", fontWeight: 400, lineHeight: 1.4, transition: "all 0.15s" }}
            onMouseEnter={e => { e.currentTarget.style.backgroundColor = "#264653"; e.currentTarget.style.color = "#fff"; e.currentTarget.style.borderColor = "#264653"; }}
            onMouseLeave={e => { e.currentTarget.style.backgroundColor = "#e8f0ed"; e.currentTarget.style.color = "#2D6A4F"; e.currentTarget.style.borderColor = "#b8d9c8"; }}
          >{"\u24D8"}</button>
          <span style={{ fontSize: "18px", color: "#888", transition: "transform 0.2s", transform: isExpanded ? "rotate(90deg)" : "rotate(0)" }}>{"\u25B6"}</span>
        </div>
      </div>
      {isExpanded && (
        <div style={{ padding: "0 16px 16px", borderTop: "1px solid #eee" }}>
          {/* Leader navigation links — always visible */}
          <div style={{ marginTop: "10px", display: "flex", flexWrap: "wrap", gap: "4px", alignItems: "center" }}>
            <span style={{ fontSize: "10px", fontWeight: 700, color: "#888", textTransform: "uppercase", letterSpacing: "1px", marginRight: "6px" }}>Leaders:</span>
            {crisis.leaderLinks.map((l) => (
              <button
                key={l}
                onClick={() => onNavigate("leaders", l)}
                style={{ fontSize: "11px", padding: "3px 10px", backgroundColor: "#2D6A4F", color: "#fff", border: "none", borderRadius: "3px", cursor: "pointer", fontFamily: "'Georgia', serif", fontWeight: 600 }}
              >
                {l}
              </button>
            ))}
          </div>

          {/* Causes accordion */}
          <AccordionSection
            title="Causes"
            isOpen={openSections.causes}
            onToggle={() => toggleSection("causes")}
            count={causesCount > 0 ? `${causesCount} cards` : null}
            onEdit={() => onEdit([causesKey], effectiveCauses)}
          >
            <ContentRenderer paragraphs={effectiveCauses} />
          </AccordionSection>

          {/* Impact accordion */}
          <AccordionSection
            title="Impact & Significance"
            isOpen={openSections.impact}
            onToggle={() => toggleSection("impact")}
            count={impactCount > 0 ? `${impactCount} cards` : null}
            onEdit={() => onEdit([impactKey], effectiveImpact)}
          >
            <ContentRenderer paragraphs={effectiveImpact} />
          </AccordionSection>

          {/* Leader Analysis accordion */}
          {crisis.leaderContent && crisis.leaderContent.length > 0 && (
            <AccordionSection
              title="Leader Analysis"
              isOpen={openSections.leaderAnalysis}
              onToggle={() => toggleSection("leaderAnalysis")}
              count={`${leaderContentCount} leaders`}
            >
              {crisis.leaderContent.map((lc, i) => (
                <div key={i} style={{ marginBottom: i < crisis.leaderContent.length - 1 ? "14px" : "0" }}>
                  <div style={{ fontSize: "13px", fontWeight: 700, color: "#264653", marginBottom: "6px", fontFamily: "'Georgia', serif" }}>{lc.name}</div>
                  <ul style={{ margin: "0", paddingLeft: "18px", listStyleType: "disc" }}>
                    {lc.bullets.map((b, j) => (
                      <li key={j} style={{ fontSize: "12.5px", color: "#333", fontFamily: "'Georgia', serif", lineHeight: 1.65, marginBottom: "3px" }}>
                        {b}
                      </li>
                    ))}
                  </ul>
                </div>
              ))}
            </AccordionSection>
          )}
        </div>
      )}
    </div>
  );
}

// ─── DEVELOPMENTS SECTION ────────────────────────────────────────────────────
function DevItem({ item }) {
  const [isOpen, setIsOpen] = useState(false);
  const { overlay, onEdit } = React.useContext(EditContext);
  const devKey = `dev > ${item.name}`;
  const effectiveDetail = overlay[devKey] !== undefined ? overlay[devKey] : item.detail;
  const cardCount = Array.isArray(effectiveDetail) ? effectiveDetail.length : 0;
  const count = cardCount > 0 ? `${cardCount} card${cardCount !== 1 ? "s" : ""}` : null;
  return (
    <div id={`dev-${item.name.replace(/\s+/g, "-")}`}>
      <AccordionSection
        title={item.name}
        isOpen={isOpen}
        onToggle={() => setIsOpen(o => !o)}
        count={count}
        onEdit={() => onEdit(["dev", item.name], effectiveDetail)}
      >
        <ContentRenderer paragraphs={effectiveDetail} />
      </AccordionSection>
    </div>
  );
}

function DevSection({ title, items, papers, onNavigate }) {
  return (
    <div style={{ marginBottom: "20px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "8px", flexWrap: "wrap" }}>
        <h4 style={{ fontFamily: "'Georgia', serif", fontSize: "15px", color: "#264653", fontWeight: 700, margin: 0 }}>{title}</h4>
        {papers && papers.map((p) => (
          <PaperBadge key={p} paper={p} onNavigate={onNavigate} />
        ))}
      </div>
      {items.map((item, i) => (
        <DevItem key={i} item={item} />
      ))}
    </div>
  );
}

// ─── SYLLABUS TAB ─────────────────────────────────────────────────────────────
function SyllabusTab({ onNavigate, onXRef }) {
  const [expanded, setExpanded] = useState({});

  return (
    <div>
      <div style={{ padding: "10px 14px", backgroundColor: "#f5f3ee", borderRadius: "4px", marginBottom: "16px", fontSize: "12px", color: "#666", fontFamily: "'Georgia', serif", fontStyle: "italic" }}>
        Click any syllabus point to see which leaders, crises, and developments match it. Use the links to jump to that content.
      </div>
      {syllabus.map((section, si) => {
        const pc = paperColors[section.paper] || { bg: "#ddd", text: "#333" };
        return (
          <div key={si} id={`syllabus-${section.paper.replace(/\s+/g, "-")}`} style={{ marginBottom: "20px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "10px" }}>
              <span style={{ fontSize: "11px", fontWeight: 700, padding: "3px 10px", borderRadius: "3px", backgroundColor: pc.bg, color: pc.text }}>{section.paper}</span>
              <span style={{ fontFamily: "'Georgia', serif", fontSize: "15px", fontWeight: 700, color: "#264653" }}>{section.title}</span>
            </div>
            {section.points.map((point, pi) => {
              const key = `${si}-${pi}`;
              const isOpen = expanded[key];

// ─── ESSAY CARD LOGIC ─────────────────────────────────────────────────────────
function collectLeafCards(suboutlines, path) {
  const findNode = (items, names) => {
    if (!items || !names.length) return null;
    const node = items.find(n => n.name === names[0]);
    if (!node) return null;
    return names.length === 1 ? node : findNode(node.children, names.slice(1));
  };
  const root = path.length === 0 ? { children: suboutlines } : findNode(suboutlines, path);
  if (!root) return [];
  const cards = [];
  function gather(n) {
    if (n.content && n.content.length > 0) cards.push({ leafName: n.name, content: n.content });
    else if (n.children) n.children.forEach(gather);
  }
  if (root.children) root.children.forEach(gather);
  else gather(root);
  return cards;
}

function getEssayCards(q) {
  const mapping = sectionBranchMap[q.section];
  if (!mapping) return [];
  const groups = [];

  // Gather linked leaders/crises/developments from syllabus points tagged to this section
  const linkedLeaders = new Set();
  const linkedCrises = new Set();
  const linkedDevs = new Set();
  syllabus.forEach(s => s.points.forEach(p => {
    if (p.sections && p.sections.includes(q.section)) {
      (p.links.leaders || []).forEach(l => linkedLeaders.add(l));
      (p.links.crises || []).forEach(c => linkedCrises.add(c));
      (p.links.developments || []).forEach(d => linkedDevs.add(d));
    }
  }));

  // Leaders
  if (mapping.leaderPath) {
    linkedLeaders.forEach(leaderName => {
      const leader = data.leaders.find(l => l.name === leaderName);
      if (!leader) return;
      const cards = collectLeafCards(leader.suboutlines || [], mapping.leaderPath);
      if (cards.length > 0) groups.push({ label: leaderName, type: "leader", cards });
    });
  }

  // Crises
  if (mapping.crisisField) {
    linkedCrises.forEach(crisisName => {
      const crisis = data.crises.find(c => c.name === crisisName);
      if (!crisis) return;
      const cards = [];
      mapping.crisisField.forEach(field => {
        if (Array.isArray(crisis[field])) {
          crisis[field].forEach(c => cards.push({ leafName: field, content: [c] }));
        }
      });
      if (cards.length > 0) groups.push({ label: crisisName, type: "crisis", cards });
    });
  }

  // Developments — detail string, skip if empty
  linkedDevs.forEach(devName => {
    const allDevItems = Object.values(data.developments).flatMap(d => d.items);
    const dev = allDevItems.find(d => d.name === devName);
    if (!dev || !dev.detail) return;
    groups.push({ label: devName, type: "development", cards: [{ leafName: devName, content: dev.detail }] });
  });

  return groups;
}

function EssayModal({ question, groups, onClose }) {
  const { useState: useS, useRef, useEffect, useMemo } = React;

  // Paragraph slots — each has text fields + card refs for evidence, topic, and link
  const [slots, setSlots] = useS(() => [
    { id: 1, cards: [], topicSentence: "", linkSentence: "", topicCards: [], linkCards: [] },
    { id: 2, cards: [], topicSentence: "", linkSentence: "", topicCards: [], linkCards: [] },
    { id: 3, cards: [], topicSentence: "", linkSentence: "", topicCards: [], linkCards: [] },
  ]);
  const [nextSlotId, setNextSlotId] = useS(4);
  const [dragOver, setDragOver] = useS(null); // slot id OR "intro" OR "conclusion"
  const [copied, setCopied] = useS(false);

  // Intro / Conclusion
  const [intro, setIntro] = useS("");
  const [conclusion, setConclusion] = useS("");
  const [introCards, setIntroCards] = useS([]);
  const [conclusionCards, setConclusionCards] = useS([]);

  // Custom card creator
  const [customCards, setCustomCards] = useS([]);
  const [showCustomForm, setShowCustomForm] = useS(false);
  const [customDraft, setCustomDraft] = useS({ label: "", leafName: "", text: "" });
  const [nextCustomId, setNextCustomId] = useS(1);

  const dragPayload = useRef(null);

  useEffect(() => {
    const handler = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [onClose]);

  const typeColors = {
    leader:      { bg: "#2D6A4F", text: "#fff", label: "Leader" },
    crisis:      { bg: "#264653", text: "#fff", label: "Crisis" },
    development: { bg: "#7B6F5E", text: "#fff", label: "Development" },
    custom:      { bg: "#6B4F9E", text: "#fff", label: "Custom" },
  };

  // Resolve a card ref to { card, group } — handles custom cards (groupIdx === -1)
  const resolveCard = (ref) => {
    if (ref.groupIdx === -1) {
      const c = customCards[ref.cardIdx];
      return c ? { card: c, group: { label: c.label || "Custom", type: "custom" } } : null;
    }
    const card = groups[ref.groupIdx]?.cards[ref.cardIdx];
    const group = groups[ref.groupIdx];
    return card && group ? { card, group } : null;
  };

  const totalLibCards = groups.reduce((n, g) => n + g.cards.length, 0) + customCards.length;

  // ── Drag handlers ──

  const onLibDragStart = (e, item) => {
    dragPayload.current = { cardId: item.id, groupIdx: item.groupIdx, cardIdx: item.cardIdx, fromSlot: null };
    e.dataTransfer.effectAllowed = "copy";
  };

  const onSlotCardDragStart = (e, slotId, pos) => {
    const slot = slots.find(s => s.id === slotId);
    if (!slot) return;
    const ref = slot.cards[pos];
    dragPayload.current = { cardId: ref.cardId, groupIdx: ref.groupIdx, cardIdx: ref.cardIdx, fromSlot: slotId, fromPos: pos };
    e.dataTransfer.effectAllowed = "move";
    e.stopPropagation();
  };

  const onIntroCardDragStart = (e, pos) => {
    const ref = introCards[pos];
    dragPayload.current = { cardId: ref.cardId, groupIdx: ref.groupIdx, cardIdx: ref.cardIdx, fromSlot: "intro", fromPos: pos };
    e.dataTransfer.effectAllowed = "move";
    e.stopPropagation();
  };

  const onConclusionCardDragStart = (e, pos) => {
    const ref = conclusionCards[pos];
    dragPayload.current = { cardId: ref.cardId, groupIdx: ref.groupIdx, cardIdx: ref.cardIdx, fromSlot: "conclusion", fromPos: pos };
    e.dataTransfer.effectAllowed = "move";
    e.stopPropagation();
  };

  const onSubCardDragStart = (e, slotId, subField, pos) => {
    const slot = slots.find(s => s.id === slotId);
    if (!slot) return;
    const ref = slot[subField][pos];
    dragPayload.current = { cardId: ref.cardId, groupIdx: ref.groupIdx, cardIdx: ref.cardIdx, fromSlot: `${slotId}:${subField}`, fromPos: pos };
    e.dataTransfer.effectAllowed = "move";
    e.stopPropagation();
  };

  // Remove a card from wherever it came from (by fromSlot / fromPos in dragPayload)
  const removeFromSource = (p) => {
    if (p.fromSlot === null) return; // came from library, nothing to remove
    if (p.fromSlot === "intro") {
      setIntroCards(prev => prev.filter((_, i) => i !== p.fromPos));
    } else if (p.fromSlot === "conclusion") {
      setConclusionCards(prev => prev.filter((_, i) => i !== p.fromPos));
    } else if (typeof p.fromSlot === "string" && p.fromSlot.includes(":")) {
      // "slotId:subField" — topicCards or linkCards
      const [sid, subField] = p.fromSlot.split(":");
      const srcId = Number(sid);
      setSlots(prev => prev.map(s => s.id === srcId ? { ...s, [subField]: s[subField].filter((_, i) => i !== p.fromPos) } : s));
    } else {
      // evidence cards zone
      setSlots(prev => prev.map(s => s.id === p.fromSlot ? { ...s, cards: s.cards.filter((_, i) => i !== p.fromPos) } : s));
    }
  };

  // Drop into intro/conclusion
  const onIntroOrConclusionDrop = (e, target) => {
    e.preventDefault();
    setDragOver(null);
    const p = dragPayload.current;
    if (!p) return;
    removeFromSource(p);
    const newRef = { cardId: p.cardId, groupIdx: p.groupIdx, cardIdx: p.cardIdx };
    if (target === "intro") {
      setIntroCards(prev => prev.some(c => c.cardId === p.cardId) ? prev : [...prev, newRef]);
    } else {
      setConclusionCards(prev => prev.some(c => c.cardId === p.cardId) ? prev : [...prev, newRef]);
    }
    dragPayload.current = null;
  };

  // Drop onto a paragraph slot's evidence zone
  const onSlotDrop = (e, slotId) => {
    e.preventDefault();
    setDragOver(null);
    const p = dragPayload.current;
    if (!p) return;
    removeFromSource(p);
    setSlots(prev => {
      const next = prev.map(s => ({ ...s, cards: [...s.cards] }));
      const tgt = next.find(s => s.id === slotId);
      if (tgt && !tgt.cards.some(c => c.cardId === p.cardId)) {
        tgt.cards.push({ cardId: p.cardId, groupIdx: p.groupIdx, cardIdx: p.cardIdx });
      }
      return next;
    });
    dragPayload.current = null;
  };

  // Drop onto a slot's topic or link sub-zone
  const onSubZoneDrop = (e, slotId, subField) => {
    e.preventDefault();
    e.stopPropagation(); // don't bubble to the evidence-zone slot drop
    setDragOver(null);
    const p = dragPayload.current;
    if (!p) return;
    removeFromSource(p);
    const newRef = { cardId: p.cardId, groupIdx: p.groupIdx, cardIdx: p.cardIdx };
    setSlots(prev => prev.map(s => {
      if (s.id !== slotId) return s;
      if (s[subField].some(c => c.cardId === p.cardId)) return s;
      return { ...s, [subField]: [...s[subField], newRef] };
    }));
    dragPayload.current = null;
  };

  // Remove helpers
  const removeFromSlot = (e, slotId, pos) => {
    e.preventDefault();
    setSlots(prev => prev.map(s => s.id === slotId ? { ...s, cards: s.cards.filter((_, i) => i !== pos) } : s));
  };
  const removeFromSubZone = (e, slotId, subField, pos) => {
    e.preventDefault();
    setSlots(prev => prev.map(s => s.id === slotId ? { ...s, [subField]: s[subField].filter((_, i) => i !== pos) } : s));
  };
  const removeFromIntro = (e, pos) => { e.preventDefault(); setIntroCards(prev => prev.filter((_, i) => i !== pos)); };
  const removeFromConclusion = (e, pos) => { e.preventDefault(); setConclusionCards(prev => prev.filter((_, i) => i !== pos)); };

  // Slot management
  const addSlot = () => {
    setSlots(prev => [...prev, { id: nextSlotId, cards: [], topicSentence: "", linkSentence: "", topicCards: [], linkCards: [] }]);
    setNextSlotId(n => n + 1);
  };
  const removeSlot = (slotId) => setSlots(prev => prev.filter(s => s.id !== slotId));
  const updateSlotText = (slotId, field, value) =>
    setSlots(prev => prev.map(s => s.id === slotId ? { ...s, [field]: value } : s));

  // Custom card submission
  const submitCustomCard = () => {
    if (!customDraft.leafName.trim()) return;
    const newCard = {
      id: `custom-${nextCustomId}`,
      label: customDraft.label.trim() || "Custom",
      leafName: customDraft.leafName.trim(),
      content: [{ title: customDraft.leafName.trim(), bullets: customDraft.text.split("\n").filter(Boolean) }],
    };
    setCustomCards(prev => [...prev, newCard]);
    setNextCustomId(n => n + 1);
    setCustomDraft({ label: "", leafName: "", text: "" });
    setShowCustomForm(false);
  };

  // Copy plan to clipboard
  const copyPlan = () => {
    const cardLines = (cardRefs) => {
      const lines = [];
      cardRefs.forEach(ref => {
        const resolved = resolveCard(ref);
        if (!resolved) return;
        const { card, group } = resolved;
        lines.push(`  [${group.label}] ${card.leafName}`);
        const contentArr = Array.isArray(card.content) ? card.content : [];
        contentArr.forEach(para => {
          if (para.title) lines.push(`    ${para.title}`);
          if (para.bullets) para.bullets.forEach(b => lines.push(`      • ${b}`));
        });
        if (contentArr.length === 0 && typeof card.content === "string") lines.push(`    ${card.content}`);
      });
      return lines;
    };

    const lines = [];
    if (question) { lines.push(question.question); lines.push(""); }

    lines.push("Introduction:");
    lines.push(...cardLines(introCards));
    if (intro.trim()) intro.trim().split("\n").forEach(l => lines.push(`  ${l}`));
    if (!introCards.length && !intro.trim()) lines.push("  (empty)");
    lines.push("");

    slots.forEach((slot, si) => {
      lines.push(`¶${si + 1}`);
      if (slot.topicCards.length) lines.push(...cardLines(slot.topicCards));
      else if (slot.topicSentence.trim()) lines.push(`  Topic: ${slot.topicSentence.trim()}`);
      lines.push(...cardLines(slot.cards));
      if (slot.linkCards.length) lines.push(...cardLines(slot.linkCards));
      else if (slot.linkSentence.trim()) lines.push(`  Link: ${slot.linkSentence.trim()}`);
      if (!slot.topicSentence.trim() && !slot.topicCards.length && !slot.cards.length && !slot.linkSentence.trim() && !slot.linkCards.length) lines.push("  (empty)");
      lines.push("");
    });

    lines.push("Conclusion:");
    lines.push(...cardLines(conclusionCards));
    if (conclusion.trim()) conclusion.trim().split("\n").forEach(l => lines.push(`  ${l}`));
    if (!conclusionCards.length && !conclusion.trim()) lines.push("  (empty)");

    navigator.clipboard.writeText(lines.join("\n")).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  // ── Shared renderers ──

  const taStyle = {
    width: "100%", boxSizing: "border-box", resize: "vertical",
    fontFamily: "'Georgia', serif", fontSize: "12px", color: "#333",
    lineHeight: 1.6, padding: "8px 12px",
    border: "none", outline: "none", backgroundColor: "transparent",
  };

  const renderCardBlock = (ref, pos, { onDragStart, onRemove, isLast }) => {
    const resolved = resolveCard(ref);
    if (!resolved) return null;
    const { card, group } = resolved;
    const tc = typeColors[group.type] || typeColors.development;
    const contentArr = Array.isArray(card.content) ? card.content : [];
    return (
      <div
        key={ref.cardId + pos}
        draggable
        onDragStart={e => onDragStart(e, pos)}
        onContextMenu={e => onRemove(e, pos)}
        style={{
          borderLeft: `4px solid ${tc.bg}`,
          borderBottom: isLast ? "none" : "1px solid #e8e6e0",
          padding: "10px 14px",
          cursor: "grab",
          backgroundColor: "#fff",
        }}
      >
        <div style={{ display: "flex", alignItems: "baseline", gap: "8px", marginBottom: "6px" }}>
          <span style={{ fontSize: "9px", fontWeight: 700, padding: "1px 6px", borderRadius: "3px", backgroundColor: tc.bg, color: tc.text, flexShrink: 0 }}>{group.label}</span>
          <span style={{ fontSize: "11px", fontWeight: 700, color: "#264653", fontFamily: "'Georgia', serif" }}>{card.leafName}</span>
          <span style={{ marginLeft: "auto", fontSize: "10px", color: "#ccc", cursor: "default" }} title="Right-click to remove">⋮⋮</span>
        </div>
        {contentArr.map((para, pi) => (
          <div key={pi} style={{ marginBottom: pi < contentArr.length - 1 ? "8px" : 0 }}>
            <div style={{ fontSize: "11px", fontWeight: 700, color: "#264653", fontFamily: "'Georgia', serif", marginBottom: "3px" }}>{para.title}</div>
            {para.bullets && (
              <ul style={{ margin: 0, paddingLeft: "18px" }}>
                {para.bullets.map((b, bi) => (
                  <li key={bi} style={{ fontSize: "12px", color: "#333", fontFamily: "'Georgia', serif", lineHeight: 1.6, marginBottom: "2px" }}>{b}</li>
                ))}
              </ul>
            )}
          </div>
        ))}
        {contentArr.length === 0 && typeof card.content === "string" && (
          <div style={{ fontSize: "12px", color: "#333", fontFamily: "'Georgia', serif", lineHeight: 1.6 }}>{card.content}</div>
        )}
      </div>
    );
  };

  const renderIntroConclusion = (label, text, setText, cards, onCardDragStart, onRemove, onDrop, key) => {
    const isOver = dragOver === key;
    return (
      <div
        onDragOver={e => { e.preventDefault(); setDragOver(key); }}
        onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) setDragOver(null); }}
        onDrop={e => onDrop(e, key)}
        style={{
          marginBottom: "14px",
          border: isOver ? "2px dashed #2D6A4F" : "2px dashed #d0cec8",
          borderRadius: "7px",
          backgroundColor: isOver ? "#f0f7f2" : "#faf9f6",
          transition: "border-color 0.15s, background-color 0.15s",
          overflow: "hidden",
        }}
      >
        {/* Header */}
        <div style={{ display: "flex", alignItems: "center", gap: "8px", padding: "7px 14px", backgroundColor: isOver ? "#e0f0e8" : "#e8e4dc", borderBottom: "1px solid #e0ddd6" }}>
          <span style={{ fontSize: "11px", fontWeight: 700, color: "#264653", fontFamily: "'Georgia', serif", letterSpacing: "0.5px" }}>{label}</span>
          <span style={{ fontSize: "10px", color: "#aaa", fontFamily: "'Georgia', serif", fontStyle: "italic" }}>· type notes or drag cards in (cards replace the text box)</span>
        </div>
        {/* Textarea — hidden once cards are dropped in */}
        {cards.length === 0 && (
          <div style={{ backgroundColor: "#f8f6f2" }}>
            <textarea
              rows={3}
              placeholder={`Write your ${label.toLowerCase()} notes here… or drag cards in above`}
              value={text}
              onChange={e => setText(e.target.value)}
              style={{ ...taStyle, minHeight: "60px" }}
            />
          </div>
        )}
        {/* Dropped cards (replace textarea) */}
        {cards.map((ref, pos) =>
          renderCardBlock(ref, pos, {
            onDragStart: onCardDragStart,
            onRemove,
            isLast: pos === cards.length - 1,
          })
        )}
      </div>
    );
  };

  const renderLibCard = (card, gi, ci, cardId) => {
    const tc = typeColors[card.type] || (gi === -1 ? typeColors.custom : typeColors.development);
    const grp = gi === -1 ? { label: card.label || "Custom", type: "custom" } : groups[gi];
    const tcFinal = typeColors[grp?.type] || typeColors.development;
    const title = Array.isArray(card.content) && card.content[0] ? card.content[0].title : card.leafName;
    const bullets = Array.isArray(card.content) && card.content[0]?.bullets ? card.content[0].bullets : [];
    return (
      <div
        key={cardId}
        draggable
        onDragStart={e => onLibDragStart(e, { id: cardId, groupIdx: gi, cardIdx: ci })}
        title={bullets.slice(0, 2).join("\n")}
        style={{
          padding: "7px 11px", border: `1.5px solid ${tcFinal.bg}`, borderRadius: "5px",
          backgroundColor: "#fff", cursor: "grab", userSelect: "none",
          maxWidth: "240px", transition: "box-shadow 0.12s",
        }}
        onMouseEnter={e => e.currentTarget.style.boxShadow = "0 2px 8px rgba(0,0,0,0.14)"}
        onMouseLeave={e => e.currentTarget.style.boxShadow = "none"}
      >
        <div style={{ fontSize: "9px", fontWeight: 700, color: tcFinal.bg, textTransform: "uppercase", letterSpacing: "0.6px", marginBottom: "3px" }}>{grp?.label}</div>
        <div style={{ fontSize: "12px", fontFamily: "'Georgia', serif", fontWeight: 600, color: "#1a1a1a", lineHeight: 1.3 }}>{title}</div>
        {bullets.length > 0 && (
          <div style={{ fontSize: "10px", color: "#888", fontFamily: "'Georgia', serif", marginTop: "3px", lineHeight: 1.4, overflow: "hidden", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical" }}>
            {bullets[0]}
          </div>
        )}
      </div>
    );
  };

  return (
    <>
      {/* Backdrop */}
      <div onClick={onClose} style={{ position: "fixed", inset: 0, backgroundColor: "rgba(0,0,0,0.55)", zIndex: 200, backdropFilter: "blur(2px)" }} />

      {/* Panel */}
      <div style={{ position: "fixed", top: "50%", left: "50%", transform: "translate(-50%,-50%)", width: "min(1060px, 96vw)", height: "92vh", backgroundColor: "#faf9f6", borderRadius: "8px", boxShadow: "0 24px 64px rgba(0,0,0,0.35)", zIndex: 201, display: "flex", flexDirection: "column", overflow: "hidden" }}>

        {/* Header */}
        <div style={{ padding: "16px 24px 14px", backgroundColor: "#264653", flexShrink: 0 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "16px" }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "6px", flexWrap: "wrap" }}>
                <span style={{ fontSize: "10px", fontWeight: 700, color: "#E9C46A", textTransform: "uppercase", letterSpacing: "1.5px" }}>Essay Planner</span>
                {question && <PaperBadge paper={question.paper} />}
                {question && <span style={{ fontSize: "10px", color: "rgba(255,255,255,0.55)", fontFamily: "'Georgia', serif" }}>{question.year}</span>}
                <span style={{ fontSize: "10px", color: "rgba(255,255,255,0.4)" }}>·</span>
                <span style={{ fontSize: "10px", color: "rgba(255,255,255,0.45)", fontStyle: "italic" }}>Drag cards into slots · right-click a card to remove</span>
              </div>
              <div style={{ fontSize: "13px", fontFamily: "'Georgia', serif", color: "#fff", lineHeight: 1.5, fontWeight: 600 }}>
                {question ? question.question : ""}
              </div>
            </div>
            <button onClick={onClose} style={{ background: "none", border: "none", color: "rgba(255,255,255,0.6)", fontSize: "24px", cursor: "pointer", lineHeight: 1, padding: "0 0 0 8px", flexShrink: 0 }}>×</button>
          </div>
        </div>

        {/* Body */}
        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>

          {/* ── PLAN AREA ── */}
          <div style={{ flex: 1, overflowY: "auto", padding: "16px 24px 12px", borderBottom: "2px solid #d0cec8", backgroundColor: "#fff" }}>
            <div style={{ fontSize: "10px", fontWeight: 700, color: "#888", textTransform: "uppercase", letterSpacing: "1px", marginBottom: "12px" }}>Essay Plan</div>

            {/* Introduction */}
            {renderIntroConclusion(
              "Introduction", intro, setIntro, introCards,
              onIntroCardDragStart, removeFromIntro,
              onIntroOrConclusionDrop, "intro"
            )}

            {/* Paragraph slots */}
            {slots.map((slot, si) => {
              const isOver = dragOver === slot.id;
              return (
                <div
                  key={slot.id}
                  onDragOver={e => { e.preventDefault(); setDragOver(slot.id); }}
                  onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) setDragOver(null); }}
                  onDrop={e => onSlotDrop(e, slot.id)}
                  style={{
                    marginBottom: "14px",
                    border: isOver ? "2px dashed #2D6A4F" : "2px dashed #d0cec8",
                    borderRadius: "7px",
                    backgroundColor: isOver ? "#f0f7f2" : "#faf9f6",
                    transition: "border-color 0.15s, background-color 0.15s",
                    overflow: "hidden",
                  }}
                >
                  {/* Slot header */}
                  <div style={{ display: "flex", alignItems: "center", gap: "8px", padding: "7px 14px", backgroundColor: isOver ? "#e0f0e8" : "#f0ede6", borderBottom: "1px solid #e0ddd6" }}>
                    <span style={{ fontSize: "11px", fontWeight: 700, color: "#264653", fontFamily: "'Georgia', serif", letterSpacing: "0.5px" }}>¶{si + 1}</span>
                    <span style={{ fontSize: "10px", color: "#bbb", fontFamily: "'Georgia', serif", fontStyle: "italic" }}>
                      {slot.cards.length > 0 ? `${slot.cards.length} card${slot.cards.length !== 1 ? "s" : ""}` : ""}
                    </span>
                    <button
                      onClick={() => removeSlot(slot.id)}
                      title="Remove paragraph"
                      style={{ marginLeft: "auto", background: "none", border: "none", color: "#ccc", fontSize: "16px", cursor: "pointer", lineHeight: 1, padding: 0 }}
                      onMouseEnter={e => e.currentTarget.style.color = "#c0392b"}
                      onMouseLeave={e => e.currentTarget.style.color = "#ccc"}
                    >×</button>
                  </div>

                  {/* Topic sentence */}
                  <div
                    onDragOver={e => { e.preventDefault(); e.stopPropagation(); setDragOver(`${slot.id}:topic`); }}
                    onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) setDragOver(slot.id); }}
                    onDrop={e => onSubZoneDrop(e, slot.id, "topicCards")}
                    style={{ backgroundColor: dragOver === `${slot.id}:topic` ? "#e8f4ec" : "#f8f6f2", borderBottom: "1px solid #e8e6e0", transition: "background-color 0.15s" }}
                  >
                    <div style={{ fontSize: "9px", fontWeight: 700, color: dragOver === `${slot.id}:topic` ? "#2D6A4F" : "#aaa", textTransform: "uppercase", letterSpacing: "0.8px", padding: "6px 14px 0", transition: "color 0.15s" }}>Topic sentence</div>
                    {slot.topicCards.length === 0 ? (
                      <textarea
                        rows={2}
                        placeholder="Write your topic sentence… or drag a card in"
                        value={slot.topicSentence}
                        onChange={e => updateSlotText(slot.id, "topicSentence", e.target.value)}
                        style={{ ...taStyle, minHeight: "44px" }}
                      />
                    ) : (
                      slot.topicCards.map((ref, pos) =>
                        renderCardBlock(ref, pos, {
                          onDragStart: (e, p) => onSubCardDragStart(e, slot.id, "topicCards", p),
                          onRemove: (e, p) => removeFromSubZone(e, slot.id, "topicCards", p),
                          isLast: pos === slot.topicCards.length - 1,
                        })
                      )
                    )}
                  </div>

                  {/* Evidence cards */}
                  <div style={{ backgroundColor: "#fff", borderBottom: "1px solid #e8e6e0" }}>
                    <div style={{ fontSize: "9px", fontWeight: 700, color: "#aaa", textTransform: "uppercase", letterSpacing: "0.8px", padding: "6px 14px" }}>Evidence cards</div>
                    {slot.cards.length === 0 && (
                      <div style={{ padding: "8px 14px 12px", fontSize: "11px", color: "#ccc", fontFamily: "'Georgia', serif", fontStyle: "italic" }}>
                        Drop cards here…
                      </div>
                    )}
                    {slot.cards.map((ref, pos) =>
                      renderCardBlock(ref, pos, {
                        onDragStart: (e, p) => onSlotCardDragStart(e, slot.id, p),
                        onRemove: (e, p) => removeFromSlot(e, slot.id, p),
                        isLast: pos === slot.cards.length - 1,
                      })
                    )}
                  </div>

                  {/* Linking sentence */}
                  <div
                    onDragOver={e => { e.preventDefault(); e.stopPropagation(); setDragOver(`${slot.id}:link`); }}
                    onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) setDragOver(slot.id); }}
                    onDrop={e => onSubZoneDrop(e, slot.id, "linkCards")}
                    style={{ backgroundColor: dragOver === `${slot.id}:link` ? "#e8f4ec" : "#f8f6f2", transition: "background-color 0.15s" }}
                  >
                    <div style={{ fontSize: "9px", fontWeight: 700, color: dragOver === `${slot.id}:link` ? "#2D6A4F" : "#aaa", textTransform: "uppercase", letterSpacing: "0.8px", padding: "6px 14px 0", transition: "color 0.15s" }}>Linking sentence</div>
                    {slot.linkCards.length === 0 ? (
                      <textarea
                        rows={2}
                        placeholder="Write your linking sentence… or drag a card in"
                        value={slot.linkSentence}
                        onChange={e => updateSlotText(slot.id, "linkSentence", e.target.value)}
                        style={{ ...taStyle, minHeight: "44px" }}
                      />
                    ) : (
                      slot.linkCards.map((ref, pos) =>
                        renderCardBlock(ref, pos, {
                          onDragStart: (e, p) => onSubCardDragStart(e, slot.id, "linkCards", p),
                          onRemove: (e, p) => removeFromSubZone(e, slot.id, "linkCards", p),
                          isLast: pos === slot.linkCards.length - 1,
                        })
                      )
                    )}
                  </div>
                </div>
              );
            })}

            {/* Add paragraph button */}
            <button
              onClick={addSlot}
              style={{ display: "flex", alignItems: "center", gap: "6px", padding: "8px 16px", border: "1px dashed #bbb", borderRadius: "6px", backgroundColor: "transparent", color: "#999", fontSize: "12px", fontFamily: "'Georgia', serif", cursor: "pointer", transition: "all 0.15s", marginBottom: "14px" }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = "#2D6A4F"; e.currentTarget.style.color = "#2D6A4F"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = "#bbb"; e.currentTarget.style.color = "#999"; }}
            >
              <span style={{ fontSize: "18px", lineHeight: 1, fontWeight: 300 }}>+</span> Add paragraph
            </button>

            {/* Conclusion */}
            {renderIntroConclusion(
              "Conclusion", conclusion, setConclusion, conclusionCards,
              onConclusionCardDragStart, removeFromConclusion,
              onIntroOrConclusionDrop, "conclusion"
            )}
          </div>

          {/* ── CARD LIBRARY ── */}
          <div style={{ flex: "0 0 38%", overflowY: "auto", padding: "14px 24px 16px", backgroundColor: "#faf9f6" }}>

            {/* Library header + custom card button */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "12px" }}>
              <div style={{ fontSize: "10px", fontWeight: 700, color: "#888", textTransform: "uppercase", letterSpacing: "1px" }}>
                Card Library — {totalLibCards} card{totalLibCards !== 1 ? "s" : ""} · drag into slots above
              </div>
              <button
                onClick={() => setShowCustomForm(v => !v)}
                style={{
                  display: "flex", alignItems: "center", gap: "5px",
                  padding: "4px 10px", border: "1px solid #6B4F9E", borderRadius: "4px",
                  backgroundColor: showCustomForm ? "#6B4F9E" : "transparent",
                  color: showCustomForm ? "#fff" : "#6B4F9E",
                  fontSize: "10px", fontWeight: 700, fontFamily: "'Georgia', serif",

                    renderLibCard(card, -1, ci, card.id)
                  )}

              </div>
            )}

            {/* Library groups */}
            {groups.length === 0 && customCards.length === 0 ? (
              <div style={{ textAlign: "center", padding: "32px 24px", color: "#bbb", fontFamily: "'Georgia', serif", fontStyle: "italic", fontSize: "13px" }}>

              </div>
            ) : groups.map((group, gi) => {

              return (
                <div key={gi} style={{ marginBottom: "18px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: "7px", marginBottom: "8px" }}>

                      renderLibCard(card, gi, ci, `${gi}-${ci}`)

            })}
          </div>
        </div>

        {/* Footer */}
        <div style={{ padding: "8px 24px", borderTop: "1px solid #e0ddd6", flexShrink: 0, backgroundColor: "#f5f3ee", display: "flex", alignItems: "center", justifyContent: "space-between", gap: "16px" }}>

            style={{
              display: "flex", alignItems: "center", gap: "6px",

          >
            {copied ? "✓ Copied!" : "⎘ Copy plan"}
          </button>
        </div>
      </div>
    </>
  );
}

function getLeaderXRefs(name) {
  const inCrises = data.crises.filter(c => c.leaderLinks && c.leaderLinks.includes(name));
  const inSyllabus = [];
  syllabus.forEach(s => s.points.forEach(p => { if (p.links.leaders.includes(name)) inSyllabus.push({ paper: s.paper, text: p.text }); }));
  return { inCrises, inSyllabus };
}

function getCrisisXRefs(name) {
  const crisis = data.crises.find(c => c.name === name);
  const inLeaders = crisis ? crisis.leaderLinks : [];
  const inSyllabus = [];
  syllabus.forEach(s => s.points.forEach(p => { if (p.links.crises.includes(name)) inSyllabus.push({ paper: s.paper, text: p.text }); }));
  return { inLeaders, inSyllabus };
}
